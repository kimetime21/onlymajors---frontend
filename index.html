/* =========================================================================
   CHAT TAB — league chat with the live tour leaderboard alongside it
   ========================================================================= */
function ChatTab({ user, picks, messages, onSend }) {
  return (
    <div className="grid grid-cols-1 lg:grid-cols-5 gap-4" style={{ minHeight: "calc(100vh - 200px)" }}>
      <div className="lg:col-span-3 flex flex-col" style={{ maxHeight: "calc(100vh - 200px)" }}>
        <ChatPanel user={user} messages={messages} onSend={onSend} />
      </div>
      <div className="lg:col-span-2 flex flex-col" style={{ maxHeight: "calc(100vh - 200px)" }}>
        <TourLeaderboardPanel picks={picks} user={user} />
      </div>
    </div>
  );
}

function ChatPanel({ user, messages, onSend }) {
  const scrollRef = React.useRef(null);
  const sorted = useMemo(() => [...messages].sort((a, b) => a.ts - b.ts), [messages]);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [sorted.length]);

  return (
    <div className="glass rounded-2xl flex flex-col flex-1 overflow-hidden">
      <header className="px-4 py-3 border-b border-line flex items-center justify-between">
        <div>
          <h3 className="font-bold text-base">League Chat</h3>
          <div className="text-[11px] text-dim">{TEAMS.length} members · {sorted.length} messages</div>
        </div>
        <div className="text-[10px] uppercase tracking-wider text-dim">Live</div>
      </header>
      <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 py-4 space-y-3">
        {sorted.map((m, i) => {
          const prev = i > 0 ? sorted[i-1] : null;
          const groupWithPrev = prev && prev.teamId === m.teamId && (m.ts - prev.ts) < 5*60*1000;
          return <Message key={m.id} message={m} isMe={m.teamId === user.id} groupWithPrev={groupWithPrev} />;
        })}
      </div>
      <Composer onSend={onSend} user={user} />
    </div>
  );
}

function Message({ message, isMe, groupWithPrev }) {
  const team = TEAMS.find(t => t.id === message.teamId);
  // Coerce ts to a number — Postgres BIGINT is returned as a string by node-postgres,
  // and `new Date("1717xxxxx")` returns Invalid Date which makes the relative time NaN.
  const tsNum = typeof message.ts === "string" ? Number(message.ts) : message.ts;
  const time = useRelativeTime(Number.isFinite(tsNum) ? new Date(tsNum) : null);
  if (!team) return null;
  return (
    <div className={`flex gap-2 ${isMe ? "flex-row-reverse" : "flex-row"} ${groupWithPrev ? "mt-1" : "mt-3"}`}>
      <div className="w-7 shrink-0">{!groupWithPrev && <TeamBadge team={team} size="sm" />}</div>
      <div className={`min-w-0 max-w-[78%] ${isMe ? "items-end" : "items-start"} flex flex-col`}>
        {!groupWithPrev && (
          <div className={`text-[11px] text-dim mb-0.5 ${isMe ? "text-right" : ""}`}>
            <span className="font-semibold text-muted">{team.name}</span>
            <span className="ml-1.5">· {time}</span>
          </div>
        )}
        <div className={`rounded-2xl px-3 py-2 text-sm leading-snug text-text
          ${isMe
            ? "rounded-br-md border"
            : "bg-white border border-line rounded-bl-md"}`}
          style={isMe
            ? { background: team.color + "22", borderColor: team.color + "55", borderRight: `3px solid ${team.color}` }
            : { borderLeft: `3px solid ${team.color}` }}>
          {message.text}
        </div>
      </div>
    </div>
  );
}

function Composer({ onSend, user }) {
  const [text, setText] = useState("");
  const submit = (e) => {
    e.preventDefault();
    if (!text.trim()) return;
    onSend(text);
    setText("");
  };
  return (
    <form onSubmit={submit} className="px-3 py-3 border-t border-line">
      <div className="flex items-end gap-2">
        <TeamBadge team={user} size="sm" />
        <input
          type="text"
          value={text}
          onChange={e => setText(e.target.value)}
          placeholder={`Message the league as ${user.name}…`}
          className="flex-1 bg-white border border-line rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green/30 placeholder-dim text-text"
        />
        <button type="submit" disabled={!text.trim()}
          className={`font-semibold rounded-lg px-4 py-2 text-sm transition-colors whitespace-nowrap
            ${text.trim() ? "bg-green text-bg2 hover:bg-green-2" : "bg-black/[0.06] text-dim cursor-not-allowed"}`}>
          Send
        </button>
      </div>
    </form>
  );
}

function TourLeaderboardPanel({ picks, user }) {
  // 'all' | 'league' | 'mine'
  const [filter, setFilter] = useState("all");
  const live = MAJORS.find(m => m.status === "live") || MAJORS[1];

  // Ownership map: golferId -> [team objects who have them rostered]
  const ownership = useMemo(() => {
    const map = {};
    for (const t of TEAMS) {
      const slot = picks[t.id]?.[live.id];
      if (!slot) continue;
      [...slot.starters, ...slot.bench].forEach(gid => {
        if (gid) { (map[gid] = map[gid] || []); if (!map[gid].includes(t)) map[gid].push(t); }
      });
    }
    return map;
  }, [picks, live.id]);

  const players = useMemo(() => {
    return Object.entries(EARN[live.id] || {})
      // No more G[gid] filter — we render everyone DataGolf returns, known or not
      .map(([gid, e]) => ({ gid, ...e }))
      .filter(p => {
        if (filter === "mine")   return (ownership[p.gid] || []).some(t => t.id === user.id);
        if (filter === "league") return (ownership[p.gid] || []).length > 0;
        return true;
      })
      .sort((a, b) => {
        const aOut = a.status === "mc" || a.status === "wd" || a.status === "dfl";
        const bOut = b.status === "mc" || b.status === "wd" || b.status === "dfl";
        if (aOut !== bOut) return aOut ? 1 : -1;
        return (a.score ?? 99) - (b.score ?? 99);
      });
  }, [live.id, ownership, filter, user.id]);

  const totalCount = Object.keys(EARN[live.id] || {}).length;

  const FilterButton = ({ value, label }) => (
    <button onClick={() => setFilter(value)}
      className={`px-2 py-1 rounded-md ${filter === value ? "bg-green/15 text-green border border-green/30 font-semibold" : "text-dim hover:text-text"}`}>
      {label}
    </button>
  );

  return (
    <div className="glass rounded-2xl flex flex-col flex-1 overflow-hidden">
      <header className="px-4 py-3 border-b border-line">
        <div className="flex items-center justify-between">
          <div>
            <h3 className="font-bold text-base">{live.name}</h3>
            <div className="text-[11px] text-dim">{live.course} · R{live.currentRound || 1} · {totalCount} in field</div>
          </div>
          <span className="text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded bg-red-500/10 text-red border border-red-500/30 inline-flex items-center gap-1">
            <span className="live-dot w-1.5 h-1.5 bg-red-500 rounded-full inline-block"/>Live
          </span>
        </div>
        <div className="mt-2 flex items-center gap-1.5 text-[11px]">
          <FilterButton value="all"    label="All players" />
          <FilterButton value="league" label="League picks" />
          <FilterButton value="mine"   label="My picks" />
        </div>
      </header>
      <div className="flex-1 overflow-y-auto">
        {players.length === 0 && totalCount === 0 && (
          <div className="p-6 text-center text-sm text-muted">
            <div className="font-semibold text-text mb-1">No live data yet</div>
            <div className="text-xs">Backend scraper of <span className="text-text">{LIVE_SOURCES[live.id]?.name}</span> hasn't populated this tournament's scores.</div>
          </div>
        )}
        {players.length === 0 && totalCount > 0 && (
          <div className="p-6 text-center text-sm text-dim">No players match this filter.</div>
        )}
        {players.map(p => <TourPlayerRow key={p.gid} player={p} owners={ownership[p.gid] || []} youId={user.id} majorId={live.id} />)}
      </div>
      <div className="px-4 py-2 border-t border-line text-[10px] text-dim flex items-center gap-2">
        <span className="flex -space-x-1">
          {TEAMS.slice(0,2).map(t => <span key={t.id} className="w-2.5 h-2.5 rounded-full border border-white" style={{ background: t.color }}/>)}
        </span>
        Colored dots = league members with that golfer rostered
      </div>
    </div>
  );
}

function TourPlayerRow({ player, owners, youId, majorId }) {
  // Prefer the curated GOLFERS entry; fall back to backend-supplied name/country
  // for players not in our pickable roster (still shown on the leaderboard).
  const known = G[player.gid];
  const name    = known?.name    || player.name    || "—";
  const country = known?.country || player.country || "";
  const isMine = owners.some(o => o.id === youId);
  const out = player.status === "mc" || player.status === "wd" || player.status === "dfl";
  const [open, setOpen] = useState(false);
  return (
    <div>
      <div role="button" tabIndex={0}
        onClick={() => setOpen(o => !o)}
        onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setOpen(o => !o); } }}
        className={`flex items-center gap-2 px-3 py-2 border-b border-line text-sm cursor-pointer hover:bg-black/[0.02] transition-colors ${out ? "opacity-50" : ""} ${isMine ? "bg-green/[0.04]" : ""}`}>
        <div className="w-9"><ScorePill status={player.status} position={player.position} /></div>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-1.5">
            <span className="font-medium truncate">{name}</span>
            {isMine && <span className="text-[9px] uppercase tracking-wider text-green font-bold">YOURS</span>}
            {!known && <span className="text-[9px] uppercase tracking-wider text-dim font-semibold" title="Not in your league's pickable roster">FIELD</span>}
          </div>
          <div className="text-[10px] text-dim flex items-center gap-1.5">
            <span>{country}</span>
            {player.thru && player.status === "made_cut" && <span>· thru {player.thru}</span>}
          </div>
        </div>
        <div className="flex -space-x-1 shrink-0">
          {owners.slice(0, 4).map(t =>
            <span key={t.id} title={t.name}
              className="w-3.5 h-3.5 rounded-full border-2 border-white shadow-sm"
              style={{ background: t.color }} />
          )}
        </div>
        <div className="w-10 text-right shrink-0"><ScoreNum score={player.score} status={player.status} /></div>
        <svg viewBox="0 0 24 24" className={`w-3.5 h-3.5 text-dim shrink-0 transition-transform ${open ? "rotate-180" : ""}`} fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      {open && <PlayerStatsPanel majorId={majorId} player={player} displayName={name} />}
    </div>
  );
}

/* =========================================================================
   PLAYER STATS PANEL
   Lazy-loads /api/stats/:majorId/:golferId on first expand. Shows SG
   breakdown, round-by-round, traditional stats, season totals.
   ========================================================================= */
function PlayerStatsPanel({ majorId, player, displayName }) {
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setError(null);
    fetchPlayerStats(majorId, player.gid)
      .then(r => { if (!cancelled) { setData(r); setLoading(false); } })
      .catch(e => { if (!cancelled) { setError(e.message); setLoading(false); } });
    return () => { cancelled = true; };
  }, [majorId, player.gid]);

  return (
    <div className="bg-black/[0.025] border-b border-line px-4 py-3 text-[12px]">
      {loading && <div className="text-dim italic">Loading stats from DataGolf…</div>}
      {error && !loading && (
        <div className="text-red text-[11px]">
          Stats unavailable: {error}
          <div className="text-dim mt-0.5 text-[10px]">DataGolf may not have data for this player at this event, or the backend hasn't been redeployed yet.</div>
        </div>
      )}
      {data && !loading && !error && (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          {/* Round-by-round */}
          <StatBlock title="Round-by-round">
            <table className="w-full text-[11px]">
              <thead className="text-dim uppercase tracking-wider text-[9px]">
                <tr>
                  <th className="text-left font-semibold pb-1">Round</th>
                  <th className="text-right font-semibold pb-1">Strokes</th>
                  <th className="text-right font-semibold pb-1">ToPar</th>
                  <th className="text-right font-semibold pb-1">Pos</th>
                  <th className="text-right font-semibold pb-1">$</th>
                </tr>
              </thead>
              <tbody>
                {(data.tournament?.rounds || []).map(r => (
                  <tr key={r.round} className="border-t border-line">
                    <td className="py-1 font-semibold">R{r.round}</td>
                    <td className="py-1 text-right tabular-nums">{r.roundScore == null ? "—" : r.roundScore}</td>
                    <td className="py-1 text-right tabular-nums">{r.scoreToPar === null || r.scoreToPar === undefined ? "—" : (r.scoreToPar === 0 ? "E" : (r.scoreToPar > 0 ? `+${r.scoreToPar}` : r.scoreToPar))}</td>
                    <td className="py-1 text-right">{r.position || "—"}</td>
                    <td className="py-1 text-right tabular-nums">{r.money == null ? "—" : fmtCompactMoney(r.money)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="text-[9px] text-dim mt-1.5">Strokes from DataGolf · $ = projected money snapshotted at end of round</div>
          </StatBlock>

          {/* Tournament SG */}
          <StatBlock title="Strokes gained · this tournament">
            <StatRow label="Total"          value={data.tournament?.sg?.total}/>
            <StatRow label="Off-the-tee"    value={data.tournament?.sg?.ott}/>
            <StatRow label="Approach"       value={data.tournament?.sg?.app}/>
            <StatRow label="Around-the-green" value={data.tournament?.sg?.arg}/>
            <StatRow label="Putting"        value={data.tournament?.sg?.putt}/>
          </StatBlock>

          {/* Traditional */}
          <StatBlock title="Traditional">
            <StatRow label="Driving distance" value={data.tournament?.traditional?.drivingDistance} unit="yds" digits={1} signed={false}/>
            <StatRow label="Driving accuracy" value={data.tournament?.traditional?.drivingAccuracy} unit="%" digits={1} signed={false}/>
            <StatRow label="Greens in reg"    value={data.tournament?.traditional?.gir} unit="%" digits={1} signed={false}/>
            <StatRow label="Scrambling"       value={data.tournament?.traditional?.scrambling} unit="%" digits={1} signed={false}/>
          </StatBlock>

          {/* Season */}
          <StatBlock title="Season · 2026">
            {data.season ? (
              <>
                <StatRow label="SG Total"       value={data.season.sgTotal}/>
                <StatRow label="SG Off-the-tee" value={data.season.sgOtt}/>
                <StatRow label="SG Approach"    value={data.season.sgApp}/>
                <StatRow label="SG Around-the-green" value={data.season.sgArg}/>
                <StatRow label="SG Putting"     value={data.season.sgPutt}/>
              </>
            ) : (
              <div className="text-dim text-[11px] italic">Season totals not available (DataGolf endpoint may not be in your subscription tier).</div>
            )}
          </StatBlock>
        </div>
      )}
    </div>
  );
}

function StatBlock({ title, children }) {
  return (
    <div className="bg-white border border-line rounded-lg p-2.5">
      <div className="text-[9px] uppercase tracking-wider text-dim font-semibold mb-1.5">{title}</div>
      <div>{children}</div>
    </div>
  );
}

function StatRow({ label, value, unit, digits = 2, signed = true }) {
  const isNum = typeof value === "number" && !isNaN(value);
  const fmt = isNum
    ? `${signed && value > 0 ? "+" : ""}${value.toFixed(digits)}${unit ? ` ${unit}` : ""}`
    : "—";
  return (
    <div className="flex items-baseline justify-between py-0.5 text-[11px]">
      <span className="text-muted">{label}</span>
      <span className={`font-semibold tabular-nums ${isNum && signed ? (value > 0 ? "text-green" : value < 0 ? "text-red" : "text-text") : "text-text"}`}>{fmt}</span>
    </div>
  );
}

function fmtCompactMoney(n) {
  if (n == null || isNaN(n)) return "—";
  if (n >= 1_000_000) return `$${(n/1_000_000).toFixed(n >= 10_000_000 ? 1 : 2)}M`;
  if (n >= 1_000)     return `$${Math.round(n/1000)}k`;
  return `$${Math.round(n)}`;
}

function EmptyLiveState({ major }) {
  const src = LIVE_SOURCES[major.id];
  return (
    <div className={`relative rounded-2xl overflow-hidden border border-line-2 ${major.scene}`}>
      <div className="absolute inset-0 dot-grid opacity-30"/>
      <div className="relative p-6 sm:p-8 text-center">
        <div className="inline-flex items-center justify-center w-12 h-12 rounded-full bg-gold/10 border border-gold/30 mb-3">

function LiveTab({ picks, syncStatus, syncMessage, lastUpdated, onRefresh, onGotoPicks }) {
  const liveMajor = MAJORS.find(m => m.status === "live");
  const lastComplete = [...MAJORS].reverse().find(m => m.status === "complete");
  const upcomingOpen = MAJORS.find(m => m.status === "upcoming" && arePicksOpen(m));
  const defaultMajor = liveMajor || lastComplete || MAJORS[0];
  // useState must be called unconditionally — keep it here even when we end up
  // rendering the pre-tournament hero below.
  const [viewedMajorId, setViewedMajorId] = useState(defaultMajor.id);
  const viewed = M[viewedMajorId] || defaultMajor;

  // Pre-tournament state: picks are open for an upcoming major but the
  // tournament hasn't teed off yet. Show the "picks open" hero instead of
  // last week's results so friends know what's about to happen.
  if (!liveMajor && upcomingOpen) {
    return <PicksOpenLiveState major={upcomingOpen} picks={picks} onGotoPicks={onGotoPicks} />;
  }
  const isLive = viewed.status === "live";
  const hasData = Object.keys(EARN[viewed.id] || {}).length > 0;

  const rows = useMemo(() => {
    return TEAMS.map(t => {
      const slot = picks[t.id][viewed.id];
      return {
        team: t,
        starters: slot?.starters || [],
        bench:    slot?.bench || [],
        subs:     slot?.subs || [],
        slot,
        total:    teamMajorTotal(t.id, viewed.id, picks),
        originalTotal: teamMajorOriginalTotal(t.id, viewed.id),
        lob:      teamMajorLOB(t.id, viewed.id, picks),
      };
    }).sort(compareTeamsByMajor);
  }, [picks, viewed.id, lastUpdated]);

  const leader = rows[0];
  const completeMajors = MAJORS.filter(m => m.status === "complete");
  const showSwitcher = (liveMajor && completeMajors.length > 0) || completeMajors.length > 1;

  if (!hasData) {
    return (
      <div className="space-y-6">
        <div className="flex justify-end -mt-2">
          <SyncBar status={syncStatus} message={syncMessage} lastUpdated={lastUpdated} onRefresh={onRefresh} />
        </div>
        <EmptyLiveState major={viewed} />
      </div>
    );
  }

  return (
    <div className="space-y-6">
      {/* Top bar — sync indicator (live only) + major switcher (when other majors exist) */}
      <div className="flex items-center justify-between flex-wrap gap-2 -mt-2">
        {showSwitcher ? (
          <LiveMajorSwitcher
            viewedMajorId={viewedMajorId} setViewedMajorId={setViewedMajorId}
            liveMajor={liveMajor} completeMajors={completeMajors} />
        ) : <span />}
        {isLive && <SyncBar status={syncStatus} lastUpdated={lastUpdated} onRefresh={onRefresh} />}
      </div>

      {/* Hero card */}
      <div className={`relative rounded-2xl overflow-hidden border border-line-2 ${viewed.scene}`}>
        <div className="absolute inset-0 dot-grid opacity-40"/>
        <div className="relative p-5 sm:p-6">
          <div className="flex items-center gap-2 text-[10px] uppercase tracking-[0.18em] text-dim">
            {isLive ? (
              <span className="inline-flex items-center gap-1.5">
                <span className="relative inline-block w-2 h-2"><span className="absolute inset-0 bg-red-400 rounded-full live-dot"/><span className="absolute inset-0 bg-red-400 rounded-full opacity-50 live-glow"/></span>
                Live now
              </span>
            ) : (
              <span className="font-semibold text-gold">Past results</span>
            )}
            <span>·</span>
            <span>{viewed.name}</span>
            {isLive && <><span>·</span><span>R{viewed.currentRound}</span></>}
          </div>
          <div className="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-5 items-end">
            <div className="sm:col-span-2">
              <div className="text-[10px] uppercase tracking-wider text-dim">{isLive ? "Leading the major" : "Won the major"}</div>
              <div className="flex items-center gap-3 mt-2">
                <TeamBadge team={leader.team} size="xl" />
                <div>
                  <div className="text-2xl sm:text-3xl font-bold">{leader.team.name}</div>
                  <div className="text-sm text-muted">{leader.team.owner}</div>
                </div>
              </div>
            </div>
            <div className="text-right">
              <div className="text-[10px] uppercase tracking-wider text-dim">{isLive ? "Projected" : "Final earnings"}</div>
              <div className="display-num font-bold text-3xl sm:text-4xl shimmer-text">{fmtFull(leader.total)}</div>
              <div className="text-xs text-green mt-1">+{fmt(leader.total - (rows[1]?.total ?? 0))} {isLive ? "ahead" : "margin"}</div>
            </div>
          </div>
        </div>
      </div>

      {/* Team rows */}
      <div className="space-y-2.5">
        {rows.map((row, idx) => (
          <LiveTeamRow key={row.team.id} row={row} rank={idx+1} majorId={viewed.id} leader={rows[0].total} />
        ))}
      </div>

      {/* Score Predictions */}
      <ScorePredictionsPanel picks={picks} majorId={viewed.id} />
    </div>
  );
}

function ScorePredictionsPanel({ picks, majorId }) {
  // Pull the live tournament leader's score-to-par for context.
  const leaderScore = useMemo(() => {
    const e = EARN[majorId] || {};
    let best = null;
    for (const gid of Object.keys(e)) {
      const v = e[gid];
      if (v?.status === "mc" || v?.status === "wd" || v?.status === "dfl") continue;
      if (typeof v?.score !== "number") continue;
      if (best === null || v.score < best) best = v.score;
    }
    return best;
  }, [majorId]);

  const predictions = useMemo(() => {
    return TEAMS.map(t => ({
      team: t,
      pick: picks?.[t.id]?.[majorId]?.scorePrediction ?? null,
    }))
    .filter(p => p.pick != null)
    .sort((a, b) => a.pick - b.pick);
  }, [picks, majorId]);

  if (predictions.length === 0) return null;

  return (
    <div className="glass rounded-2xl p-5">
      <div className="flex items-baseline justify-between flex-wrap gap-2 mb-3">
        <div>
          <h3 className="font-semibold">Score Predictions</h3>
          <div className="text-xs text-dim mt-0.5">
            {leaderScore != null
              ? <>Leader: <span className="font-mono font-semibold text-text">{fmtScoreToPar(leaderScore)}</span></>
              : "Tournament hasn't started yet"}
          </div>
        </div>
      </div>
      <div className="space-y-1.5">
        {predictions.map((p, i) => {
          const diff = leaderScore != null ? Math.abs(p.pick - leaderScore) : null;
          return (
            <div key={p.team.id} className="flex items-center gap-3 px-3 py-2 rounded-lg bg-white border border-line">
              <span className="text-[10px] uppercase tracking-wider text-dim w-5 font-mono">#{i+1}</span>
              <TeamBadge team={p.team} size="sm" />
              <span className="flex-1 font-medium truncate">{p.team.name}</span>
              <span className="display-num font-bold text-base text-text">{fmtScoreToPar(p.pick)}</span>
              {diff != null && <span className="text-[10px] text-dim font-mono w-12 text-right">{diff === 0 ? "spot on" : `±${diff}`}</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function PicksOpenLiveState({ major, picks, onGotoPicks }) {
  // Countdown to first tee
  const [, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 60_000);
    return () => clearInterval(id);
  }, []);

  const teeTimeMs = new Date(major.firstTeeTime).getTime();
  const now = Date.now();
  const diffMs = Math.max(0, teeTimeMs - now);
  const days = Math.floor(diffMs / (24*60*60*1000));
  const hours = Math.floor((diffMs % (24*60*60*1000)) / (60*60*1000));
  const minutes = Math.floor((diffMs % (60*60*1000)) / (60*1000));

  // Tally who's submitted vs not
  const submittedTeams = TEAMS.filter(t => {
    const slot = picks?.[t.id]?.[major.id];
    return slot && slot.starters?.filter(Boolean).length === 4;
  });
  const pendingTeams = TEAMS.filter(t => !submittedTeams.includes(t));

  return (
    <div className="space-y-6">
      <div className={`relative rounded-2xl overflow-hidden border border-line-2 ${major.scene}`}>
        <div className="absolute inset-0 dot-grid opacity-40"/>
        <div className="relative p-6 sm:p-8">
          <div className="flex items-center gap-2 text-[10px] uppercase tracking-[0.18em] text-dim mb-3">
            <span className="inline-flex items-center gap-1.5">
              <span className="live-dot w-1.5 h-1.5 bg-green rounded-full inline-block"/>
              Picks are open
            </span>
            <span>·</span>
            <span>{major.name}</span>
          </div>
          <div className="font-bold text-2xl sm:text-3xl">Picks lock at first tee</div>
          <div className="text-sm text-muted mt-1">{major.teeTimeLabel}</div>

          <div className="mt-5 grid grid-cols-3 gap-3 max-w-md">
            <div className="bg-white/80 border border-line rounded-lg px-3 py-2.5 text-center">
              <div className="display-num font-bold text-2xl">{days}</div>
              <div className="text-[10px] uppercase tracking-wider text-dim">days</div>
            </div>
            <div className="bg-white/80 border border-line rounded-lg px-3 py-2.5 text-center">
              <div className="display-num font-bold text-2xl">{hours}</div>
              <div className="text-[10px] uppercase tracking-wider text-dim">hours</div>
            </div>
            <div className="bg-white/80 border border-line rounded-lg px-3 py-2.5 text-center">
              <div className="display-num font-bold text-2xl">{minutes}</div>
              <div className="text-[10px] uppercase tracking-wider text-dim">minutes</div>
            </div>
          </div>

          <button onClick={onGotoPicks}
            className="mt-5 inline-flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold text-sm bg-green text-bg2 hover:bg-green-2 transition-colors score-pulse">
            Click here to lock in picks
            <svg viewBox="0 0 24 24" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
              <path d="M5 12h14M13 6l6 6-6 6"/>
            </svg>
          </button>
        </div>
      </div>

      <div className="glass rounded-2xl p-5">
        <h3 className="font-semibold mb-3">League status · {submittedTeams.length} of {TEAMS.length} picked</h3>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          {submittedTeams.map(t => (
            <div key={t.id} className="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-green/8 border border-green/25">
              <TeamBadge team={t} size="sm" />
              <span className="flex-1 text-sm font-medium truncate">{t.name}</span>
              <span className="text-[10px] font-bold uppercase tracking-wider text-green">In</span>
            </div>
          ))}
          {pendingTeams.map(t => (
            <div key={t.id} className="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-black/[0.03] border border-line">
              <TeamBadge team={t} size="sm" />
              <span className="flex-1 text-sm font-medium truncate">{t.name}</span>
              <span className="text-[10px] font-bold uppercase tracking-wider text-dim">Pending</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function LiveMajorSwitcher({ viewedMajorId, setViewedMajorId, liveMajor, completeMajors }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [open]);

  const viewed = M[viewedMajorId];
  const isViewingLive = liveMajor && liveMajor.id === viewedMajorId;
  const options = [
    ...(liveMajor ? [{ ...liveMajor, isLive: true }] : []),
    ...completeMajors.map(m => ({ ...m, isLive: false })),
  ];

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className={`flex items-center gap-2 pl-3 pr-2 py-1.5 rounded-lg border bg-white transition-colors text-sm ${open ? "border-green/40" : "border-line-2 hover:border-line-2"}`}>
        {isViewingLive && <span className="live-dot w-1.5 h-1.5 bg-red-400 rounded-full inline-block"/>}
        <span className="font-semibold">{viewed.name}</span>
        <span className="text-[10px] uppercase tracking-wider text-dim">{isViewingLive ? "live" : "past"}</span>
        <svg viewBox="0 0 24 24" className={`w-3.5 h-3.5 text-dim transition-transform ${open ? "rotate-180" : ""}`} fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      {open && (
        <div className="absolute left-0 mt-1.5 min-w-[220px] z-40 bg-white border border-line-2 rounded-xl shadow-lg overflow-hidden fade-in">
          {options.map(m => {
            const sel = m.id === viewedMajorId;
            return (
              <button key={m.id} onClick={() => { setViewedMajorId(m.id); setOpen(false); }}
                className={`w-full text-left flex items-center gap-2 px-3 py-2 text-sm transition-colors ${sel ? "bg-green/8" : "hover:bg-black/[0.03]"}`}>
                {m.isLive && <span className="live-dot w-1.5 h-1.5 bg-red-400 rounded-full inline-block"/>}
                <span className="flex-1 font-medium">{m.name}</span>
                <span className="text-[10px] uppercase tracking-wider text-dim">{m.isLive ? "live" : "past"}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

          </div>
        </div>
        <div className="text-right shrink-0">
          <div className="display-num font-bold text-lg">{fmtFull(row.total)}</div>
          <div className="text-[10px] uppercase tracking-wider text-dim">{rank === 1 ? "leading" : fmt(row.total - leader) + " behind"}</div>

            <span className="sm:hidden inline-block mt-1 text-[9px] font-bold uppercase tracking-wider text-green bg-green/12 border border-green/30 rounded px-1.5 py-0.5">
              {subs.length} sub{subs.length > 1 ? "s" : ""}

                      <svg viewBox="0 0 16 16" className="w-3.5 h-3.5 text-dim" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">

          <div className="text-[10px] uppercase tracking-wider text-dim mt-3 mb-2">Bench · {fmt(row.lob)} left on base</div>
          <div className="space-y-1">
            {row.bench.map(gid => gid && <LiveLineItem key={gid} golferId={gid} majorId={majorId} slot={row.slot} role="bench" />)}
          </div>
        </div>
      )}
    </div>
  );
}

function LiveLineItem({ golferId, majorId, slot, role }) {
  const g = G[golferId] || GOLFERS_EXT[golferId];
  if (!g) return null;
  const earn = EARN[majorId]?.[golferId];
  const total = golferTotal(majorId, golferId);
  const isIn = isGolferIn(slot, golferId);
  // Visual state — a starter that's been subbed out is "OUT"; a bench that's
  // been subbed in is "IN". Otherwise the role's default tone applies.
  const subbedOut = role === "starter" && !isIn;
  const subbedIn  = role === "bench"   &&  isIn;
  return (
    <div className="flex items-center gap-2.5 px-2 py-1.5 rounded"
      style={
        subbedOut ? { background: "rgba(184, 29, 29, 0.12)", border: "1px solid rgba(184, 29, 29, 0.55)" }
        : subbedIn ? { background: "rgba(15, 122, 62, 0.18)", border: "1px solid rgba(15, 122, 62, 0.65)" }
        : role === "bench" ? { opacity: 0.55 }
        : {}
      }>
      <CountryCode code={g.country} className="w-8" />
      <span className={`flex-1 text-sm ${subbedOut ? "line-through text-dim" : ""}`}>{g.name}</span>
      {subbedOut && <span className="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded"
        style={{ color: "#b81d1d", background: "rgba(184, 29, 29, 0.18)", border: "1px solid rgba(184, 29, 29, 0.55)" }}>OUT</span>}
      {subbedIn  && <span className="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded"
        style={{ color: "#0f7a3e", background: "rgba(15, 122, 62, 0.22)", border: "1px solid rgba(15, 122, 62, 0.65)" }}>IN</span>}
      {earn && <ScorePill status={earn.status} position={earn.position} />}
      {earn && <ScoreNum score={earn.score} status={earn.status} />}
      <span className="font-mono font-semibold text-sm tabular-nums w-16 text-right">{total === null ? "—" : fmt(total)}</span>
    </div>
  );
}

function LeaderboardTab({ picks, viewAs }) {
  const rows = useMemo(() => {
    const r = TEAMS.map(t => {
      const byMajor = {};
      let total = 0;
      MAJORS.forEach(m => { const v = teamMajorTotal(t.id, m.id, picks); byMajor[m.id] = v; total += v; });
      return {
        team: t,
        byMajor,
        total,
        originalTotal: teamSeasonOriginalTotal(t.id),
        lob: teamSeasonLOB(t.id, picks),
      };
    }).sort(compareTeamsByMajor);
    const lead = r[0]?.total ?? 0;
    return r.map((x, i) => ({
      ...x,
      behind: x.total - lead,
      // Tag the tiebreaker that determined this row's rank, if any
      tiebreaker:
        i > 0 && r[i-1].total === x.total
          ? (r[i-1].originalTotal !== x.originalTotal ? "original-starters" : "left-on-base")
          : null,
    }));
  }, [picks]);

  const liveId = MAJORS.find(m => m.status === "live")?.id;

  return (
    <div className="space-y-6">
      <div className="flex items-baseline justify-between flex-wrap gap-2">
        <div>
          <h2 className="font-bold text-2xl tracking-tight">Overall Standings</h2>
          <div className="text-xs text-dim mt-0.5">Cumulative earnings across all four majors</div>
        </div>
        {liveId && (
          <div className="text-xs text-muted flex items-center gap-1.5 glass-2 rounded-md px-2 py-1">
            <span className="live-dot w-1.5 h-1.5 bg-red-400 rounded-full inline-block"/>
            {M[liveId].short} R{M[liveId].currentRound} updating · projected

        )}
      </div>

      <div className="space-y-2">
        {rows.map((row, idx) => (
          <StandingsRow key={row.team.id} row={row} idx={idx} viewAs={viewAs} picks={picks} />
        ))}
      </div>
      <div className="text-[11px] text-dim px-1">
        <span className="font-semibold uppercase tracking-wider text-muted">Tiebreakers</span> · ties broken by (1) highest total among original starters, then (2) Left on Base.

      {/* Picks Locking Soon — privacy & lock countdown widget */}

      <div className="grid sm:grid-cols-1 gap-4">
        <div className="glass rounded-2xl p-5">
          <h3 className="font-bold text-lg">Season Progress</h3>
          <div className="mt-3 space-y-2.5">

function StandingsMajorBlock({ major, teamId, totalForMajor, picks }) {
  const slot = picks?.[teamId]?.[major.id];
  const subs = slot?.subs || [];
  const subOutSet = new Set(subs.map(s => s.out).filter(Boolean));
  const subInSet  = new Set(subs.map(s => s.in).filter(Boolean));

  // Names that played for this team at this major. Includes ALL starters
  // (subbed-out players still teed off before the swap) PLUS bench players
  // who were subbed in. Bench players who never got subbed in are excluded.
  const playedNames = [
    ...(slot?.starters || []).filter(Boolean),
    ...(slot?.bench    || []).filter(gid => gid && subInSet.has(gid)),
  ].map(gid => G[gid]?.name).filter(Boolean);

  return (
    <div className="bg-white border border-line rounded-md px-3 py-2">
      <div className="flex items-baseline justify-between gap-2">
        <div className="flex items-center gap-1.5 text-[11px] uppercase tracking-wider text-dim">
          <span className="font-semibold text-text">{major.short}</span>
          {major.status === "live" && <span className="live-dot w-1 h-1 bg-red-400 rounded-full inline-block"/>}
          {major.status === "upcoming" && <span className="text-[9px] text-dim">picks open {major.picksOpenLabel}</span>}
        </div>
        <div className={`font-mono font-semibold text-sm ${major.status==="live" ? "text-gold" : "text-text"}`}>
          {totalForMajor === 0 && major.status === "upcoming"
            ? <span className="text-dim">—</span>
            : fmt(totalForMajor)}
        </div>
      </div>
      {major.status !== "upcoming" && playedNames.length > 0 && (
        <div className="text-[11px] text-muted mt-1 leading-snug">
          {playedNames.join(" · ")}
        </div>
      )}
    </div>
  );
}

function ProfileTab({ user, onSave, onBack }) {
  const [displayName, setDisplayName] = useState(user.owner);
  const [teamName, setTeamName] = useState(user.name);
  const [email, setEmail] = useState(user.email);
  const [avatarDataUrl, setAvatarDataUrl] = useState(user.avatarDataUrl || null);
  const [currentPw, setCurrentPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [accountToast, setAccountToast] = useState("");
  const [pwError, setPwError] = useState("");
  const [pwOk, setPwOk] = useState("");
  const fileRef = React.useRef(null);

  // Live preview of the badge — mock team object with current local state
  const previewTeam = { ...user, name: teamName, owner: displayName, avatarDataUrl };

  const handleFile = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    if (!f.type.startsWith("image/")) { setAccountToast("Pick an image file (jpg, png, etc.)"); return; }
    if (f.size > 900 * 1024) { setAccountToast("Image too large — keep it under 900KB"); return; }
    const reader = new FileReader();
    reader.onload = ev => setAvatarDataUrl(ev.target.result);
    reader.onerror = () => setAccountToast("Couldn't read that file");
    reader.readAsDataURL(f);
  };

  const saveAccount = () => {
    if (!displayName.trim()) { setAccountToast("Display name can't be empty"); return; }
    if (!teamName.trim())    { setAccountToast("Team name can't be empty"); return; }
    if (!/^\S+@\S+\.\S+$/.test(email)) { setAccountToast("That email doesn't look right"); return; }
    onSave({ owner: displayName.trim(), name: teamName.trim(), email: email.trim(), avatarDataUrl });
    setAccountToast("Saved");
    setTimeout(() => setAccountToast(""), 2500);
  };

  const submitPassword = (e) => {
    e.preventDefault();
    setPwError(""); setPwOk("");
    if (!currentPw) return setPwError("Enter your current password.");
    if (newPw.length < 8) return setPwError("New password must be at least 8 characters.");
    if (newPw !== confirmPw) return setPwError("New passwords don't match.");
    setCurrentPw(""); setNewPw(""); setConfirmPw("");
    setPwOk("Password updated.");
    setTimeout(() => setPwOk(""), 2800);
  };

  return (
    <div className="max-w-2xl mx-auto space-y-5">
      {/* Header */}
      <div className="flex items-center gap-3">
        <button onClick={onBack}
          className="text-sm text-muted hover:text-text inline-flex items-center gap-1.5 px-2 py-1 rounded-md hover:bg-black/[0.03]">
          <svg viewBox="0 0 16 16" className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 4L6 8l4 4"/></svg>
          Back
        </button>
        <h1 className="font-bold text-2xl tracking-tight">Profile Settings</h1>
      </div>

      {/* Profile picture */}
      <ProfileSection title="Profile picture" hint="Replaces the team monogram everywhere in the app.">
        <div className="flex items-center gap-5">
          <TeamBadge team={previewTeam} size="xl" />
          <div className="flex flex-col gap-2">
            <button onClick={() => fileRef.current?.click()}
              className="px-3 py-2 bg-green/10 text-green border border-green/30 rounded-md text-sm font-semibold hover:bg-green/20 transition-colors w-fit">
              {avatarDataUrl ? "Replace image" : "Upload image"}
            </button>
            {avatarDataUrl && (
              <button onClick={() => setAvatarDataUrl(null)}
                className="px-3 py-2 text-xs text-muted hover:text-text rounded-md hover:bg-black/[0.03] transition-colors w-fit">
                Remove · use monogram instead
              </button>
            )}
            <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} className="hidden"/>
            <div className="text-[11px] text-dim">JPG, PNG, or GIF. Under 900KB.</div>
          </div>
        </div>
      </ProfileSection>

      {/* Account */}
      <ProfileSection title="Account">
        <ProfileField label="Display name" value={displayName} onChange={setDisplayName} placeholder="e.g. Austin" sub="Shown next to your messages and on the leaderboard." />
        <ProfileField label="Team name"   value={teamName}   onChange={setTeamName}   placeholder="e.g. Team Austin" sub="The team brand shown in standings and chat headers." />
        <ProfileField label="Email"       value={email}      onChange={setEmail}      type="email" placeholder="you@example.com" sub="Used for magic-link sign-in and notifications." />
        <div className="flex items-center justify-between gap-3 pt-2">
          <span className={`text-xs ${accountToast === "Saved" ? "text-green" : "text-red"}`}>{accountToast}</span>
          <button onClick={saveAccount}
            className="px-4 py-2 bg-green/10 text-green border border-green/30 rounded-lg text-sm font-semibold hover:bg-green/20 hover:border-green/50 transition-colors">
            Save changes
          </button>
        </div>
      </ProfileSection>

      {/* Password */}
      <ProfileSection title="Security" hint="In production this would be backed by Supabase auth; demo simulates the flow.">
        <form onSubmit={submitPassword} className="space-y-3">
          <ProfileField label="Current password"  value={currentPw} onChange={setCurrentPw} type="password" placeholder="••••••••" />
          <ProfileField label="New password"      value={newPw}     onChange={setNewPw}     type="password" placeholder="At least 8 characters" />
          <ProfileField label="Confirm new password" value={confirmPw} onChange={setConfirmPw} type="password" placeholder="Re-enter the new password" />
          <div className="flex items-center justify-between gap-3 pt-2">
            <span className="text-xs">
              {pwError && <span className="text-red">{pwError}</span>}
              {pwOk && <span className="text-green">{pwOk}</span>}
            </span>
            <button type="submit"
              className="px-4 py-2 bg-green/10 text-green border border-green/30 rounded-lg text-sm font-semibold hover:bg-green/20 transition-colors">
              Change password
            </button>
          </div>
        </form>
      </ProfileSection>

      <div className="text-[11px] text-dim text-center">
        Changes save to this browser only. In production they'd write through to your Supabase user record.
      </div>
    </div>
  );
}

function PickerModal({ state, teamId, majorId, picks, dynamicField, onPick, onClose }) {
  const major = M[majorId];

  const lockedFromOthers = useMemo(() => {
    const s = new Set();
    for (const m of MAJORS) {
      if (m.id === majorId) continue;
      const p = picks[teamId][m.id];
      // Original starters are locked
      p.starters?.forEach(g => g && s.add(g));
      // Subbed-in bench players also played → locked
      (p.subs || []).forEach(sub => { if (sub.in) s.add(sub.in); });
    }
    return s;
  }, [picks, teamId, majorId]);

  const inLineup = useMemo(() => {
    const p = picks[teamId][majorId];
    return new Set([...p.starters, ...p.bench].filter(Boolean));
  }, [picks, teamId, majorId]);

  // Use the dynamic field if available, else fall back to curated FIELDS list.
  // Dynamic field comes from /api/field (DataGolf), includes the full ~156 players.
  const fieldPlayers = useMemo(() => {
    if (dynamicField?.players?.length) {
      return dynamicField.players.map(p => ({ id: p.gid, name: p.name, country: p.country }));
    }
    return (FIELDS[majorId] || []).map(gid => {
      const g = G[gid];
      return g ? { id: gid, name: g.name, country: g.country } : null;
    }).filter(Boolean);
  }, [dynamicField, majorId]);

  // Group alphabetically by last name
  const sorted = useMemo(() => {
    return [...fieldPlayers].sort((a, b) => {
      const lastA = (a.name || "").split(/\s+/).pop().toLowerCase();
      const lastB = (b.name || "").split(/\s+/).pop().toLowerCase();
      return lastA.localeCompare(lastB);
    });
  }, [fieldPlayers]);

  // Bucket into A-Z groups by first letter of last name
  const grouped = useMemo(() => {
    const buckets = {};
    for (const p of sorted) {
      const last = (p.name || "").split(/\s+/).pop();
      const letter = (last[0] || "?").toUpperCase();
      (buckets[letter] = buckets[letter] || []).push(p);
    }
    return Object.entries(buckets).sort(([a],[b]) => a.localeCompare(b));
  }, [sorted]);

  const renderRow = (g) => {
    const locked = lockedFromOthers.has(g.id);
    const lineup = inLineup.has(g.id);
    const disabled = locked || lineup;
    return (
      <button key={g.id} disabled={disabled} onClick={() => onPick(g.id)}
        className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left transition-colors ${disabled ? "opacity-40 cursor-not-allowed" : "hover:bg-green/10 active:bg-green/15"}`}>
        <CountryCode code={g.country} className="w-9" />
        <span className="flex-1 font-medium">{g.name}</span>
        {locked && <span className="text-[10px] px-1.5 py-0.5 rounded bg-black/[0.04] text-dim font-semibold whitespace-nowrap">Played earlier</span>}
        {lineup && !locked && <span className="text-[10px] px-1.5 py-0.5 rounded bg-gold/15 text-gold font-semibold border border-gold/30 whitespace-nowrap">In lineup</span>}
      </button>
    );
  };

  const fieldCount = sorted.length;
  const sourceLabel = dynamicField?.source === "in-play"     ? "DataGolf · live"
                    : dynamicField?.source === "field-updates" ? "DataGolf · field updates"
                    : dynamicField?.source === "snapshots"     ? "snapshot"
                    : "curated list";

  return (
    <Modal title={`Pick a ${state.slotType === "starter" ? "starter" : "bench player"} — ${major.short}`} onClose={onClose}>
      <div className="text-xs text-dim mb-3 flex items-center justify-between">
        <span>{fieldCount} golfers in the field · sorted A–Z</span>
        <span className="text-[10px] uppercase tracking-wider text-dim">{sourceLabel}</span>
      </div>
      <div className="max-h-[65vh] overflow-y-auto -mx-2 pb-2">
        {grouped.length === 0 && (
          <div className="text-sm text-dim px-3 py-6 text-center">
            <div className="font-semibold mb-1">Field hasn't been published yet</div>
            <div className="text-[11px]">It'll auto-load as soon as DataGolf has the {major.short} field.</div>
          </div>
        )}
        {grouped.map(([letter, players]) => (
          <div key={letter}>
            <div className="sticky top-0 bg-white/95 backdrop-blur-sm px-3 py-1 text-[10px] uppercase tracking-[0.18em] text-dim font-bold border-b border-line z-10">{letter}</div>
            {players.map(renderRow)}
          </div>
        ))}
      </div>
    </Modal>
  );
}

function SubInModal({ benchIndex, teamId, majorId, picks, onConfirm, onClose }) {
  const [selectedIdx, setSelectedIdx] = useState(null);
  const slot = picks[teamId][majorId];
  const bench = G[slot.bench[benchIndex]];
  const benchEarn = EARN[majorId]?.[slot.bench[benchIndex]];
  const benchTotal = golferTotal(majorId, slot.bench[benchIndex]);
  const target = selectedIdx !== null ? G[slot.starters[selectedIdx]] : null;
  return (
    <Modal title={`Sub in ${bench?.name}`} onClose={onClose}>
      {/* Bench player being brought in */}
      <div className="mb-3 p-3 rounded-lg bg-green/8 border border-green/30 text-xs">
        <div className="text-[10px] uppercase tracking-wider text-green font-bold mb-1">Bringing in</div>
        <div className="flex items-center gap-2">
          <CountryCode code={bench.country} className="w-8"/>
          <span className="font-semibold text-sm flex-1 text-text">{bench.name}</span>
          {benchEarn && <ScorePill status={benchEarn.status} position={benchEarn.position}/>}
          {benchEarn && <ScoreNum score={benchEarn.score} status={benchEarn.status}/>}
          <span className="font-mono text-text">{fmt(benchTotal)}</span>
        </div>
      </div>

      <p className="text-sm text-muted mb-3">
        Tap a starter to choose who they replace. Both golfers will be <strong className="text-text">locked for the season</strong> once you confirm.
      </p>
      <div className="space-y-2">
        {slot.starters.map((gid, idx) => {
          const s = G[gid];
          const earn = EARN[majorId]?.[gid];
          const sel = selectedIdx === idx;
          return (
            <button key={gid} onClick={() => setSelectedIdx(idx)}
              className={`w-full flex items-center gap-3 p-3 rounded-lg border text-left transition-colors ${sel ? "bg-green/10 border-green/50" : "bg-white border-line hover:bg-black/[0.03] hover:border-line-2"}`}>
              <CountryCode code={s.country} className="w-8" />
              <div className="flex-1">
                <div className="font-semibold">{s.name}</div>
                {earn && <div className="text-xs text-dim mt-0.5 flex items-center gap-2">
                  <ScorePill status={earn.status} position={earn.position} />
                  <ScoreNum score={earn.score} status={earn.status} />
                  <span className="font-mono">{fmt(golferTotal(majorId, gid))}</span>
                </div>}
              </div>
              {sel
                ? <svg viewBox="0 0 16 16" className="w-5 h-5 text-green shrink-0" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8l3 3 7-7"/></svg>
                : <span className="text-xs text-dim">Select</span>}
            </button>
          );
        })}
      </div>

      {/* Summary + Lock it in */}
      <div className="mt-4 pt-4 border-t border-line">
        {target ? (
          <>
            <div className="mb-3 text-sm text-text">
              <span className="text-muted">Confirm: </span>
              <strong>{target.name}</strong> sits out — <strong className="text-green">{bench.name}</strong> takes the slot.
            </div>
            <button onClick={() => onConfirm(selectedIdx)}
              className="w-full font-semibold bg-green text-bg2 rounded-lg py-2.5 hover:bg-green-2 transition-colors text-sm">
              Lock it in
            </button>
          </>
        ) : (
          <button disabled className="w-full font-semibold bg-black/[0.06] text-dim rounded-lg py-2.5 cursor-not-allowed text-sm">
            Select a starter to replace
          </button>
        )}
        <button onClick={onClose} className="mt-2 w-full text-sm text-dim hover:text-muted">Cancel</button>
      </div>
    </Modal>
  );
}

/* =========================================================================
   SUB-OUT MODAL — pick a bench player to swap in for this starter
   ========================================================================= */
function SubOutModal({ starterIndex, teamId, majorId, picks, onConfirm, onClose }) {
  const [selectedIdx, setSelectedIdx] = useState(null);
  const slot = picks[teamId][majorId];
  const starter = G[slot.starters[starterIndex]];
  const starterEarn = EARN[majorId]?.[slot.starters[starterIndex]];
  const incoming = selectedIdx !== null ? G[slot.bench[selectedIdx]] : null;
  return (
    <Modal title={`Sub out ${starter?.name}`} onClose={onClose}>
      {/* Starter sitting out */}
      {starterEarn && (
        <div className="mb-3 p-3 rounded-lg bg-black/[0.03] border border-line text-xs">
          <div className="text-[10px] uppercase tracking-wider text-dim mb-1">Sitting out</div>
          <div className="flex items-center gap-2">
            <CountryCode code={starter.country} className="w-8" />
            <span className="font-semibold text-sm flex-1 text-text">{starter.name}</span>
            <ScorePill status={starterEarn.status} position={starterEarn.position} />
            <ScoreNum score={starterEarn.score} status={starterEarn.status} />
            <span className="font-mono text-text">{fmt(golferTotal(majorId, slot.starters[starterIndex]))}</span>
          </div>
        </div>
      )}
      <p className="text-sm text-muted mb-3">
        Tap a bench player to bring in. Both golfers will be <strong className="text-text">locked for the season</strong> once you confirm.
      </p>
      <div className="space-y-2">
        {slot.bench.map((gid, idx) => {
          if (!gid) return null;
          const b = G[gid];
          const earn = EARN[majorId]?.[gid];
          const sel = selectedIdx === idx;
          return (
            <button key={gid} onClick={() => setSelectedIdx(idx)}
              className={`w-full flex items-center gap-3 p-3 rounded-lg border text-left transition-colors ${sel ? "bg-green/10 border-green/50" : "bg-white border-line hover:bg-black/[0.03] hover:border-line-2"}`}>
              <CountryCode code={b.country} className="w-8" />
              <div className="flex-1">
                <div className="font-semibold">{b.name}</div>
                {earn && <div className="text-xs text-dim mt-0.5 flex items-center gap-2">
                  <ScorePill status={earn.status} position={earn.position} />
                  <ScoreNum score={earn.score} status={earn.status} />
                  <span className="font-mono">{fmt(golferTotal(majorId, gid))}</span>
                </div>}
              </div>
              {sel
                ? <svg viewBox="0 0 16 16" className="w-5 h-5 text-green shrink-0" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8l3 3 7-7"/></svg>
                : <span className="text-xs text-dim">Select</span>}
            </button>
          );
        })}
        {slot.bench.every(x => x == null) && (
          <div className="text-sm text-dim px-3 py-4 text-center">No bench players available to swap in.</div>
        )}
      </div>

      {/* Summary + Lock it in */}
      <div className="mt-4 pt-4 border-t border-line">
        {incoming ? (
          <>
            <div className="mb-3 text-sm text-text">
              <span className="text-muted">Confirm: </span>
              <strong>{starter.name}</strong> sits out — <strong className="text-green">{incoming.name}</strong> takes the slot.
            </div>
            <button onClick={() => onConfirm(selectedIdx)}
              className="w-full font-semibold bg-green text-bg2 rounded-lg py-2.5 hover:bg-green-2 transition-colors text-sm">
              Lock it in
            </button>
          </>
        ) : (
          <button disabled className="w-full font-semibold bg-black/[0.06] text-dim rounded-lg py-2.5 cursor-not-allowed text-sm">
            Select a bench player
          </button>
        )}
        <button onClick={onClose} className="mt-2 w-full text-sm text-dim hover:text-muted">Cancel</button>
      </div>
    </Modal>
  );
}

/* =========================================================================
   GENERIC MODAL
   ========================================================================= */
function Modal({ title, children, onClose }) {
  useEffect(() => {
    const k = e => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", k);
    return () => document.removeEventListener("keydown", k);
  }, [onClose]);
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/70 backdrop-blur-sm fade-in" onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className="bg-bg2 w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl border border-line-2 max-h-[90vh] flex flex-col">
        <div className="px-5 py-4 border-b border-line flex items-center">
          <h3 className="font-bold text-base flex-1">{title}</h3>
          <button onClick={onClose} className="text-dim hover:text-text text-2xl leading-none">×</button>
        </div>
        <div className="p-4 sm:p-5 overflow-y-auto">{children}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
