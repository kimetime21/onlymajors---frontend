<title>OnlyMajors · Fantasy golf for the four majors</title>
<meta name="description" content="OnlyMajors — fantasy golf for the four majors. Pick four starters + two bench per major, earnings carry over the season." />
<meta property="og:title" content="OnlyMajors" />

<style>
  :root {
    /* Surfaces */
    --bg-0:    #efece1;
    --bg-1:    #f7f4ea;
    --bg-2:    #ffffff;
    --surface: rgba(17, 36, 26, 0.025);
    --surface-2: rgba(17, 36, 26, 0.05);
    --line:    rgba(17, 36, 26, 0.10);
    --line-2:  rgba(17, 36, 26, 0.18);
    /* Text */
    --text:  #112418;
    --muted: rgba(17, 36, 26, 0.66);
    --dim:   rgba(17, 36, 26, 0.42);
    /* Accents (deeper for contrast on cream) */
    --green:   #0f7a3e;
    --green-2: #0c6535;
    --gold:    #c9a227;
    --gold-2:  #e8c252;
    --red:     #b81d1d;
  }
  html, body {
    background:
      radial-gradient(ellipse 80% 60% at 12% 0%, rgba(15,122,62,0.06), transparent 60%),
      radial-gradient(ellipse 60% 50% at 88% 8%, rgba(166,121,35,0.05), transparent 60%),
      linear-gradient(180deg, #f7f4ea 0%, #efece1 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
  .glass {
    background: #ffffff;
    border: 1px solid var(--line);
    box-shadow: 0 1px 0 rgba(17,36,26,0.02), 0 10px 30px -20px rgba(17,36,26,0.16);
  }
  .glass-2 { background: #ffffff; border: 1px solid var(--line-2); box-shadow: 0 1px 0 rgba(17,36,26,0.02); }
  .text-muted { color: var(--muted); }
  .text-dim   { color: var(--dim); }
  .text-green { color: var(--green); }
  .text-gold  { color: var(--gold); }
  .text-red   { color: var(--red); }
  .bg-green   { background-color: var(--green); }
  .bg-green-2 { background-color: var(--green-2); }
  .bg-gold    { background-color: var(--gold); }
  .bg-bg2     { background-color: var(--bg-2); }
  .border-line { border-color: var(--line); }
  .border-line-2 { border-color: var(--line-2); }

  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { scrollbar-width: none; }

  @keyframes liveDot { 0%, 100% { opacity: 1; transform: scale(1) } 50% { opacity: 0.4; transform: scale(0.85) } }
  .live-dot { animation: liveDot 1.6s ease-in-out infinite; }

  @keyframes liveGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.5); } 50% { box-shadow: 0 0 0 6px rgba(248,113,113,0); } }
  .live-glow { animation: liveGlow 2s ease-in-out infinite; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px) } to { opacity: 1; transform: none } }
  .fade-in { animation: fadeIn 320ms ease-out both; }

  @keyframes scorePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(15, 122, 62, 0.55); transform: scale(1); }
    50%      { box-shadow: 0 0 0 10px rgba(15, 122, 62, 0); transform: scale(1.03); }
  }
  .score-pulse { animation: scorePulse 1.4s ease-in-out infinite; }

  @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
  .shimmer-text {
    background: linear-gradient(90deg, var(--text) 30%, var(--green) 50%, var(--text) 70%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 4s linear infinite;
  }

  .glow-green { box-shadow: 0 0 32px -10px rgba(15,122,62,0.35); }
  .glow-gold  { box-shadow: 0 0 24px -10px rgba(166,121,35,0.30); }

  .display-num {
    font-feature-settings: 'tnum' 1, 'ss01' 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }

  /* Course gradient backdrops for major hero cards */
  .scene-masters { background: linear-gradient(135deg, #d6e8c9 0%, #e9efd7 50%, #f7f4ea 100%); }
  .scene-pga     { background: linear-gradient(135deg, #ddd0eb 0%, #ebe3f0 50%, #f7f4ea 100%); }
  .scene-usopen  { background: linear-gradient(135deg, #d1dfe8 0%, #e6ecf0 50%, #f7f4ea 100%); }
  .scene-open    { background: linear-gradient(135deg, #ecdfba 0%, #f0e6cc 50%, #f7f4ea 100%); }

  /* Subtle dot grid on hero */
  .dot-grid {
    background-image: radial-gradient(rgba(17,36,26,0.06) 1px, transparent 1px);
    background-size: 16px 16px;
  }
</style>

// Date-driven status overlay. Mutates each major's `status` field at module
// load based on real time: before first tee → upcoming, during the four-day
// window → live, after lastFinish → complete. This auto-handles tournament
// transitions (PGA wraps Sunday night → flips to complete) without code pushes.
(function syncMajorStatusFromDate() {
  const now = Date.now();
  for (const m of MAJORS) {
    const start = new Date(m.firstTeeTime).getTime();
    const end   = new Date(m.lastFinish || m.firstTeeTime).getTime() + 60*60*1000; // +1h grace
    if (now < start)      m.status = "upcoming";
    else if (now < end)   m.status = "live";
    else                  m.status = "complete";

    // Auto-flip fieldStatus to "set" once the calendar passes the lock date.
    // The lock date is the start of the day, so we set EOD by adding 24h.
    if (m.fieldLockDate && m.fieldStatus !== "set") {
      // fieldLockDate is a short label like "Jun 8"; parse using year from firstTeeTime
      const year = new Date(m.firstTeeTime).getFullYear();
      const parsed = new Date(`${m.fieldLockDate} ${year} 23:59:59`);
      if (!isNaN(parsed.getTime()) && now >= parsed.getTime()) {
        m.fieldStatus = "set";
      }
    }
  }
})();

// Approximate window during which a given round is in progress: tee time
// → tee+12h (covers AM + PM waves). Used to gate substitutions.
const ROUND_LENGTH_MS = 12 * 60 * 60 * 1000;
function activeRoundInProgress(major) {
  if (!major?.rounds) return null;
  const now = Date.now();
  for (const r of [1, 2, 3, 4]) {
    const tee = major.rounds[`r${r}`];
    if (!tee) continue;
    const teeMs = new Date(tee).getTime();
    if (now >= teeMs && now < teeMs + ROUND_LENGTH_MS) return r;
  }
  return null;
}
function nextRoundStart(major) {
  if (!major?.rounds) return null;
  const now = Date.now();
  for (const r of [1, 2, 3, 4]) {
    const tee = major.rounds[`r${r}`];
    if (!tee) continue;
    const teeMs = new Date(tee).getTime();
    if (now < teeMs) return { round: r, at: new Date(tee) };
  }
  return null;
}
// True if a player can be subbed in/out for this major right now.
// Rule: tournament is live AND no round is currently in progress (between rounds only).
function canSubInMajor(major) {
  if (!major || major.status !== "live") return false;
  return activeRoundInProgress(major) === null;
}

// Has picks for this major already been revealed to the whole league?
function picksRevealed(major) { return new Date(major.firstTeeTime) <= SEASON_TODAY; }
function daysUntilLock(major) {
  const ms = new Date(major.firstTeeTime).getTime() - SEASON_TODAY.getTime();
  return Math.ceil(ms / (1000*60*60*24));
}
// Picks open 2 weeks before the first tee time (when the field is essentially set)
function arePicksOpen(major) {
  // Dev override: ?preview=usopen (or any major id) treats that major's picks
  // as already open. Useful for previewing the picks UI before launch date.
  try {
    const params = new URLSearchParams(window.location.search);
    const preview = params.get("preview");
    if (preview && (preview === major.id || preview === "all")) return true;
  } catch {}
  return new Date(major.picksOpenDate) <= SEASON_TODAY;
}
function daysUntilPicksOpen(major) {
  const ms = new Date(major.picksOpenDate).getTime() - SEASON_TODAY.getTime();
  return Math.ceil(ms / (1000*60*60*24));
}

const fmt = (n) => {
  if (n === null || n === undefined) return "—";
  if (typeof n !== "number" || !Number.isFinite(n)) return "—";
  if (n === 0) return "$0";
  if (n >= 1_000_000) return "$" + (n/1_000_000).toFixed(n%1_000_000===0?1:2).replace(/\.?0+$/, '') + "M";
  if (n >= 10_000)    return "$" + Math.round(n/1000) + "k";
  if (n >= 1_000)     return "$" + (n/1000).toFixed(1) + "k";
  return "$" + n.toLocaleString();
};
const fmtFull = (n) => (n === null || n === undefined || typeof n !== "number" || !Number.isFinite(n)) ? "—" : "$" + n.toLocaleString();

// Prize tables per major. Tied players ALL receive the prize for the BASE position
// of the tied group (e.g. T1 → 1st-place prize each, T6 → 6th-place prize each).
// Final earnings on Sunday will reflect actual real-tour distribution.
const PRIZE_TABLES = {
  pga: { 1: 3420000, 2: 2052000, 3: 1292000, 4: 912000, 5: 760000,
         6: 684000,  7: 636500,  8: 589000,  9: 551000, 10: 513000,
         11: 475000, 12: 437500, 13: 408500, 14: 380000, 15: 351500,
         16: 323000, 17: 294500, 18: 266000, 19: 251000, 20: 237000,
         21: 223000, 22: 209000, 23: 196500, 24: 184000, 25: 175500,
         26: 167000, 27: 158500, 28: 150500, 29: 143500, 30: 136500,
         35: 100000, 40: 75000,  50: 50000,  60: 38000,  70: 30000 },
  // Other majors filled in similarly when they go live; using PGA as the demo's live event
};
function projectedPrize(majorId, position) {
  if (!position) return null;
  const table = PRIZE_TABLES[majorId];
  if (!table) return null;
  const n = parseInt(position.replace(/^T/, ""));
  if (isNaN(n)) return null;
  if (table[n] != null) return table[n];
  // Find the next-highest position with a defined prize (so a player at position 33 maps to 30's prize, etc.)
  const lower = Object.keys(table).map(Number).filter(k => k <= n);
  return lower.length ? table[Math.max(...lower)] : 25000;
}

function golferTotal(majorId, golferId) {
  const e = EARN[majorId]?.[golferId];
  if (!e) return null;
  if (e.status === "mc" || e.status === "wd" || e.status === "dfl") return 0;
  if (e.r4 != null) return e.r4;
  if (e.r3 != null) return e.r3;
  // Live mid-tournament: prefer the position-based projection (tied-player rule applied)
  const proj = projectedPrize(majorId, e.position);
  if (proj != null) return proj;
  return e.r2 ?? e.r1 ?? null;
}

// --- IN/OUT helpers ------------------------------------------------------
// A sub records {out: starterId, in: benchId}. Positions stay; only the
// "is this player counting?" flag flips. Subbed-out starters don't count
// for team total; subbed-in benchers do.
function getSubbedOut(slot)  { return new Set((slot?.subs || []).map(s => s.out).filter(Boolean)); }
function getSubbedIn(slot)   { return new Set((slot?.subs || []).map(s => s.in ).filter(Boolean)); }
function isGolferIn(slot, golferId) {
  if (!golferId || !slot) return false;
  const subbedOut = getSubbedOut(slot);
  const subbedIn  = getSubbedIn(slot);
  if (slot.starters?.includes(golferId)) return !subbedOut.has(golferId);  // starter, in unless subbed out
  if (slot.bench?.includes(golferId))    return subbedIn.has(golferId);    // bench, in only if subbed in
  return false;
}
function inGolfers(slot) {
  if (!slot) return [];
  const subbedOut = getSubbedOut(slot);
  return [
    ...(slot.starters || []).filter(g => g && !subbedOut.has(g)),
    ...[...getSubbedIn(slot)],
  ];
}
function outGolfers(slot) {
  if (!slot) return [];
  const subbedIn = getSubbedIn(slot);
  return [
    ...(slot.bench || []).filter(g => g && !subbedIn.has(g)),
    ...[...getSubbedOut(slot)],
  ];
}

// Team total = sum of IN golfers' earnings (counts subbed-in benchers; ignores subbed-out starters)
function teamMajorTotal(teamId, majorId, picks = PICKS) {
  const p = picks[teamId]?.[majorId];
  if (!p) return 0;
  return inGolfers(p).reduce((s, gid) => s + (golferTotal(majorId, gid) ?? 0), 0);
}
// Left on Base = OUT golfers' earnings (uncounted bench + subbed-out starters)
function teamMajorLOB(teamId, majorId, picks = PICKS) {
  const p = picks[teamId]?.[majorId];
  if (!p) return 0;
  return outGolfers(p).reduce((s, gid) => s + (golferTotal(majorId, gid) ?? 0), 0);
}
// Original-starters total (Tiebreaker 1) — always uses the IMMUTABLE PICKS constant, before any subs
function teamMajorOriginalTotal(teamId, majorId) {
  const p = PICKS[teamId]?.[majorId];
  if (!p) return 0;
  return p.starters.reduce((s, gid) => s + (golferTotal(majorId, gid) ?? 0), 0);
}
function teamSeasonTotal(teamId, picks = PICKS) {
  return MAJORS.reduce((s, m) => s + teamMajorTotal(teamId, m.id, picks), 0);
}
function teamSeasonOriginalTotal(teamId) {
  return MAJORS.reduce((s, m) => s + teamMajorOriginalTotal(teamId, m.id), 0);
}
function teamSeasonLOB(teamId, picks = PICKS) {
  return MAJORS.reduce((s, m) => s + teamMajorLOB(teamId, m.id, picks), 0);
}

// Tiebreaker comparators — total desc, then originalTotal desc, then lob desc
function compareTeamsByMajor(a, b) {
  if (b.total !== a.total) return b.total - a.total;
  if (b.originalTotal !== a.originalTotal) return b.originalTotal - a.originalTotal;
  return b.lob - a.lob;
}
function playedGolfers(teamId, picks = PICKS) {
  const used = new Set();
  for (const m of MAJORS) {
    if (m.status === "upcoming") continue;
    const p = picks[teamId]?.[m.id];
    if (!p) continue;
    // A golfer is "played" if they ended the major as IN (counting) — which
    // means starters who weren't subbed out, plus bench who were subbed in.
    inGolfers(p).forEach(g => g && used.add(g));
  }
  return used;
}

const ONLYMAJORS_API = "https://api.onlymajors.com";

// Production-friendly first; client-side fetch as a prototype shortcut.
async function fetchMajorLeaderboard(majorId) {
  const major = M[majorId];
  if (!major) throw new Error(`Unknown major: ${majorId}`);

  try {
    const res = await authFetch(`${ONLYMAJORS_API}/api/leaderboard/${majorId}`, { cache: "no-store" });
    if (res.ok) return await res.json();
    throw new Error(`Backend HTTP ${res.status}`);
  } catch (e) {
    // fall through to local DataGolf key path (browser-direct, usually CORS-blocked)
  }

  // Path B: prototype-only direct-from-browser call (key in localStorage).
  // Will likely CORS-fail; that's expected and tells you to use Path A.
  const key = getDataGolfKey();
  if (!key) throw new Error("No DataGolf key set · paste yours in API Settings, or deploy the backend");

  const url = `https://feeds.datagolf.com/preds/live-tournament-stats?stats=sg_total&display=value&file_format=json&key=${encodeURIComponent(key)}`;
  let res;
  try { res = await fetch(url, { cache: "no-store" }); }
  catch (e) { throw new Error("CORS blocked browser-direct call · deploy backend-leaderboard.js for the real wiring"); }
  if (!res.ok) throw new Error(`DataGolf HTTP ${res.status}`);
  const data = await res.json();

  // Normalize DataGolf shape → app shape
  const golfers = {};
  for (const p of (data.live_stats || data || [])) {
    const gid = matchGolferByName(p.player_name);
    if (!gid) continue;
    golfers[gid] = {
      position: p.tied ? `T${p.position}` : `${p.position}`,
      score:    typeof p.total === "number" ? p.total : null,
      thru:     p.thru ?? "",
      status:   p.made_cut === false ? "mc" : "made_cut",
    };
  }
  return { golfers };
}

// Minimal name-to-golferId matcher for the prototype direct-fetch path.
// Production uses DataGolf's stable dg_id (added to each golfer in GOLFERS) instead.
function matchGolferByName(dgName) {
  if (!dgName) return null;
  // DataGolf format: "Last, First" — flip to "First Last"
  const flipped = dgName.includes(",") ? dgName.split(",").reverse().join(" ").trim() : dgName;
  const norm = (s) => (s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/[^a-z]/g, "");
  const target = norm(flipped);
  for (const g of GOLFERS) {
    if (norm(g.name) === target) return g.id;
  }
  // last-name fallback
  const lastTarget = norm(flipped.split(/\s+/).pop());
  for (const g of GOLFERS) {
    if (norm(g.name.split(/\s+/).pop()) === lastTarget) return g.id;
  }
  return null;
}

/* =========================================================================
   AUTH HELPERS — bearer token + signup/login/me
   ========================================================================= */
function getToken() {
  try { return localStorage.getItem("epga.token") || null; } catch { return null; }
}
function setToken(t) {
  try {
    if (t) localStorage.setItem("epga.token", t);
    else   localStorage.removeItem("epga.token");
  } catch {}
}
// All API calls go through this so the Bearer token is attached automatically
// and any 401 globally clears the token + reloads to the login screen.
async function authFetch(url, opts = {}) {
  const token = getToken();
  const headers = { ...(opts.headers || {}) };
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const res = await fetch(url, { ...opts, headers });
  if (res.status === 401 && token) {
    // Session expired or invalid — wipe and reload.
    setToken(null);
    try { localStorage.removeItem("epga.user"); } catch {}
    window.location.reload();
    return res;
  }
  return res;
}

const GOLFERS_EXT = {};
function golferLookup(gid) {
  return G[gid] || GOLFERS_EXT[gid] || { id: gid, name: gid, country: "" };
}

/* =========================================================================
   PERSISTENCE API HELPERS  (Postgres-backed, with localStorage fallback)
   ========================================================================= */
async function fetchAllPicks() {
  const res = await authFetch(`${ONLYMAJORS_API}/api/picks`, { cache: "no-store" });
  if (!res.ok) throw new Error(`/api/picks HTTP ${res.status}`);
  return await res.json();
}
async function savePick(teamId, majorId, slot) {
  const body = {
    starters:        slot?.starters  || [],
    bench:           slot?.bench     || [],
    subs:            slot?.subs      || [],
    submitted:       !!slot?.submitted,
    scorePrediction: slot?.scorePrediction ?? null,
  };
  const res = await authFetch(`${ONLYMAJORS_API}/api/picks/${teamId}/${majorId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`PUT /api/picks HTTP ${res.status}`);
}
async function fetchAllChat() {
  const res = await authFetch(`${ONLYMAJORS_API}/api/chat`, { cache: "no-store" });
  if (!res.ok) throw new Error(`/api/chat HTTP ${res.status}`);
  return await res.json();
}
async function postChat(teamId, text) {
  const res = await authFetch(`${ONLYMAJORS_API}/api/chat`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ teamId, text }),
  });
  if (!res.ok) throw new Error(`POST /api/chat HTTP ${res.status}`);
  return await res.json();
}
async function fetchAllProfiles() {
  const res = await authFetch(`${ONLYMAJORS_API}/api/profiles`, { cache: "no-store" });
  if (!res.ok) throw new Error(`/api/profiles HTTP ${res.status}`);
  return await res.json();
}
async function saveProfileAPI(teamId, profile) {
  const res = await authFetch(`${ONLYMAJORS_API}/api/profiles/${teamId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(profile),
  });
  if (!res.ok) throw new Error(`PUT /api/profiles HTTP ${res.status}`);
}

/* =========================================================================
   PLAYER STATS FETCH  (GET /api/stats/:majorId/:golferId)
   Returns SG breakdown, traditional stats, round-by-round, season totals.
   ========================================================================= */
async function fetchPlayerStats(majorId, golferId) {
  // For unmatched players (synthetic "dg-xxxxx" id) pass straight through.
  // For curated short ids ("scottie"), backend resolves via its reverse map.
  const res = await authFetch(`${ONLYMAJORS_API}/api/stats/${majorId}/${encodeURIComponent(golferId)}`, { cache: "no-store" });
  if (!res.ok) throw new Error(`Stats HTTP ${res.status}`);
  return await res.json();
}

/* =========================================================================
   ROOT APP
   ========================================================================= */
function App() {
  // Auth state — null means signed out. `user` here is the TEAMS-shaped object
  // (id, name, color, etc.) that the rest of the app expects. We derive it from
  // the server's authenticated user + their league_member team slot.
  const [user, setUser] = useState(null);
  const [authedUser, setAuthedUser] = useState(null);   // { id, email, displayName } from server
  const [leagues, setLeagues]       = useState([]);     // { id, teamId, teamName, ... }
  const [authChecking, setAuthChecking] = useState(true);
  const [tab, setTab] = useState("picks");
  // Default selected major: pick the most relevant one based on calendar.
  //   1. Live major (a tournament is currently in progress) — most urgent.
  //   2. Any upcoming major whose pick window has opened (2 weeks before tee).
  //   3. The next upcoming major (so users can preview the field).
  //   4. Most recently completed major as a last resort.
  const [selectedMajor, setSelectedMajor] = useState(() => {
    const live = MAJORS.find(m => m.status === "live");
    if (live) return live.id;
    const upcomingOpen = MAJORS.find(m => m.status === "upcoming" && arePicksOpen(m));
    if (upcomingOpen) return upcomingOpen.id;
    const nextUpcoming = MAJORS.find(m => m.status === "upcoming");
    if (nextUpcoming) return nextUpcoming.id;
    const completed = MAJORS.filter(m => m.status === "complete");
    return completed[completed.length - 1]?.id || MAJORS[0].id;
  });

  // Map a /api/me response to the TEAMS-shaped user object the rest of the app uses.
  const applyAuthResult = (r) => {
    setAuthedUser(r.user);
    setLeagues(r.leagues || []);
    const primary = r.leagues?.[0];
    if (!primary) { setUser(null); return; }
    const teamShape = TEAMS.find(t => t.id === primary.teamId) || {};
    const merged = {
      ...teamShape,
      id:   primary.teamId,
      name: primary.teamName || teamShape.name,
      color: primary.teamColor || teamShape.color,
      email: r.user.email,
      displayName: r.user.displayName,
      authedUserId: r.user.id,
      leagueId: primary.id,
    };
    setUser(merged);
    try { localStorage.setItem("epga.user", JSON.stringify(merged)); } catch {}
  };

  // On mount: if we have a token, hydrate from /api/me.
  useEffect(() => {
    if (!getToken()) { setAuthChecking(false); return; }
    apiMe()
      .then(r => applyAuthResult(r))
      .catch(e => {
        console.warn("auth check failed:", e.message);
        setToken(null);
        setUser(null);
      })
      .finally(() => setAuthChecking(false));
  }, []);

  const signOut = async () => {
    await apiLogout();
    try { ["epga.user","epga.picks","epga.profiles","epga.chat","epga.token"].forEach(k => localStorage.removeItem(k)); } catch {}
    window.location.reload();
  };
  const viewAs = user?.id;
  const [pickerState, setPickerState] = useState(null);
  const [subState, setSubState] = useState(null);
  const [subOutState, setSubOutState] = useState(null);
  // Dynamic field per major (fetched from backend on mount). When set, the
  // picker uses this real DataGolf field instead of the static FIELDS list.
  const [dynamicFields, setDynamicFields] = useState({});
  useEffect(() => {
    const targets = MAJORS.filter(m => m.status === "upcoming" || m.status === "live");
    Promise.allSettled(targets.map(m =>
      fetchMajorField(m.id).then(r => {
        // Hydrate the GOLFERS_EXT registry so unmatched players still render
        // correctly elsewhere in the UI when they get picked.
        for (const p of r.players || []) {
          if (!p.matched && p.gid && !GOLFERS_EXT[p.gid]) {
            GOLFERS_EXT[p.gid] = { id: p.gid, name: p.name, country: p.country };
          }
        }
        return [m.id, r];
      })
    )).then(results => {
      const out = {};
      for (const r of results) {
        if (r.status === "fulfilled" && r.value) out[r.value[0]] = r.value[1];
      }
      setDynamicFields(out);
    });
  }, []);

  const [picksDraft, setPicksDraft] = useState(() => {
    try { const saved = localStorage.getItem("epga.picks"); if (saved) return JSON.parse(saved); } catch {}
    return PICKS;
  });

  // Track last-saved-to-server snapshot to diff and save only changed slots.
  const lastSavedPicksRef = useRef(null);

  // Hydrate picks from server on mount. Server is source of truth; localStorage
  // is just an offline cache for first-paint speed.
  useEffect(() => {
    fetchAllPicks().then(server => {
      if (server && Object.keys(server).length > 0) {
        // Merge into the PICKS skeleton so any missing team/major slots still exist.
        const merged = JSON.parse(JSON.stringify(PICKS));
        for (const teamId of Object.keys(server)) {
          merged[teamId] = { ...(merged[teamId] || {}), ...server[teamId] };
        }
        setPicksDraft(merged);
        lastSavedPicksRef.current = JSON.parse(JSON.stringify(merged));
      } else {
        lastSavedPicksRef.current = JSON.parse(JSON.stringify(picksDraft));
      }
    }).catch(e => {
      console.warn("picks hydrate failed, using local state:", e.message);
      lastSavedPicksRef.current = JSON.parse(JSON.stringify(picksDraft));
    });
  // eslint-disable-next-line
  }, []);

  // Persist picks to localStorage on every change + push changed slots to server (debounced).
  useEffect(() => {
    try { localStorage.setItem("epga.picks", JSON.stringify(picksDraft)); } catch {}
    if (!lastSavedPicksRef.current) return;
    const t = setTimeout(() => {
      const last = lastSavedPicksRef.current;
      const promises = [];
      for (const teamId of Object.keys(picksDraft)) {
        for (const majorId of Object.keys(picksDraft[teamId] || {})) {
          const a = JSON.stringify(picksDraft[teamId][majorId]);
          const b = JSON.stringify(last?.[teamId]?.[majorId]);
          if (a !== b) promises.push(savePick(teamId, majorId, picksDraft[teamId][majorId]));
        }
      }
      Promise.allSettled(promises).then(() => {
        lastSavedPicksRef.current = JSON.parse(JSON.stringify(picksDraft));
      });
    }, 400);
    return () => clearTimeout(t);
  }, [picksDraft]);

  // Defensive: on mount, remove any locked golfer (starter in completed/live major)
  // from any upcoming major's lineup. Handles stale persisted state from prior sessions.
  useEffect(() => {
    let cleaned = false;
    const next = JSON.parse(JSON.stringify(picksDraft));
    for (const teamId of Object.keys(next)) {
      const lockedSet = new Set();
      for (const m of MAJORS) {
        if (m.status === "upcoming") continue;
        next[teamId]?.[m.id]?.starters?.forEach(g => g && lockedSet.add(g));
      }
      for (const m of MAJORS) {
        if (m.status !== "upcoming") continue;
        const slot = next[teamId]?.[m.id];
        if (!slot) continue;
        const beforeS = JSON.stringify(slot.starters);
        const beforeB = JSON.stringify(slot.bench);
        slot.starters = compact((slot.starters || []).map(g => lockedSet.has(g) ? null : g), 4);
        slot.bench    = compact((slot.bench    || []).map(g => lockedSet.has(g) ? null : g), 2);
        if (JSON.stringify(slot.starters) !== beforeS || JSON.stringify(slot.bench) !== beforeB) cleaned = true;
      }
    }
    if (cleaned) setPicksDraft(next);
  // eslint-disable-next-line
  }, []);

  // Chat state — server is source of truth, localStorage is offline cache.
  const [chatMessages, setChatMessages] = useState(() => {
    try { const saved = localStorage.getItem("epga.chat"); if (saved) return JSON.parse(saved); } catch {}
    return CHAT_SEED;
  });
  useEffect(() => {
    try { localStorage.setItem("epga.chat", JSON.stringify(chatMessages)); } catch {}
  }, [chatMessages]);

  // Hydrate chat from server on mount + poll every 30s for new messages.
  useEffect(() => {
    let stopped = false;
    const pull = () => fetchAllChat()
      .then(server => { if (!stopped && Array.isArray(server)) setChatMessages(server); })
      .catch(e => console.warn("chat hydrate failed:", e.message));
    pull();
    const id = setInterval(pull, 30_000);
    return () => { stopped = true; clearInterval(id); };
  }, []);

  const sendMessage = (text) => {
    if (!text.trim() || !user) return;
    // Optimistic update — show the message immediately, then reconcile with server.
    const optimistic = { id: `tmp-${Date.now()}`, teamId: user.id, text: text.trim(), ts: Date.now() };
    setChatMessages(prev => [...prev, optimistic]);
    postChat(user.id, text.trim())
      .then(saved => {
        setChatMessages(prev => prev.map(m => m.id === optimistic.id ? saved : m));
      })
      .catch(e => console.warn("chat send failed:", e.message));
  };

  const resetPicks = () => {
    if (confirm("Reset all picks back to the default season state? This clears any subs you've made.")) {
      setPicksDraft(PICKS);
      try { localStorage.removeItem("epga.picks"); } catch {}
    }
  };

  const resetAll = () => {
    if (confirm("Reset all demo data? This wipes your sign-in, picks, profile customizations, and chat history — everything goes back to a fresh state.")) {
      try {
        ["epga.user", "epga.picks", "epga.profiles", "epga.chat"].forEach(k => localStorage.removeItem(k));
      } catch {}
      // Hard reload to fully reinitialize state
      window.location.reload();
    }
  };

  // After a sub locks a player for the season, remove them from any upcoming major's lineup
  const cleanupAfterLock = (picks, teamId, currentMajorId, lockedGolferId) => {
    const removedFrom = [];
    for (const m of MAJORS) {
      if (m.id === currentMajorId) continue;
      if (m.status !== "upcoming") continue;
      const slot = picks[teamId]?.[m.id];
      if (!slot) continue;
      const wasInStarters = slot.starters.includes(lockedGolferId);
      const wasInBench    = slot.bench.includes(lockedGolferId);
      if (!wasInStarters && !wasInBench) continue;
      slot.starters = compact(slot.starters.map(g => g === lockedGolferId ? null : g), 4);
      slot.bench    = compact(slot.bench.map(g    => g === lockedGolferId ? null : g), 2);
      removedFrom.push(m.short);
    }
    return removedFrom;
  };

  const notifyCleanup = (lockedGolferId, removedFrom) => {
    const name = G[lockedGolferId]?.name || "Player";
    setSyncStatus("ok");
    setSyncMessage(`${name} removed from ${removedFrom.join(" + ")} picks · now locked for the season`);
  };

  // Clear a pick slot (Remove button next to Change)
  const removePick = (majorId, slotType, slotIndex) => {
    const next = JSON.parse(JSON.stringify(picksDraft));
    const slot = next[viewAs]?.[majorId];
    if (!slot) return;
    if (slotType === "starter") {
      slot.starters[slotIndex] = null;
      slot.starters = compact(slot.starters, 4);
    } else {
      slot.bench[slotIndex] = null;
      slot.bench = compact(slot.bench, 2);
    }
    setPicksDraft(next);
  };

  // Apply persisted profile overrides into the TEAMS array on mount.
  // First try the server (cross-device source of truth), then fall back to
  // localStorage. Either way the result lands in the in-memory TEAMS array.
  const [profileVersion, setProfileVersion] = useState(0);
  useEffect(() => {
    const applyOverrides = (profiles) => {
      for (const [tid, overrides] of Object.entries(profiles || {})) {
        const i = TEAMS.findIndex(t => t.id === tid);
        if (i !== -1) Object.assign(TEAMS[i], overrides);
      }
      if (user) {
        const fresh = TEAMS.find(t => t.id === user.id);
        if (fresh) setUser({ ...fresh });
      }
      setProfileVersion(v => v + 1);
    };
    // Local cache first for instant first paint
    try {
      const local = JSON.parse(localStorage.getItem("epga.profiles") || "{}");
      applyOverrides(local);
    } catch {}
    // Then server overrides. Server uses { displayName, teamName, email } —
    // remap teamName → name to match TEAMS' native shape.
    fetchAllProfiles()
      .then(server => {
        if (!server || Object.keys(server).length === 0) return;
        const normalized = {};
        for (const [tid, p] of Object.entries(server)) {
          normalized[tid] = {
            ...(p.displayName ? { displayName: p.displayName } : {}),
            ...(p.teamName    ? { name: p.teamName }            : {}),
            ...(p.email       ? { email: p.email }              : {}),
          };
        }
        applyOverrides(normalized);
        try { localStorage.setItem("epga.profiles", JSON.stringify(normalized)); } catch {}
      })
      .catch(e => console.warn("profile hydrate failed:", e.message));
  // eslint-disable-next-line
  }, []);

  const saveProfile = (updates) => {
    if (!user) return;
    const i = TEAMS.findIndex(t => t.id === user.id);
    if (i === -1) return;
    Object.assign(TEAMS[i], updates);
    const updatedUser = { ...TEAMS[i] };
    setUser(updatedUser);
    try {
      localStorage.setItem("epga.user", JSON.stringify(updatedUser));
      const profiles = JSON.parse(localStorage.getItem("epga.profiles") || "{}");
      profiles[user.id] = { ...(profiles[user.id] || {}), ...updates };
      localStorage.setItem("epga.profiles", JSON.stringify(profiles));
    } catch {}
    // Push the same fields to the server, fire-and-forget.
    saveProfileAPI(user.id, {
      displayName: updates.displayName ?? null,
      teamName:    updates.name        ?? null,
      email:       updates.email       ?? null,
    }).catch(e => console.warn("profile save failed:", e.message));
    setProfileVersion(v => v + 1);
  };

  // ---- Realtime sync state ----
  const [syncStatus, setSyncStatus] = useState("idle"); // 'idle' | 'syncing' | 'ok' | 'error'
  const [syncMessage, setSyncMessage] = useState("");
  const [lastUpdated, setLastUpdated] = useState(null);
  const [syncToken, setSyncToken] = useState(0); // force re-render after merging into EARN

  // Merge a backend leaderboard response into EARN[majorId]. Extracted so we
  // can call it both for the auto-refresh of the live major AND for a one-time
  // hydration of any complete major on mount.
  //
  // `onlyNew: true` skips players that already exist in the seed — used for
  // mount-time hydration of complete majors so the backend's stale or wrong-
  // tournament data can't contaminate carefully-curated seed entries.
  const mergeIntoEarn = (majorId, data, onlyNew = false) => {
    let matched = 0;
    EARN[majorId] = EARN[majorId] || {};
    for (const [gid, upd] of Object.entries(data.golfers || {})) {
      if (onlyNew && EARN[majorId][gid]) continue;
      const cur = EARN[majorId][gid] || { r1:null, r2:null, r3:null, r4:null };
      EARN[majorId][gid] = {
        ...cur,
        position: upd.position || cur.position,
        score:    upd.score === null || upd.score === undefined ? cur.score : upd.score,
        thru:     upd.thru || cur.thru,
        status:   upd.status || cur.status,
        name:     upd.name    ?? cur.name    ?? null,
        country:  upd.country ?? cur.country ?? null,
        matched:  upd.matched ?? cur.matched ?? null,
        dg_id:    upd.dg_id   ?? cur.dg_id   ?? null,
        r1: upd.r1 ?? cur.r1 ?? null,
        r2: upd.r2 ?? cur.r2 ?? null,
        r3: upd.r3 ?? cur.r3 ?? null,
        r4: upd.r4 ?? cur.r4 ?? null,
        r1Score: upd.r1Score ?? cur.r1Score ?? null,
        r2Score: upd.r2Score ?? cur.r2Score ?? null,
        r3Score: upd.r3Score ?? cur.r3Score ?? null,
        r4Score: upd.r4Score ?? cur.r4Score ?? null,
      };
      matched++;
    }
    return matched;
  };

  const refresh = async () => {
    const live = MAJORS.find(m => m.status === "live");
    if (!live) { setSyncStatus("idle"); setSyncMessage(""); return; }
    setSyncStatus("syncing"); setSyncMessage("");
    try {
      const data = await fetchMajorLeaderboard(live.id);
      const matched = mergeIntoEarn(live.id, data);
      setSyncStatus("ok"); setSyncMessage(`Synced ${matched} players from ${LIVE_SOURCES[live.id].name}`);
      setLastUpdated(new Date());
      setSyncToken(t => t + 1);
    } catch (err) {
      console.warn("Sync failed:", err);
      setSyncStatus("error");
      setSyncMessage(err.message || "Live source unreachable");
    }
  };

  // Auto-refresh on mount, then every 60s for the live major only.
  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 60_000);
    return () => clearInterval(id);
  }, []);

  // One-time mount-time hydration for COMPLETE majors. Uses onlyNew=true so
  // backend data (which may be contaminated with this-week's tour event when
  // DataGolf in-play has moved on) can ONLY add brand-new players to EARN,
  // never overwrite a hand-curated seed entry. This way Masters seed stays
  // pristine while PGA-only players like Fowler/Rai/Woodland still get added.
  useEffect(() => {
    const completeMajors = MAJORS.filter(m => m.status === "complete");
    Promise.allSettled(
      completeMajors.map(m =>
        fetchMajorLeaderboard(m.id)
          .then(data => mergeIntoEarn(m.id, data, /* onlyNew */ true))
          .catch(e => console.warn(`hydrate ${m.id} failed:`, e.message))
      )
    ).then(() => setSyncToken(t => t + 1));
  // eslint-disable-next-line
  }, []);

  if (authChecking) return <div className="min-h-screen flex items-center justify-center text-dim text-sm">Loading…</div>;
  if (!user) return <LoginScreen onAuthed={applyAuthResult} />;

  return (
    <div className="min-h-screen flex flex-col" data-sync={syncToken}>
      <TopBar user={user} onSignOut={signOut} onSwitchUser={null} onResetPicks={resetPicks} onResetAll={resetAll} onOpenProfile={() => setTab("profile")} onOpenLeague={() => setTab("league")} />
      <TabBar tab={tab} setTab={setTab} />
      <main className="flex-1 max-w-6xl w-full mx-auto px-4 sm:px-6 py-6 fade-in" key={tab}>
        {tab === "picks" && (
          <PicksTab viewAs={viewAs} selectedMajor={selectedMajor} setSelectedMajor={setSelectedMajor}
            picks={picksDraft} setPicks={setPicksDraft} openPicker={setPickerState} openSub={setSubState} openSubOut={setSubOutState} onRemove={removePick}
            syncStatus={syncStatus} syncMessage={syncMessage} lastUpdated={lastUpdated} onRefresh={refresh} />
        )}
        {tab === "live"        && <LiveTab picks={picksDraft} syncStatus={syncStatus} syncMessage={syncMessage} lastUpdated={lastUpdated} onRefresh={refresh} onGotoPicks={() => setTab("picks")} />}

        {tab === "chat"        && <ChatTab user={user} picks={picksDraft} messages={chatMessages} onSend={sendMessage} />}
        {tab === "leaderboard" && <LeaderboardTab picks={picksDraft} viewAs={viewAs} />}
        {tab === "league"      && <LeagueTab />}
        {tab === "profile"     && <ProfileTab user={user} onSave={saveProfile} onBack={() => setTab("picks")} />}
      </main>
      <Footer />
      <SyncToast status={syncStatus} message={syncMessage} />


      {pickerState && (
        <PickerModal state={pickerState} teamId={viewAs} majorId={selectedMajor} picks={picksDraft} dynamicField={dynamicFields[selectedMajor]}
          onPick={(gid) => {
            const next = JSON.parse(JSON.stringify(picksDraft));
            const slot = next[viewAs][selectedMajor];
            slot.starters = slot.starters.map(g => g === gid ? null : g);
            slot.bench    = slot.bench.map(g => g === gid ? null : g);
            const arr = pickerState.slotType === "starter" ? slot.starters : slot.bench;
            arr[pickerState.slotIndex] = gid;
            slot.starters = compact(slot.starters, 4);
            slot.bench    = compact(slot.bench, 2);
            setPicksDraft(next);
            setPickerState(null);
          }}
          onClose={() => setPickerState(null)} />
      )}
      {subState && (
        <SubInModal benchIndex={subState.benchIndex} teamId={viewAs} majorId={selectedMajor} picks={picksDraft}
          onConfirm={(starterIndex) => {
            const next = JSON.parse(JSON.stringify(picksDraft));
            const slot = next[viewAs][selectedMajor];
            const b = slot.bench[subState.benchIndex];     // bench player being subbed IN
            const s = slot.starters[starterIndex];          // starter being subbed OUT
            slot.subs = slot.subs || [];
            slot.subs.push({ out: s, in: b });              // positions stay; just record the swap
            const removedFrom = cleanupAfterLock(next, viewAs, selectedMajor, b);
            setPicksDraft(next);
            setSubState(null);
            if (removedFrom.length) notifyCleanup(b, removedFrom);
          }}
          onClose={() => setSubState(null)} />
      )}
      {subOutState && (
        <SubOutModal starterIndex={subOutState.starterIndex} teamId={viewAs} majorId={selectedMajor} picks={picksDraft}
          onConfirm={(benchIndex) => {
            const next = JSON.parse(JSON.stringify(picksDraft));
            const slot = next[viewAs][selectedMajor];
            const s = slot.starters[subOutState.starterIndex];  // starter being subbed OUT
            const b = slot.bench[benchIndex];                    // bench player being subbed IN
            slot.subs = slot.subs || [];
            slot.subs.push({ out: s, in: b });
            const removedFrom = cleanupAfterLock(next, viewAs, selectedMajor, b);
            setPicksDraft(next);
            setSubOutState(null);
            if (removedFrom.length) notifyCleanup(b, removedFrom);
          }}
          onClose={() => setSubOutState(null)} />
      )}
    </div>
  );
}
function compact(arr, len) { const o = arr.filter(x => x != null); while (o.length < len) o.push(null); return o.slice(0,len); }

/* =========================================================================
   TOP BAR + RUNNING SEASON TOTAL
   ========================================================================= */
function TopBar({ user, onSignOut, onSwitchUser, onResetPicks, onResetAll, onOpenProfile, onOpenLeague }) {
  const viewAs = user.id;
  const liveMajor = MAJORS.find(m => m.status === "live");
  const settled  = MAJORS.filter(m => m.status === "complete").reduce((s, m) => s + teamMajorTotal(viewAs, m.id), 0);
  const liveContrib = liveMajor ? teamMajorTotal(viewAs, liveMajor.id) : 0;
  const total = settled + liveContrib;

  const sorted = TEAMS.map(t => ({ id: t.id, total: teamSeasonTotal(t.id) })).sort((a,b) => b.total - a.total);
  const rank = sorted.findIndex(t => t.id === viewAs) + 1;
  const leader = sorted[0].total;
  const behind = total - leader;

  return (
    <header className="border-b border-line bg-bg2/60 backdrop-blur-xl sticky top-0 z-30">
      <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3">
        {/* Row 1 — Logo on the left, profile menu flush in the right corner */}
        <div className="flex items-center gap-3">
          <OnlyMajorsLogo size={40} className="shrink-0" />
          <div className="leading-tight min-w-0 flex-1">
            <div className="text-[10px] uppercase tracking-[0.18em] text-dim">OnlyMajors</div>
            <div className="font-bold text-base sm:text-lg truncate">Experts PGA Fantasy <span className="text-muted font-medium">· 2026</span></div>
          </div>
          <UserMenu user={user} onSignOut={onSignOut} onSwitchUser={onSwitchUser} onResetPicks={onResetPicks} onResetAll={onResetAll} onOpenProfile={onOpenProfile} onOpenLeague={onOpenLeague} />
        </div>

        {/* Row 2 — full-width stats strip, even spacing across all four metrics */}
        <div className="mt-3 glass rounded-xl px-4 py-2.5 grid grid-cols-2 sm:grid-cols-4 gap-3 items-center">
          <div className="leading-tight">
            <div className="text-[10px] uppercase tracking-wider text-dim">Season Total</div>
            <div className="display-num font-bold text-lg sm:text-xl">{fmtFull(total)}</div>
          </div>
          <div className="leading-tight sm:border-l sm:border-line sm:pl-3">
            <div className="text-[10px] uppercase tracking-wider text-dim flex items-center gap-1">
              {liveMajor && <span className="live-dot w-1.5 h-1.5 bg-red-400 rounded-full inline-block"/>}
              {liveMajor ? "Live add" : "Live"}
            </div>
            <div className={`display-num font-semibold text-base ${liveContrib > 0 ? "text-green" : "text-dim"}`}>
              {liveMajor ? `+${fmt(liveContrib)}` : "—"}
            </div>
          </div>
          <div className="leading-tight border-l border-line pl-3">
            <div className="text-[10px] uppercase tracking-wider text-dim">Rank</div>
            <div className={`display-num font-bold text-base ${rank === 1 ? "text-gold" : "text-text"}`}>#{rank}</div>
          </div>
          <div className="leading-tight border-l border-line pl-3">
            <div className="text-[10px] uppercase tracking-wider text-dim">{rank === 1 ? "Lead" : "Behind"}</div>
            <div className={`display-num font-semibold text-base ${rank===1 ? "text-gold" : "text-muted"}`}>
              {rank === 1 ? "+" + fmt(total - (sorted[1]?.total ?? 0)) : fmt(behind)}
            </div>
          </div>
        </div>
      </div>
    </header>
  );
}

function LoginScreen({ onAuthed }) {
  const [mode, setMode] = useState("login");          // 'login' | 'signup'

  const [password, setPassword] = useState("");
  const [displayName, setDisplayName] = useState("");

  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState("");

  // Load league members so we can show which teams are claimed during signup.
  useEffect(() => {
    if (mode !== "signup") return;
    apiLeagueMembers(1).then(setMembers).catch(e => console.warn("members:", e.message));
  }, [mode]);

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true); setError("");
    try {
      const r = await apiLogin({ email, password });
      setToken(r.token);
      onAuthed(r);
    } catch (err) {
      setError(err.message);
    } finally { setLoading(false); }

  const handleSignup = async (e) => {
    e.preventDefault();
    if (!teamId) { setError("Pick which team you are."); return; }

      setToken(r.token);
      onAuthed(r);
    } catch (err) {
      setError(err.message);
    } finally { setLoading(false); }
  };

  const unclaimedTeams = members.filter(m => !m.claimed);
  const claimedTeams   = members.filter(m =>  m.claimed);

  return (
    <div className="min-h-screen flex items-center justify-center px-4 py-10">
      <div className="w-full max-w-md">

function SyncBar({ status, message, lastUpdated, onRefresh }) {
  const ago = useRelativeTime(lastUpdated);
  const live = MAJORS.find(m => m.status === "live");
  const officialSource = live ? LIVE_SOURCES[live.id]?.name : null;
  const dotColor =
    status === "syncing" ? "bg-blue-400 live-dot" :
    status === "ok"      ? "bg-green" :
    status === "error"   ? "bg-gold" :
                            "bg-black/20";
  return (
    <div className="flex items-center gap-2 text-xs">
      <span className={`w-1.5 h-1.5 rounded-full ${dotColor}`}/>
      <span className="text-dim">
        {status === "syncing" && "Syncing live data…"}
        {status === "ok"      && officialSource && <>Source · <span className="font-semibold text-muted">{officialSource}</span> · updated {ago}</>}
        {status === "error"   && (
          <span className="text-gold">
            Backend not connected · waiting on <span className="font-semibold">{officialSource || "live source"}</span>
          </span>
        )}
        {status === "idle"    && "Not yet synced"}
      </span>
      <button onClick={onRefresh} disabled={status === "syncing"}
        className="ml-1 text-[11px] font-semibold text-green hover:text-green-2 disabled:opacity-40 disabled:cursor-wait">
        ↻ Refresh
      </button>
    </div>
  );
}

function SyncToast({ status, message }) {
  const [show, setShow] = useState(false);
  useEffect(() => {
    if (status === "ok" || status === "error") {
      setShow(true);
      const t = setTimeout(() => setShow(false), 3200);
      return () => clearTimeout(t);
    }
  }, [status, message]);
  if (!show || !message) return null;
  const tone = status === "ok" ? "bg-green/15 border-green/40 text-green" : "bg-red-500/15 border-red-500/40 text-red";
  return (
    <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-40 fade-in rounded-lg border px-3 py-2 text-xs ${tone} backdrop-blur-lg`}>
      {message}
    </div>
  );
}

function useRelativeTime(date) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 15_000);
    return () => clearInterval(id);
  }, []);
  if (!date) return "—";
  const sec = Math.max(1, Math.floor((Date.now() - date.getTime()) / 1000));
  if (sec < 60) return `${sec}s ago`;
  if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
  return `${Math.floor(sec/3600)}h ago`;
}

    <svg viewBox="0 0 24 24" className="w-6 h-6 text-gold" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">

// SCORE_OPTIONS: -20 (best) up to +10 (worst), with 0 displayed as "E".
const SCORE_OPTIONS = (() => {
  const out = [];
  for (let s = -20; s <= 10; s++) out.push(s);
  return out;
})();
function fmtScoreToPar(s) {
  if (s === 0)  return "E";
  if (s > 0)    return `+${s}`;
  return `${s}`;
}

function ScorePredictor({ value, onChange, locked }) {
  // Local draft state — reel scroll only updates draftValue. Committing to the
  // server happens only when the user clicks "Lock in prediction".
  const [draftValue, setDraftValue] = useState(value ?? null);
  const [justLocked, setJustLocked] = useState(false);
  const scrollRef = useRef(null);
  const ITEM_H = 44;

  // Initialize scroll position to current value (or 0 by default)
  useEffect(() => {
    if (!scrollRef.current) return;
    const startVal = value ?? 0;
    const idx = SCORE_OPTIONS.indexOf(startVal);
    if (idx === -1) return;
    scrollRef.current.scrollTop = idx * ITEM_H;
    setDraftValue(value ?? 0);
  }, []); // eslint-disable-line

  // Resync when server value changes
  useEffect(() => {
    if (value != null) setDraftValue(value);
  }, [value]);

  // Debounced "snap to nearest" — updates draft only, no save
  const debounceRef = useRef(null);
  const handleScroll = () => {
    if (locked) return;
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      const el = scrollRef.current;
      if (!el) return;
      const idx = Math.round(el.scrollTop / ITEM_H);
      const clamped = Math.max(0, Math.min(SCORE_OPTIONS.length - 1, idx));
      const newVal = SCORE_OPTIONS[clamped];
      el.scrollTo({ top: clamped * ITEM_H, behavior: "smooth" });
      setDraftValue(newVal);
    }, 100);
  };

  const draftIsDirty = draftValue !== null && draftValue !== value;
  const lockIn = () => {
    if (locked || draftValue === null) return;
    onChange(draftValue);
    setJustLocked(true);
    setTimeout(() => setJustLocked(false), 1800);
  };

  return (
    <div className="glass rounded-2xl p-5">
      <div className="flex items-baseline justify-between mb-3 flex-wrap gap-2">
        <div>
          <h3 className="font-semibold">Winning score prediction</h3>
          <div className="text-xs text-dim mt-0.5">
            {locked
              ? <>Final pick · locked at first tee</>
              : draftIsDirty
                ? "Lock in your pick when you're ready"
                : value != null
                  ? "Saved — you can change it anytime before first tee"
                  : "Scroll to pick your number"}
          </div>
        </div>
        {value != null && (
          <div className="text-right leading-tight">
            <div className="text-[10px] uppercase tracking-wider text-dim">Locked in</div>
            <div className="display-num font-bold text-xl text-green">{fmtScoreToPar(value)}</div>
          </div>
        )}
      </div>

      {/* The reel */}
      <div className="relative mx-auto" style={{ width: "180px" }}>
        {/* Selected-row highlight — solid green top + bottom border around the center value (E by default) */}
        <div className="absolute inset-x-0 pointer-events-none" style={{ top: ITEM_H, height: ITEM_H }}>
          <div className="w-full h-full" style={{ borderTop: "2px solid #0f7a3e", borderBottom: "2px solid #0f7a3e" }} />
        </div>
        <div className="absolute inset-x-0 top-0 pointer-events-none" style={{ height: ITEM_H, background: "linear-gradient(to bottom, var(--bg2) 0%, transparent 100%)" }} />
        <div className="absolute inset-x-0 bottom-0 pointer-events-none" style={{ height: ITEM_H, background: "linear-gradient(to top, var(--bg2) 0%, transparent 100%)" }} />

        <div ref={scrollRef} onScroll={handleScroll}
          className={`overflow-y-auto scrollbar-hide ${locked ? "pointer-events-none" : ""}`}
          style={{
            height: `${ITEM_H * 3}px`,
            scrollSnapType: "y mandatory",
            paddingTop: `${ITEM_H}px`,
            paddingBottom: `${ITEM_H}px`,
          }}>
          {SCORE_OPTIONS.map((s, i) => (
            <div key={s} style={{ height: `${ITEM_H}px`, scrollSnapAlign: "center" }}
              className={`flex items-center justify-center display-num font-bold text-2xl ${draftValue === s ? "text-green" : "text-muted"}`}>
              {fmtScoreToPar(s)}
            </div>
          ))}
        </div>
      </div>

      {/* Lock-in button — outlined green; pulses ONLY when actively confirming */}
      {!locked && (
        <div className="mt-4 flex justify-center">
          <button
            onClick={lockIn}
            disabled={!draftIsDirty && !justLocked}
            style={
              justLocked
                ? { color: "#0f7a3e", background: "rgba(15, 122, 62, 0.10)", border: "2px solid #0f7a3e" }
                : draftIsDirty
                  ? { color: "#0f7a3e", background: "transparent", border: "2px solid #0f7a3e" }
                  : { color: "rgba(0,0,0,0.35)", background: "transparent", border: "2px solid rgba(0,0,0,0.15)" }
            }
            className={`relative px-5 py-2.5 rounded-lg text-sm font-semibold transition-all whitespace-nowrap
              ${justLocked ? "score-pulse" : ""}
              ${!draftIsDirty && !justLocked ? "cursor-not-allowed" : "hover:bg-green/10"}`}>
            {justLocked
              ? <>✓ Locked in at <span className="font-mono">{fmtScoreToPar(value)}</span></>
              : draftIsDirty
                ? <>Lock in <span className="font-mono">{fmtScoreToPar(draftValue)}</span></>
                : value != null ? "Locked in" : "Pick a number first"}
          </button>
        </div>
      )}
    </div>
  );
}

function PlayedList({ teamId, picks }) {
  const played = playedGolfers(teamId, picks);
  // Identify which played golfers came in as subs (not in the original PICKS starter slot for that major)
  const subbedIn = new Set();
  for (const m of MAJORS) {
    if (m.status === "upcoming") continue;
    const live = picks[teamId]?.[m.id]?.starters || [];
    const original = PICKS[teamId]?.[m.id]?.starters || [];
    live.forEach(gid => { if (gid && !original.includes(gid)) subbedIn.add(gid); });
  }
  if (played.size === 0) return <div className="text-dim text-sm">No golfers locked yet — season just starting.</div>;
  return (
    <div className="flex flex-wrap gap-1.5">
      {[...played].map(gid => {
        const isSub = subbedIn.has(gid);
        return (
          <span key={gid}
            className={`text-xs px-2 py-1 rounded-md inline-flex items-center gap-1.5 border ${isSub ? "bg-green/10 border-green/30 text-green" : "bg-white border-line text-muted"}`}>
            <CountryCode code={G[gid].country} />
            <span className={isSub ? "font-semibold text-text" : ""}>{G[gid].name}</span>
            {isSub && <span className="text-[9px] uppercase tracking-wider text-green font-bold">subbed in</span>}
          </span>
        );
      })}
    </div>
  );
}

function PickRow({ role, slotIndex, golferId, majorId, major, canSub, canSubOut, isIn, onClick, onSub, onSubOut, onRemove }) {
  const g = golferId ? (G[golferId] || GOLFERS_EXT[golferId] || null) : null;
  const earn = golferId ? EARN[majorId]?.[golferId] : null;
  const total = golferId ? golferTotal(majorId, golferId) : null;
  const isMC = earn && (earn.status === "mc" || earn.status === "wd" || earn.status === "dfl");

  // Empty slot — clean, no role label
  if (!g) {
    return (
      <button onClick={onClick} disabled={major.status !== "upcoming"}
        className={`group w-full rounded-lg border border-dashed border-line-2 hover:border-green/50 hover:bg-green/5 transition-all px-3 sm:px-4 py-3 flex items-center gap-3 ${major.status === "complete" ? "opacity-40 cursor-not-allowed" : ""}`}>
        <div className="w-9 h-9 rounded-md bg-white border border-line group-hover:bg-green/10 group-hover:border-green/40 flex items-center justify-center text-lg text-dim">+</div>
        <div className="flex-1 text-left">
          <div className="font-semibold text-muted text-sm">Pick a {role}</div>
          <div className="text-[11px] text-dim">Tap to choose a golfer</div>
        </div>
        <span className="text-xs text-green hidden sm:inline">Choose →</span>
      </button>
    );
  }

  // Background hint — barely-there tint, no border-color clash
  const bg = isIn ? "rgba(15, 122, 62, 0.08)" : "rgba(184, 29, 29, 0.05)";

  return (
    <div className={`rounded-lg px-3 sm:px-4 py-2.5 border border-line ${isMC ? "opacity-60" : ""}`} style={{ background: bg }}>
      <div className="flex items-center gap-3">
        {/* Country chip — also doubles as the change button (no separate Change button) */}
        <button onClick={major.status === "upcoming" ? onClick : undefined}
          disabled={major.status !== "upcoming"}
          className={`w-9 h-9 rounded-md bg-white border border-line flex items-center justify-center shrink-0 transition-colors ${major.status === "upcoming" ? "hover:bg-black/[0.04] cursor-pointer" : "cursor-default"}`}
          title={major.status === "upcoming" ? "Change pick" : ""}>
          <CountryCode code={g.country}/>
        </button>

        {/* Name + score */}
        <div className="min-w-0 flex-1">
          <div className="flex items-baseline gap-2 flex-wrap">
            <span className="font-semibold truncate text-sm sm:text-base">{g.name}</span>
            {!isIn && <span className="text-[9px] font-bold uppercase tracking-wider text-red">OUT</span>}
            {earn && <ScorePill status={earn.status} position={earn.position} />}
            {earn && <ScoreNum score={earn.score} status={earn.status} />}
          </div>
          {earn && (
            <div className="text-[10px] text-dim mt-0.5">
              {earn.thru && earn.status === "made_cut" && <>thru {earn.thru}</>}
              {major.status === "live"     && earn.status === "made_cut" && <> · projected</>}
              {major.status === "complete" && <>final</>}
            </div>
          )}
        </div>

        {/* Round-by-round strokes (desktop only) — borderless, tight */}
        {earn && earn.status === "made_cut" && (
          <div className="hidden md:flex gap-3 shrink-0 text-center font-mono">
            {["r1Score","r2Score","r3Score","r4Score"].map((k,i) => (
              <div key={k} className="min-w-[26px]">
                <div className="text-[9px] uppercase tracking-wider text-dim">R{i+1}</div>
                <div className="text-[12px] font-medium text-text">{earn[k] == null ? "—" : earn[k]}</div>
              </div>
            ))}
          </div>
        )}

        {/* Total */}
        <div className="text-right shrink-0 w-20 sm:w-24">
          <div className={`display-num font-bold text-lg sm:text-xl ${isMC ? "text-dim" : "text-green"}`}>
            {total === null ? "—" : fmt(total)}
          </div>
          {role === "bench" && total > 0 && major.status !== "complete" && (
            <div className="text-[9px] uppercase tracking-wider text-dim">uncounted</div>
          )}
        </div>

        {/* Action — only one button at a time, no double-action clutter */}
        <div className="shrink-0">
          {canSub && (
            <button onClick={onSub} className="text-[11px] font-semibold rounded-md px-2.5 py-1.5 transition-colors whitespace-nowrap"
              style={{ color: "#074a23", background: "rgba(7, 74, 35, 0.18)", border: "1px solid rgba(7, 74, 35, 0.75)" }}>
              Sub in
            </button>
          )}
          {canSubOut && (
            <button onClick={onSubOut} className="text-[11px] font-semibold text-red rounded-md px-2.5 py-1.5 transition-colors whitespace-nowrap"
              style={{ background: "rgba(184, 29, 29, 0.10)", border: "1px solid rgba(184, 29, 29, 0.55)" }}>
              Sub out
            </button>
          )}
          {major.status === "live" && !canSub && !canSubOut && (
            <div title="Picks locked while a round is in progress"
              className="text-dim w-7 h-7 flex items-center justify-center">
              <svg viewBox="0 0 24 24" className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="5" y="11" width="14" height="9" rx="1.5"/>
                <path d="M8 11V7a4 4 0 018 0v4"/>
              </svg>
            </div>
          )}
          {major.status === "upcoming" && !canSub && !canSubOut && (
            <button onClick={onRemove} title="Remove pick"
              className="text-dim w-7 h-7 flex items-center justify-center rounded-md hover:bg-red-500/10 hover:text-red transition-colors">
              <svg viewBox="0 0 16 16" className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 4l8 8M12 4l-8 8"/>
              </svg>
            </button>
          )}
        </div>
      </div>

      {/* Mobile: round-by-round strokes, tight inline row */}
      {earn && earn.status === "made_cut" && (
        <div className="md:hidden mt-2 flex justify-around text-center font-mono text-[11px] text-dim border-t border-line/50 pt-2">
          {["r1Score","r2Score","r3Score","r4Score"].map((k,i) => (
            <div key={k}>
              <span className="text-[9px] uppercase tracking-wider">R{i+1}</span>
              <span className="ml-1.5 text-text font-medium">{earn[k] == null ? "—" : earn[k]}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* =========================================================================
