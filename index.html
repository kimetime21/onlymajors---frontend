  );
}

/* =========================================================================
   PLAYER STATS PANEL
   Lazy-loads /api/stats/:majorId/:golferId on first expand. Shows SG
   breakdown, round-by-round, traditional stats, season totals.
   ========================================================================= */
function PlayerStatsPanel({ majorId, player, displayName }) {
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setError(null);
    fetchPlayerStats(majorId, player.gid)
      .then(r => { if (!cancelled) { setData(r); setLoading(false); } })
      .catch(e => { if (!cancelled) { setError(e.message); setLoading(false); } });
    return () => { cancelled = true; };
  }, [majorId, player.gid]);

  return (
    <div className="bg-black/[0.025] border-b border-line px-4 py-3 text-[13px]">
      {loading && <div className="text-dim italic">Loading stats from DataGolf…</div>}
      {error && !loading && (
        <div className="text-red text-[12px]">
          Stats unavailable: {error}
          <div className="text-dim mt-0.5 text-[11px]">DataGolf may not have data for this player at this event, or the backend hasn't been redeployed yet.</div>
        </div>
      )}
      {data && !loading && !error && (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          {/* Round-by-round */}
          <StatBlock title="Round-by-round">
            <table className="w-full text-[12px]">
              <thead className="text-dim uppercase tracking-wider text-[10px]">
                <tr>
                  <th className="text-left font-semibold pb-1">Round</th>
                  <th className="text-right font-semibold pb-1">Strokes</th>
                  <th className="text-right font-semibold pb-1">ToPar</th>
                  <th className="text-right font-semibold pb-1">Pos</th>
                  <th className="text-right font-semibold pb-1">$</th>
                </tr>
              </thead>
              <tbody>
                {(data.tournament?.rounds || []).map(r => (
                  <tr key={r.round} className="border-t border-line">
                    <td className="py-1 font-semibold">R{r.round}</td>
                    <td className="py-1 text-right tabular-nums">{r.roundScore == null ? "—" : r.roundScore}</td>
                    <td className="py-1 text-right tabular-nums">{r.scoreToPar === null || r.scoreToPar === undefined ? "—" : (r.scoreToPar === 0 ? "E" : (r.scoreToPar > 0 ? `+${r.scoreToPar}` : r.scoreToPar))}</td>
                    <td className="py-1 text-right">{r.position || "—"}</td>
                    <td className="py-1 text-right tabular-nums">{r.money == null ? "—" : fmtCompactMoney(r.money)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="text-[10px] text-dim mt-1.5">Strokes from DataGolf · $ = projected money snapshotted at end of round</div>
          </StatBlock>

          {/* Tournament SG */}
          <StatBlock title="Strokes gained · this tournament">
            <StatRow label="Total"          value={data.tournament?.sg?.total}/>
            <StatRow label="Off-the-tee"    value={data.tournament?.sg?.ott}/>
            <StatRow label="Approach"       value={data.tournament?.sg?.app}/>
            <StatRow label="Around-the-green" value={data.tournament?.sg?.arg}/>
            <StatRow label="Putting"        value={data.tournament?.sg?.putt}/>
          </StatBlock>

          {/* Traditional */}
          <StatBlock title="Traditional">
            <StatRow label="Driving distance" value={data.tournament?.traditional?.drivingDistance} unit="yds" digits={1} signed={false}/>
            <StatRow label="Driving accuracy" value={data.tournament?.traditional?.drivingAccuracy} unit="%" digits={1} signed={false}/>
            <StatRow label="Greens in reg"    value={data.tournament?.traditional?.gir} unit="%" digits={1} signed={false}/>
            <StatRow label="Scrambling"       value={data.tournament?.traditional?.scrambling} unit="%" digits={1} signed={false}/>
          </StatBlock>

          {/* Season */}
          <StatBlock title="Season · 2026">
            {data.season ? (
              <>
                <StatRow label="SG Total"       value={data.season.sgTotal}/>
                <StatRow label="SG Off-the-tee" value={data.season.sgOtt}/>
                <StatRow label="SG Approach"    value={data.season.sgApp}/>

                <StatRow label="SG Putting"     value={data.season.sgPutt}/>

            ) : (
              <div className="text-dim text-[12px] italic">Season totals not available (DataGolf endpoint may not be in your subscription tier).</div>

}

function StatBlock({ title, children }) {
  return (
    <div className="bg-white border border-line rounded-lg p-2.5">
      <div className="text-[10px] uppercase tracking-wider text-dim font-semibold mb-1.5">{title}</div>
      <div>{children}</div>
    </div>
  );
}

function StatRow({ label, value, unit, digits = 2, signed = true }) {
  const isNum = typeof value === "number" && !isNaN(value);
  const fmt = isNum
    ? `${signed && value > 0 ? "+" : ""}${value.toFixed(digits)}${unit ? ` ${unit}` : ""}`
    : "—";
  return (
    <div className="flex items-baseline justify-between py-0.5 text-[12px]">
      <span className="text-muted">{label}</span>
      <span className={`font-semibold tabular-nums ${isNum && signed ? (value > 0 ? "text-green" : value < 0 ? "text-red" : "text-text") : "text-text"}`}>{fmt}</span>
    </div>
  );
}

function fmtCompactMoney(n) {
  if (n == null || isNaN(n)) return "—";
  if (n >= 1_000_000) return `$${(n/1_000_000).toFixed(n >= 10_000_000 ? 1 : 2)}M`;
  if (n >= 1_000)     return `$${Math.round(n/1000)}k`;
  return `$${Math.round(n)}`;
}

// Realistic-feeling event log for the in-league Live tab. Uses the actual
// team names + their starters from the picks state so the feed feels alive
// even before DataGolf event polling is wired up. Always returns 4 entries.
function buildLeagueUpdatesMock(rows, viewed) {
  if (!rows || rows.length === 0) return [];
  const getGolferName = (gid) => {
    if (!gid) return "their starter";
    const g = (typeof GOLFERS !== "undefined" ? GOLFERS : []).find(x => x.id === gid);
    return g?.name || gid;
  };
  const leader = rows[0];
  const challenger = rows[1] || rows[0];
  const slipper = rows[rows.length - 1];
  const leaderStarter = getGolferName(leader.starters?.[0]);
  const challengerStarter = getGolferName(challenger.starters?.[0]);
  const slipStarter = getGolferName(slipper.starters?.[0]);
  return [
    { when: "3 min ago",   message: `${leader.team.name}'s ${leaderStarter} birdied 14 — moved to T4`, delta: "+$48K" },
    { when: "19 min ago",  message: `${viewed.short} cut line settled at +2 — 71 players advance`,    delta: null    },
    { when: "34 min ago",  message: `${slipper.team.name}'s ${slipStarter} bogeyed 11 — slipped to T22`, delta: "-$22K" },
    { when: "1 hr ago",    message: `R${viewed.currentRound || 3} live. Live updates refresh every 60 seconds.`, delta: null },
  ];
}

function LiveTab({ picks, syncStatus, syncMessage, lastUpdated, onRefresh, onGotoPicks, leagueId, includedMajors }) {
  // Scope every major lookup to the league's includedMajors. Falls back to
  // all four when no filter (legacy / all_four / four_plus_one leagues).
  const includedSet = Array.isArray(includedMajors) && includedMajors.length
    ? new Set(includedMajors) : null;
  const ALLOWED_MAJORS = includedSet ? MAJORS.filter(m => includedSet.has(m.id)) : MAJORS;
  const liveMajor    = ALLOWED_MAJORS.find(m => m.status === "live");
  const lastComplete = [...ALLOWED_MAJORS].reverse().find(m => m.status === "complete");
  const upcomingOpen = ALLOWED_MAJORS.find(m => m.status === "upcoming" && arePicksOpen(m));
  // Surface the next upcoming major during the lead-up week (two weeks out)
  // so the page feels current — even before picks formally open.
  const upcomingFocus = MAJORS.find(m => m.status === "upcoming" && daysUntilLock(m) <= 7);
  // Default focus: live → picks-already-open → lead-up-week upcoming → most
  // recent complete major.
  const defaultMajor = liveMajor || upcomingOpen || upcomingFocus || lastComplete || ALLOWED_MAJORS[0] || MAJORS[0];
  const [viewedMajorId, setViewedMajorId] = useState(defaultMajor.id);
  const viewed = M[viewedMajorId] || defaultMajor;

  // Dropdown options: anything worth looking at — live + upcoming focus +
  // every complete major, restricted to majors this league includes.
  const completeMajors = ALLOWED_MAJORS.filter(m => m.status === "complete");
  const switcherOptions = useMemo(() => {
    const list = [];
    if (liveMajor)      list.push(liveMajor);
    if (upcomingOpen   && !list.some(x => x.id === upcomingOpen.id))   list.push(upcomingOpen);
    if (upcomingFocus  && !list.some(x => x.id === upcomingFocus.id))  list.push(upcomingFocus);
    for (const m of completeMajors) if (!list.some(x => x.id === m.id)) list.push(m);
    return list;
  }, [liveMajor?.id, upcomingOpen?.id, upcomingFocus?.id, completeMajors.map(m => m.id).join(",")]);
  const showSwitcher = switcherOptions.length > 1;

  const isLive    = viewed.status === "live";
  const hasData   = Object.keys(EARN[viewed.id] || {}).length > 0;
  // Render the countdown hero for any upcoming major in its lead-up window,
  // whether picks are formally open yet or not — PicksOpenLiveState below
  // adapts its copy based on arePicksOpen.
  const isPreTour = viewed.status === "upcoming" && daysUntilLock(viewed) <= 7;

  const rows = useMemo(() => {
    return teamsForLeague(leagueId).map(t => {
      const slot = picks[t.id]?.[viewed.id];
      return {
        team: t,
        starters: slot?.starters || [],
        bench:    slot?.bench || [],
        subs:     slot?.subs || [],
        slot,
        total:    teamMajorTotal(t.id, viewed.id, picks),
        originalTotal: teamMajorOriginalTotal(t.id, viewed.id),
        lob:      teamMajorLOB(t.id, viewed.id, picks),
      };
    }).sort(compareTeamsByMajor);
  }, [picks, viewed.id, lastUpdated]);
  const leader = rows[0];

  return (
    <div className="space-y-6">
      {/* Sync bar — its own row so the dropdown can be full-width below */}
      {isLive && (
        <div className="flex justify-end -mt-2">
          <SyncBar status={syncStatus} lastUpdated={lastUpdated} onRefresh={onRefresh} />
        </div>
      )}

      {/* Major selector — always visible when there's more than one option */}
      {showSwitcher && (
        <LiveMajorSwitcher
          viewedMajorId={viewedMajorId} setViewedMajorId={setViewedMajorId}
          options={switcherOptions} picks={picks} leagueId={leagueId} />
      )}

      {/* Body — pre-tournament hero, empty state, or full leaderboard */}
      {isPreTour ? (
        <PicksOpenLiveState major={viewed} picks={picks} onGotoPicks={onGotoPicks} leagueId={leagueId} />
      ) : !hasData ? (
        <EmptyLiveState major={viewed} />
      ) : (
        <>
          {/* Hero card */}
          <div className={`relative rounded-2xl overflow-hidden border border-line-2 ${viewed.scene}`}>
            <div className="absolute inset-0 dot-grid opacity-40"/>
            <div className="relative p-5 sm:p-6">
              <div className="flex items-center gap-2 text-[11px] uppercase tracking-[0.18em] text-dim">
                {isLive ? (
                  <span className="inline-flex items-center gap-1.5">
                    <span className="relative inline-block w-2 h-2"><span className="absolute inset-0 bg-red-400 rounded-full live-dot"/><span className="absolute inset-0 bg-red-400 rounded-full opacity-50 live-glow"/></span>
                    Live now
                  </span>
                ) : (
                  <span className="font-semibold text-gold">Past results</span>
                )}
                <span>·</span>
                <span>{viewed.name}</span>
                {isLive && <><span>·</span><span>R{viewed.currentRound}</span></>}
              </div>
              <div className="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-5 items-end">
                <div className="sm:col-span-2">
                  <div className="text-[11px] uppercase tracking-wider text-dim">{isLive ? "Leading the major" : "Won the major"}</div>
                  <div className="flex items-center gap-3 mt-2">
                    <TeamBadge team={leader.team} size="xl" />
                    <div>
                      <div className="text-2xl sm:text-3xl font-bold">{leader.team.name}</div>
                      <div className="text-sm text-muted">{leader.team.owner}</div>
                    </div>
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-[11px] uppercase tracking-wider text-dim">{isLive ? "Projected" : "Final earnings"}</div>
                  <div className="display-num font-bold text-3xl sm:text-4xl shimmer-text">{fmtFull(leader.total)}</div>
                  <div className="text-xs text-green mt-1">+{fmt(leader.total - (rows[1]?.total ?? 0))} {isLive ? "ahead" : "margin"}</div>
                </div>
              </div>
            </div>
          </div>

          {/* Team rows */}
          <div className="space-y-2.5">
            {rows.map((row, idx) => (
              <LiveTeamRow key={row.team.id} row={row} rank={idx+1} majorId={viewed.id} leader={rows[0].total} />
            ))}
          </div>

          {/* Recent updates — same shape as the Club Championship live page,
              populated with league-aware events. Static mock for now; will
              wire to DataGolf events once the backend pushes them. */}
          {isLive && <LiveUpdatesFeed updates={buildLeagueUpdatesMock(rows, viewed)} />}

          {/* Score Predictions */}
          <ScorePredictionsPanel picks={picks} majorId={viewed.id} leagueId={leagueId} />
        </>
      )}
    </div>
  );
}

function ScorePredictionsPanel({ picks, majorId, leagueId }) {
  // Pull the live tournament leader's score-to-par for context.
  const leaderScore = useMemo(() => {
    const e = EARN[majorId] || {};
    let best = null;
    for (const gid of Object.keys(e)) {
      const v = e[gid];
      if (v?.status === "mc" || v?.status === "wd" || v?.status === "dfl") continue;
      if (typeof v?.score !== "number") continue;
      if (best === null || v.score < best) best = v.score;
    }
    return best;
  }, [majorId]);

  const predictions = useMemo(() => {
    return teamsForLeague(leagueId).map(t => ({
      team: t,
      pick: picks?.[t.id]?.[majorId]?.scorePrediction ?? null,
    }))
    .filter(p => p.pick != null)
    .sort((a, b) => a.pick - b.pick);
  }, [picks, majorId]);

  if (predictions.length === 0) return null;

  return (
    <div className="glass rounded-2xl p-5">
      <div className="flex items-baseline justify-between flex-wrap gap-2 mb-3">
        <div>
          <h3 className="font-semibold">Score Predictions</h3>
          <div className="text-xs text-dim mt-0.5">
            {leaderScore != null
              ? <>Leader: <span className="font-mono font-semibold text-text">{fmtScoreToPar(leaderScore)}</span></>
              : "Tournament hasn't started yet"}
          </div>
        </div>
      </div>
      <div className="space-y-1.5">
        {predictions.map((p, i) => {
          const diff = leaderScore != null ? Math.abs(p.pick - leaderScore) : null;
          return (
            <div key={p.team.id} className="flex items-center gap-3 px-3 py-2 rounded-lg bg-white border border-line">
              <span className="text-[11px] uppercase tracking-wider text-dim w-5 font-mono">#{i+1}</span>
              <TeamBadge team={p.team} size="sm" />
              <span className="flex-1 font-medium truncate">{p.team.name}</span>
              <span className="display-num font-bold text-base text-text">{fmtScoreToPar(p.pick)}</span>
              {diff != null && <span className="text-[11px] text-dim font-mono w-12 text-right">{diff === 0 ? "spot on" : `±${diff}`}</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function PicksOpenLiveState({ major, picks, onGotoPicks, leagueId }) {
  // Re-tick once a minute so the countdown stays current without a full reload.
  const [, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 60_000);
    return () => clearInterval(id);
  }, []);

  const picksOpen = arePicksOpen(major);
  // Countdown target: first tee once picks are open, otherwise the date picks
  // unlock. Two phases share the rest of the layout.
  const targetMs = picksOpen
    ? new Date(major.firstTeeTime).getTime()
    : new Date(major.picksOpenDate).getTime();
  const now = Date.now();
  const diffMs = Math.max(0, targetMs - now);
  const days = Math.floor(diffMs / (24*60*60*1000));
  const hours = Math.floor((diffMs % (24*60*60*1000)) / (60*60*1000));
  const minutes = Math.floor((diffMs % (60*60*1000)) / (60*1000));

  // Tally who's submitted vs not
  const leagueTeams    = teamsForLeague(leagueId);
  const submittedTeams = leagueTeams.filter(t => {
    const slot = picks?.[t.id]?.[major.id];
    return slot && slot.starters?.filter(Boolean).length === 4;
  });
  const pendingTeams = leagueTeams.filter(t => !submittedTeams.includes(t));

  return (
    <div className="space-y-6">
      <div className={`relative rounded-2xl overflow-hidden border border-line-2 ${major.scene}`}>
        <div className="absolute inset-0 dot-grid opacity-40"/>
        <div className="relative p-6 sm:p-8">
          <div className="flex items-center gap-2 text-[11px] uppercase tracking-[0.18em] text-dim mb-3">
            <span className="inline-flex items-center gap-1.5">
              <span className={`live-dot w-1.5 h-1.5 rounded-full inline-block ${picksOpen ? "bg-green" : "bg-gold"}`}/>
              {picksOpen ? "Picks are open" : "Picks open soon"}
            </span>
            <span>·</span>
            <span>{major.name}</span>
          </div>
          <div className="font-bold text-2xl sm:text-3xl">
            {picksOpen ? "Picks lock at first tee" : `Picks open ${major.picksOpenLabel || ""}`.trim()}
          </div>
          <div className="text-sm text-muted mt-1">
            {picksOpen ? major.teeTimeLabel : `First tee ${major.teeTimeLabel}`}
          </div>

          <div className="mt-5 grid grid-cols-3 gap-3 max-w-md">
            <div className="bg-white/80 border border-line rounded-lg px-3 py-2.5 text-center">
              <div className="display-num font-bold text-2xl">{days}</div>
              <div className="text-[11px] uppercase tracking-wider text-dim">days</div>
            </div>
            <div className="bg-white/80 border border-line rounded-lg px-3 py-2.5 text-center">
              <div className="display-num font-bold text-2xl">{hours}</div>
              <div className="text-[11px] uppercase tracking-wider text-dim">hours</div>
            </div>
            <div className="bg-white/80 border border-line rounded-lg px-3 py-2.5 text-center">
              <div className="display-num font-bold text-2xl">{minutes}</div>
              <div className="text-[11px] uppercase tracking-wider text-dim">minutes</div>
            </div>
          </div>

          <button onClick={onGotoPicks}
            className="mt-5 inline-flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold text-sm transition-colors om-pill">
            {picksOpen ? "Click here to lock in picks" : "Take a look at the field"}
            <svg viewBox="0 0 24 24" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
              <path d="M5 12h14M13 6l6 6-6 6"/>
            </svg>
          </button>
        </div>
      </div>

      <div className="glass rounded-2xl p-5">
        <h3 className="font-semibold mb-3">League status · {submittedTeams.length} of {TEAMS.length} picked</h3>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          {submittedTeams.map(t => (
            <div key={t.id} className="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-green/8 border border-green/25">
              <TeamBadge team={t} size="sm" />
              <span className="flex-1 text-sm font-medium truncate">{t.name}</span>
              <span className="text-[11px] font-bold uppercase tracking-wider text-green">In</span>
            </div>
          ))}
          {pendingTeams.map(t => (
            <div key={t.id} className="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-black/[0.03] border border-line">
              <TeamBadge team={t} size="sm" />
              <span className="flex-1 text-sm font-medium truncate">{t.name}</span>
              <span className="text-[11px] font-bold uppercase tracking-wider text-dim">Pending</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// Picks-style dropdown — full-width card showing the viewed major, with a
// rich list of all majors you can switch between (live + complete + upcoming-
// with-picks-open). Mirrors the design of MajorSelectorDropdown on the Picks
// tab so the two tabs feel like one app.
function LiveMajorSwitcher({ viewedMajorId, setViewedMajorId, options, picks, leagueId }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); document.removeEventListener("keydown", onKey); };
  }, [open]);

  const viewed = M[viewedMajorId];
  const others = options.filter(m => m.id !== viewedMajorId);

  // Leader/winner summary for a major (used as the right-side accent).
  const leaderFor = (mid) => {
    const rows = teamsForLeague(leagueId).map(t => ({
      team: t,
      total: teamMajorTotal(t.id, mid, picks),
      originalTotal: teamMajorOriginalTotal(t.id, mid),
      lob: teamMajorLOB(t.id, mid, picks),
    })).sort(compareTeamsByMajor);
    return rows[0];
  };
  const accentLabel = (m) => m.status === "live" ? "Leading" : m.status === "complete" ? "Winner" : null;
  const leadInfo = (m) => {
    const label = accentLabel(m);
    if (!label) return null;
    const l = leaderFor(m.id);
    if (!l || l.total <= 0) return null;
    return { label, name: l.team.name };
  };

  const Row = ({ m, sel }) => {
    const li = leadInfo(m);
    return (
      <button onClick={() => { setViewedMajorId(m.id); setOpen(false); }}
        className={`w-full text-left flex items-center gap-3 px-4 py-3 transition-colors ${sel ? "bg-green/8" : "hover:bg-black/[0.03]"}`}>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2">
            <span className="font-semibold text-sm">{m.name}</span>
            <StatusBadge status={m.status} />
          </div>
          <div className="text-[12px] text-dim mt-0.5">{m.start}–{m.end} · {m.course}</div>
        </div>
        {li && (
          <div className="text-right shrink-0 leading-tight">
            <div className="text-[11px] uppercase tracking-wider text-dim">{li.label}</div>
            <div className="text-xs font-semibold text-green truncate max-w-[120px]" style={{ color: "#2b4535" }}>{li.name}</div>
          </div>
        )}
      </button>
    );
  };

  const currentLi = leadInfo(viewed);

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className={`w-full text-left rounded-xl px-4 py-3 transition-all border bg-white flex items-center gap-3 ${open ? "border-green/40 glow-green" : "border-line-2 hover:border-line-2"}`}>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-bold text-base sm:text-lg truncate">{viewed.name}</span>
            <StatusBadge status={viewed.status} />
          </div>
          <div className="text-xs text-dim mt-0.5">{viewed.start}–{viewed.end} · {viewed.course}</div>
        </div>
        {currentLi && (
          <div className="text-right shrink-0 leading-tight hidden sm:block">
            <div className="text-[11px] uppercase tracking-wider text-dim">{currentLi.label}</div>
            <div className="font-semibold text-sm truncate max-w-[140px]" style={{ color: "#2b4535" }}>{currentLi.name}</div>
          </div>
        )}
        <svg viewBox="0 0 24 24" className={`w-4 h-4 text-dim shrink-0 transition-transform ${open ? "rotate-180" : ""}`} fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      {open && (
        <div className="absolute z-40 left-0 right-0 mt-1.5 bg-white border border-line-2 rounded-xl shadow-lg overflow-hidden fade-in">
          {others.map(m => <Row key={m.id} m={m} sel={false} />)}
        </div>
      )}
    </div>
  );
}

        <TeamBadge team={row.team} size="md" />

                    <div key={i} className="flex items-center gap-2 text-[13px]">
                      <span className="font-medium text-text">{inn?.name || s.in}</span>
                      <span className="text-[10px] font-bold uppercase tracking-wider text-green">IN</span>
                      <svg viewBox="0 0 16 16" className="w-3.5 h-3.5 text-dim" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M3 8h10M9 4l4 4-4 4"/>

                      <span className="font-medium text-dim line-through">{out?.name || s.out}</span>
                      <span className="text-[10px] font-bold uppercase tracking-wider text-red">OUT</span>
                    </div>
                  );
                })}
              </div>

          )}
          <div className="text-[11px] uppercase tracking-wider text-dim mb-2">Starters</div>
          <div className="space-y-1">
            {row.starters.map(gid => gid && <LiveLineItem key={gid} golferId={gid} majorId={majorId} slot={row.slot} role="starter" />)}
          </div>
          <div className="text-[11px] uppercase tracking-wider text-dim mt-3 mb-2">Bench · {fmt(row.lob)} left on base</div>
          <div className="space-y-1">
            {row.bench.map(gid => gid && <LiveLineItem key={gid} golferId={gid} majorId={majorId} slot={row.slot} role="bench" />)}
          </div>
        </div>
      )}
    </div>
  );
}

function LiveLineItem({ golferId, majorId, slot, role }) {
  const g = G[golferId] || GOLFERS_EXT[golferId];
  if (!g) return null;
  const earn = EARN[majorId]?.[golferId];
  const total = golferTotal(majorId, golferId);
  const isIn = isGolferIn(slot, golferId);
  // Visual state — a starter that's been subbed out is "OUT"; a bench that's
  // been subbed in is "IN". Otherwise the role's default tone applies.
  const subbedOut = role === "starter" && !isIn;
  const subbedIn  = role === "bench"   &&  isIn;
  return (
    <div className="flex items-center gap-2.5 px-2 py-1.5 rounded"
      style={
        subbedOut ? { background: "rgba(184, 29, 29, 0.12)", border: "1px solid rgba(184, 29, 29, 0.55)" }
        : subbedIn ? { background: "rgba(43, 69, 53, 0.18)", border: "1px solid rgba(43, 69, 53, 0.65)" }
        : role === "bench" ? { opacity: 0.55 }
        : {}
      }>
      <CountryCode code={g.country} className="w-8" />
      <span className={`flex-1 text-sm ${subbedOut ? "line-through text-dim" : ""}`}>{g.name}</span>
      {subbedOut && <span className="text-[10px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded"
        style={{ color: "#b81d1d", background: "rgba(184, 29, 29, 0.18)", border: "1px solid rgba(184, 29, 29, 0.55)" }}>OUT</span>}
      {subbedIn  && <span className="text-[10px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded"
        style={{ color: "#2b4535", background: "rgba(43, 69, 53, 0.22)", border: "1px solid rgba(43, 69, 53, 0.65)" }}>IN</span>}
      {earn && <ScorePill status={earn.status} position={earn.position} />}
      {earn && <ScoreNum score={earn.score} status={earn.status} />}
      <span className="font-mono font-semibold text-sm tabular-nums w-16 text-right">{total === null ? "—" : fmt(total)}</span>
    </div>
  );
}

/* =========================================================================
   LEADERBOARD TAB
   ========================================================================= */
function LeaderboardTab({ picks, viewAs, leagueId }) {
  const rows = useMemo(() => {
    const r = teamsForLeague(leagueId).map(t => {
      const byMajor = {};
      let total = 0;
      MAJORS.forEach(m => { const v = teamMajorTotal(t.id, m.id, picks); byMajor[m.id] = v; total += v; });
      return {
        team: t,
        byMajor,
        total,
        originalTotal: teamSeasonOriginalTotal(t.id),
        lob: teamSeasonLOB(t.id, picks),
      };
    }).sort(compareTeamsByMajor);
    const lead = r[0]?.total ?? 0;
    return r.map((x, i) => ({
      ...x,
      behind: x.total - lead,
      tiebreaker:
        i > 0 && r[i-1].total === x.total
          ? (r[i-1].originalTotal !== x.originalTotal ? "original-starters" : "left-on-base")
          : null,
    }));
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [picks, leagueId]);

  const liveId = MAJORS.find(m => m.status === "live")?.id;

  return (
    <div className="space-y-6">
      <div className="flex items-baseline justify-between flex-wrap gap-2">
        <div>
          <h2 className="font-bold text-2xl tracking-tight">Season Standings</h2>
          <div className="text-xs text-dim mt-0.5">Cumulative earnings across all four majors</div>
        </div>
        {liveId && (
          <div className="text-xs text-muted flex items-center gap-1.5 glass-2 rounded-md px-2 py-1">
            <span className="live-dot w-1.5 h-1.5 bg-red-400 rounded-full inline-block"/>
            {M[liveId].short} R{M[liveId].currentRound} updating · projected
          </div>
        )}
      </div>

      <div className="space-y-2">
        {rows.map((row, idx) => (
          <StandingsRow key={row.team.id} row={row} idx={idx} viewAs={viewAs} picks={picks} />
        ))}
      </div>
      <div className="text-[12px] text-dim px-1">
        <span className="font-semibold uppercase tracking-wider text-muted">Tiebreakers</span> · ties broken by (1) highest total among original starters, then (2) Left on Base.
      </div>

      {/* Picks Locking Soon — privacy & lock countdown widget */}
      <LocksWidget picks={picks} viewAs={viewAs} leagueId={leagueId} />

      <div className="grid sm:grid-cols-1 gap-4">
        <div className="glass rounded-2xl p-5">
          <h3 className="font-bold text-lg">Season Progress</h3>
          <div className="mt-3 space-y-2.5">
            {MAJORS.map(m => (
              <div key={m.id} className="flex items-center justify-between text-sm">
                <div className="flex items-center gap-2">
                  <StatusBadge status={m.status} />
                  <span>{m.name}</span>
                </div>
                <span className="text-xs text-dim">{m.start}–{m.end}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

          )}
        </div>
        <svg viewBox="0 0 24 24" className={`w-4 h-4 text-dim shrink-0 transition-transform ${open ? "rotate-180" : ""}`} fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      {open && (
        <div className="border-t border-line bg-black/[0.02] px-3 sm:px-4 py-3 space-y-2 fade-in">
          {MAJORS.map(m => (
            <StandingsMajorBlock key={m.id} major={m} teamId={row.team.id}
              totalForMajor={row.byMajor[m.id]} picks={picks} />
          ))}
        </div>
      )}
    </div>
  );
}

function StandingsMajorBlock({ major, teamId, totalForMajor, picks }) {
  const slot = picks?.[teamId]?.[major.id];
  const subs = slot?.subs || [];
  const subOutSet = new Set(subs.map(s => s.out).filter(Boolean));
  const subInSet  = new Set(subs.map(s => s.in).filter(Boolean));

  // Names that played for this team at this major. Includes ALL starters
  // (subbed-out players still teed off before the swap) PLUS bench players
  // who were subbed in. Bench players who never got subbed in are excluded.
  const playedNames = [
    ...(slot?.starters || []).filter(Boolean),
    ...(slot?.bench    || []).filter(gid => gid && subInSet.has(gid)),
  ].map(gid => G[gid]?.name).filter(Boolean);

  return (
    <div className="bg-white border border-line rounded-md px-3 py-2">
      <div className="flex items-baseline justify-between gap-2">
        <div className="flex items-center gap-1.5 text-[12px] uppercase tracking-wider text-dim">
          <span className="font-semibold text-text">{major.short}</span>
          {major.status === "live" && <span className="live-dot w-1 h-1 bg-red-400 rounded-full inline-block"/>}
          {major.status === "upcoming" && <span className="text-[10px] text-dim">picks open {major.picksOpenLabel}</span>}
        </div>
        <div className={`font-mono font-semibold text-sm ${major.status==="live" ? "text-gold" : "text-text"}`}>
          {totalForMajor === 0 && major.status === "upcoming"
            ? <span className="text-dim">—</span>
            : fmt(totalForMajor)}
        </div>
      </div>
      {major.status !== "upcoming" && playedNames.length > 0 && (
        <div className="text-[12px] text-muted mt-1 leading-snug">
          {playedNames.join(" · ")}
        </div>
      )}
    </div>
  );
}

function LocksWidget({ picks, viewAs, leagueId }) {
  const upcoming = MAJORS.filter(m => m.status === "upcoming");
  if (upcoming.length === 0) return null;
  return (
    <div className="glass rounded-2xl p-5">
      <div className="flex items-baseline justify-between mb-3 gap-2 flex-wrap">
        <div>
          <h3 className="font-bold text-lg">Picks Locking Soon</h3>

        </div>
      </div>
      <div className="space-y-3">
        {upcoming.map(m => {
          const opensIn = daysUntilPicksOpen(m);
          const locksIn = daysUntilLock(m);
          const open = arePicksOpen(m);
          const submitted = teamsForLeague(leagueId).filter(t => picks[t.id]?.[m.id]?.submitted);
          const pending   = teamsForLeague(leagueId).filter(t => !picks[t.id]?.[m.id]?.submitted);
          const mine = picks[viewAs]?.[m.id]?.submitted;
          return (
            <div key={m.id} className="border border-line rounded-xl p-4 bg-white">
              <div className="flex items-baseline justify-between flex-wrap gap-2">

                  <div className="font-semibold">{m.name}</div>
                  <div className="text-xs text-dim mt-0.5">{m.course}</div>

                <div className="text-right">
                  {open ? (
                    <>
                      <div className="text-[11px] uppercase tracking-wider text-dim">Locks in</div>
                      <div className="display-num font-bold text-xl text-gold">{locksIn} <span className="text-sm font-medium text-muted">days</span></div>
                      <div className="text-[11px] text-dim">{m.teeTimeLabel}</div>
                    </>
                  ) : (
                    <>
                      <div className="text-[11px] uppercase tracking-wider text-dim">Picks open in</div>
                      <div className="display-num font-bold text-xl text-text">{opensIn} <span className="text-sm font-medium text-muted">days</span></div>
                      <div className="text-[11px] text-dim">{m.picksOpenLabel}</div>
                    </>
                  )}
                </div>
              </div>

              {open ? (
                <>
                  <div className="mt-3 flex items-center gap-2 flex-wrap">
                    <div className="text-[11px] uppercase tracking-wider text-dim">Submitted</div>
                    <div className="flex gap-1">
                      {submitted.map(t => (
                        <span key={t.id} title={t.name + " · submitted"} className="inline-flex">
                          <TeamBadge team={t} size="xs" />
                        </span>
                      ))}
                      {pending.map(t => (
                        <span key={t.id} title={t.name + " · not submitted yet"} className="inline-flex opacity-30">
                          <TeamBadge team={t} size="xs" />
                        </span>
                      ))}
                    </div>
                    <span className="text-xs text-dim ml-1">{submitted.length}/{TEAMS.length} locked in</span>
                  </div>

                  <div className="mt-3 grid grid-cols-2 gap-2">
                    <div className="bg-black/[0.04] border border-line rounded-md px-3 py-2">
                      <div className="text-[11px] uppercase tracking-wider text-dim">Your picks</div>
                      <div className={`text-sm font-semibold ${mine ? "text-green" : "text-gold"}`}>{mine ? "Submitted" : "Not submitted"}</div>
                    </div>
                    <div className="bg-black/[0.04] border border-line rounded-md px-3 py-2">
                      <div className="text-[11px] uppercase tracking-wider text-dim">Other teams' picks</div>
                      <div className="text-sm font-semibold text-muted flex items-center gap-1.5">
                        <svg viewBox="0 0 16 16" className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="7" width="10" height="7" rx="1"/><path d="M5 7V5a3 3 0 016 0v2"/></svg>
                        Locked until tee time
                      </div>
                    </div>
                  </div>
                </>
              ) : (
                <div className="mt-3 text-xs text-muted">
                  Roster picks open once Final Qualifying completes and the field is officially set.
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div className="text-[12px] text-dim mt-3">
        Privacy is enforced server-side: even if someone inspected the network, the API doesn't return other teams' rosters until the major's first tee time has passed.
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// Account Settings — account-wide identity. Opened from the Clubhouse user
// menu OR from the in-league League Settings "Account Settings" pill.
// Holds first/last name, the read-only Club Championship handle (always
// "First L." for continuity), email, password, and notification toggles.
// Rendered as a portal overlay so it can be opened from any context.
// ─────────────────────────────────────────────────────────────────────────
function AccountSettingsOverlay({ authedUser, summary, onClose, onSaved }) {
  const [firstName, setFirstName] = useState(summary?.me?.firstName ?? authedUser?.firstName ?? "");
  const [lastName,  setLastName]  = useState(summary?.me?.lastName  ?? authedUser?.lastName  ?? "");
  const [email,     setEmail]     = useState(authedUser?.email || "");
  const [busy,      setBusy]      = useState(false);
  const [toast,     setToast]     = useState("");
  // Password change is its own form (same component used in old ProfileTab).
  const [currentPw, setCurrentPw] = useState("");
  const [newPw,     setNewPw]     = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [pwError,   setPwError]   = useState("");
  const [pwOk,      setPwOk]      = useState("");
  const [pwBusy,    setPwBusy]    = useState(false);

  // Club Championship display name = "First L." — auto-derived, not user-
  // editable. Keeps Club Championship leaderboards / HoF readable across
  // members regardless of league-side display-name customizations.
  const ccDisplay = (firstName.trim() && lastName.trim())
    ? `${firstName.trim()} ${lastName.trim()[0].toUpperCase()}.`
    : (firstName.trim() || "—");

  // Lock body scroll while open.
  useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = prev; };
  }, []);

  const saveAccount = async () => {
    if (!firstName.trim()) { setToast("First name can't be empty"); return; }
    if (!lastName.trim())  { setToast("Last name can't be empty"); return; }
    if (!/^\S+@\S+\.\S+$/.test(email)) { setToast("That email doesn't look right"); return; }
    setBusy(true); setToast("");
    try {
      await onSaved?.({
        firstName: firstName.trim(),
        lastName:  lastName.trim(),
        email:     email.trim(),
      });
      setToast("Saved");
      setTimeout(() => setToast(""), 2200);
    } catch (e) {
      setToast(e.message || "Save failed");
    } finally { setBusy(false); }
  };

  const submitPassword = async (e) => {
    e.preventDefault();
    setPwError(""); setPwOk("");
    if (!currentPw) return setPwError("Enter your current password.");
    if (newPw.length < 8) return setPwError("New password must be at least 8 characters.");
    if (newPw !== confirmPw) return setPwError("New passwords don't match.");
    if (newPw === currentPw) return setPwError("New password must be different from current password.");
    setPwBusy(true);
    try {
      await apiChangePassword({ currentPassword: currentPw, newPassword: newPw });
      setCurrentPw(""); setNewPw(""); setConfirmPw("");
      setPwOk("Password updated. Any other devices have been signed out.");
      setTimeout(() => setPwOk(""), 4000);
    } catch (err) {
      setPwError(err.message || "Couldn't update password. Try again.");
    } finally { setPwBusy(false); }
  };

  return ReactDOM.createPortal(
    <div className="fixed inset-0 z-50 overflow-y-auto"
      style={{ background: "var(--bg-1, #f5f1e8)" }}>
      <header className="sticky top-0 z-10 backdrop-blur border-b border-line"
        style={{ background: "var(--bg-1, #f5f1e8)" }}>
        <div className="max-w-3xl mx-auto px-4 sm:px-6 py-3">
          <BrandedHeaderRow
            title="Account Settings"
            onClick={onClose}
            right={
              <button onClick={onClose}
                className="text-[12px] font-semibold rounded-md border border-line bg-white px-3 py-1.5 text-muted hover:text-text">
                Done
              </button>
            }
          />
        </div>
      </header>
      <main className="max-w-3xl mx-auto px-4 sm:px-6 py-6 fade-in space-y-5">
        <div className="text-[12px] text-muted leading-relaxed">
          These settings apply across every league you're in. League-specific stuff (display name, team name, avatar) lives in <span className="font-semibold text-text">League Settings</span> inside each league.
        </div>

        {/* Identity */}
        <ProfileSection title="Identity" hint="Used for billing, the Club Championship, and your Clubhouse name.">
          <div className="grid grid-cols-2 gap-3">
            <ProfileField label="First name" value={firstName} onChange={setFirstName} placeholder="Austin" />
            <ProfileField label="Last name"  value={lastName}  onChange={setLastName}  placeholder="Keim" />
          </div>
          <div className="rounded-lg border border-line bg-bg2/40 px-3 py-2.5">
            <div className="text-[11px] uppercase tracking-wider text-dim font-semibold mb-1">Club Championship name</div>
            <div className="flex items-baseline gap-2">
              <span className="font-bold text-base">{ccDisplay}</span>
              <span className="text-[11px] text-dim">Always First + Last initial</span>
            </div>
            <div className="text-[11px] text-dim mt-1 leading-snug">
              Not changeable — keeps the Club Championship readable across all members.
            </div>
          </div>
        </ProfileSection>

        {/* Email */}
        <ProfileSection title="Email" hint="Used for sign-in and notifications.">
          <ProfileField label="Email" value={email} onChange={setEmail} type="email" placeholder="you@example.com" />
          <div className="flex items-center justify-between gap-3 pt-2">
            <span className={`text-xs ${toast === "Saved" ? "text-green" : "text-red"}`}>{toast}</span>
            <button onClick={saveAccount} disabled={busy}
              className="px-4 py-2 bg-green/10 text-green border border-green/30 rounded-lg text-sm font-semibold hover:bg-green/20 hover:border-green/50 transition-colors disabled:opacity-50">
              {busy ? "Saving…" : "Save changes"}
            </button>
          </div>
        </ProfileSection>

        {/* Notifications */}
        <ProfileSection title="Notifications" hint="Email alerts from notify@onlymajors.com.">
          <NotificationToggles />
        </ProfileSection>

        {/* Password */}
        <ProfileSection title="Security" hint="Changing your password signs out every other device you're logged in on.">
          <form onSubmit={submitPassword} className="space-y-3">
            <ProfileField label="Current password"     value={currentPw} onChange={setCurrentPw} type="password" placeholder="••••••••" />
            <ProfileField label="New password"         value={newPw}     onChange={setNewPw}     type="password" placeholder="At least 8 characters" />
            <ProfileField label="Confirm new password" value={confirmPw} onChange={setConfirmPw} type="password" placeholder="Re-enter the new password" />
            <div className="flex items-center justify-between gap-3 pt-2">
              <span className="text-xs">
                {pwError && <span className="text-red">{pwError}</span>}
                {pwOk && <span className="text-green">{pwOk}</span>}
              </span>
              <button type="submit" disabled={pwBusy}
                className="px-4 py-2 bg-green/10 text-green border border-green/30 rounded-lg text-sm font-semibold hover:bg-green/20 transition-colors disabled:opacity-50">
                {pwBusy ? "Updating…" : "Change password"}
              </button>
            </div>
          </form>
        </ProfileSection>
      </main>
    </div>,
    document.body
  );
}

function ProfileTab({ user, onSave, onBack, onOpenAccountSettings }) {
  const [firstName, setFirstName] = useState(user.firstName || "");
  const [lastName,  setLastName]  = useState(user.lastName  || "");
  const [displayName, setDisplayName] = useState(user.owner);
  const [teamName, setTeamName] = useState(user.name);
  const [email, setEmail] = useState(user.email);
  // Auto-suggest a default display name from first + last whenever those
  // change, unless the user has manually edited the display name.
  const initialCustom = user?.displayNameCustom ?? false;
  const [displayNameCustom, setDisplayNameCustom] = useState(initialCustom);
  const autoDisplay = (firstName.trim() && lastName.trim())
    ? `${firstName.trim()} ${lastName.trim()[0].toUpperCase()}.`
    : firstName.trim() || "";
  React.useEffect(() => {
    if (!displayNameCustom && autoDisplay) setDisplayName(autoDisplay);
  }, [autoDisplay, displayNameCustom]);
  const [avatarDataUrl, setAvatarDataUrl] = useState(user.avatarDataUrl || null);
  const [currentPw, setCurrentPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [accountToast, setAccountToast] = useState("");
  const [pwError, setPwError] = useState("");
  const [pwOk, setPwOk] = useState("");
  const fileRef = React.useRef(null);

  // Live preview of the badge — mock team object with current local state
  const previewTeam = { ...user, name: teamName, owner: displayName, avatarDataUrl };

  const handleFile = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    if (!f.type.startsWith("image/")) { setAccountToast("Pick an image file (jpg, png, etc.)"); return; }
    if (f.size > 900 * 1024) { setAccountToast("Image too large — keep it under 900KB"); return; }
    const reader = new FileReader();
    reader.onload = ev => setAvatarDataUrl(ev.target.result);
    reader.onerror = () => setAccountToast("Couldn't read that file");
    reader.readAsDataURL(f);
  };

  const saveAccount = () => {
    if (!displayName.trim()) { setAccountToast("Display name can't be empty"); return; }
    if (!teamName.trim())    { setAccountToast("Team name can't be empty"); return; }
    // League Settings only touches league-scoped fields. Account-wide
    // changes (first/last/email/password/notifications) go through the
    // Account Settings overlay.
    onSave({
      owner: displayName.trim(),
      name:  teamName.trim(),
      displayNameCustom,
      avatarDataUrl,
    });
    setAccountToast("Saved");
    setTimeout(() => setAccountToast(""), 2500);
  };

  const [pwBusy, setPwBusy] = useState(false);
  const submitPassword = async (e) => {
    e.preventDefault();
    setPwError(""); setPwOk("");
    if (!currentPw) return setPwError("Enter your current password.");
    if (newPw.length < 8) return setPwError("New password must be at least 8 characters.");
    if (newPw !== confirmPw) return setPwError("New passwords don't match.");
    if (newPw === currentPw) return setPwError("New password must be different from current password.");
    setPwBusy(true);
    try {
      await apiChangePassword({ currentPassword: currentPw, newPassword: newPw });
      setCurrentPw(""); setNewPw(""); setConfirmPw("");
      setPwOk("Password updated. Any other devices have been signed out.");
      setTimeout(() => setPwOk(""), 4000);
    } catch (err) {
      setPwError(err.message || "Couldn't update password. Try again.");
    } finally {
      setPwBusy(false);
    }
  };

  return (
    <div className="max-w-2xl mx-auto space-y-5">
      {/* Header */}
      <div className="flex items-center gap-3 flex-wrap">
        <button onClick={onBack}
          className="text-sm text-muted hover:text-text inline-flex items-center gap-1.5 px-2 py-1 rounded-md hover:bg-black/[0.03]">
          <svg viewBox="0 0 16 16" className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 4L6 8l4 4"/></svg>
          Back
        </button>
        <h1 className="font-bold text-2xl tracking-tight">League Settings</h1>
        <div className="flex-1"/>
        {onOpenAccountSettings && (
          <button onClick={onOpenAccountSettings}
            className="om-explore-pill inline-flex items-center gap-1.5 text-[12px] font-semibold rounded-md border border-line bg-white px-3 py-1.5 text-muted">
            <svg viewBox="0 0 16 16" className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="8" cy="5" r="2.5"/><path d="M3 14a5 5 0 0 1 10 0"/>
            </svg>
            Account Settings
          </button>
        )}
      </div>
      <div className="text-[12px] text-muted leading-relaxed -mt-2">
        These settings only affect <span className="font-semibold text-text">this league</span>. For email, password, notifications, and your name across all leagues, open Account Settings.
      </div>

      {/* Profile picture */}
      <ProfileSection title="Profile picture" hint="Replaces the team monogram everywhere in this league. Each league can have its own picture.">
        <div className="flex items-center gap-5">
          <TeamBadge team={previewTeam} size="xl" />
          <div className="flex flex-col gap-2">
            <button onClick={() => fileRef.current?.click()}
              className="px-3 py-2 bg-green/10 text-green border border-green/30 rounded-md text-sm font-semibold hover:bg-green/20 transition-colors w-fit">
              {avatarDataUrl ? "Replace image" : "Upload image"}

            {avatarDataUrl && (
              <button onClick={() => setAvatarDataUrl(null)}
                className="px-3 py-2 text-xs text-muted hover:text-text rounded-md hover:bg-black/[0.03] transition-colors w-fit">

            )}
            <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} className="hidden"/>
            <div className="text-[12px] text-dim">JPG, PNG, or GIF. Under 900KB.</div>
          </div>
        </div>
      </ProfileSection>

      {/* League-specific identity (this team only) */}
      <ProfileSection title="This League" hint="How your team shows up here. Other leagues stay separate.">
        <ProfileField label="Display name" value={displayName}
          onChange={(v) => { setDisplayName(v); setDisplayNameCustom(true); }}
          placeholder={autoDisplay || "e.g. Austin K."}
          sub={displayNameCustom
            ? "Your handle in this league — shows in chat, leaderboards, score cards."
            : (autoDisplay ? `Defaults to ${autoDisplay} — customize per league.`
                           : "Defaults from your account name once set.")} />
        <ProfileField label="Team name"   value={teamName}   onChange={setTeamName}   placeholder="e.g. Team Austin" sub="The team brand shown in standings and chat headers." />
        <div className="flex items-center justify-between gap-3 pt-2">
          <span className={`text-xs ${accountToast === "Saved" ? "text-green" : "text-red"}`}>{accountToast}</span>
          <button onClick={saveAccount}
            className="px-4 py-2 bg-green/10 text-green border border-green/30 rounded-lg text-sm font-semibold hover:bg-green/20 hover:border-green/50 transition-colors">
            Save changes
          </button>
        </div>
      </ProfileSection>
    </div>
  );
}

// Per-user notification preference toggles. Five rows, all default ON.
function NotificationToggles() {
  const [prefs, setPrefs] = useState(null);
  const [busy, setBusy]   = useState(false);
  const [toast, setToast] = useState("");
  const [loadErr, setLoadErr] = useState("");
  useEffect(() => {
    apiGetNotificationPrefs()
      .then(p => { setPrefs(p); setLoadErr(""); })
      .catch(e => setLoadErr(e.message || "Couldn't load notification preferences"));
  }, []);
  const update = async (key, value) => {
    if (!prefs) return;
    const next = { ...prefs, [key]: value };
    setPrefs(next); setBusy(true); setToast("");
    try {
      await apiSetNotificationPrefs(next);
      setToast("Saved");
      setTimeout(() => setToast(""), 1500);
    } catch (e) {
      // Revert on error.
      setPrefs(prefs);
      setToast(`Couldn't save: ${e.message}`);
    } finally { setBusy(false); }
  };
  if (loadErr) {
    return (
      <div className="rounded-lg border border-line bg-bg2/40 px-3 py-3 text-[12px] text-muted leading-relaxed">
        Couldn't load notification preferences. <span className="text-dim">{loadErr}</span><br/>
        <span className="text-[11px] text-dim">Often this means the backend hasn't picked up the new endpoint yet — try again in a minute.</span>
      </div>
    );
  }
  if (!prefs) return <div className="text-xs text-dim italic">Loading preferences…</div>;
  const rows = [
    ["picksOpen",   "Picks Open",           "When the field is set for an upcoming major."],
    ["wedReminder", "Wednesday reminder",   "Night before R1 — only if your roster's incomplete."],
    ["roundWrap",   "Round wrap digest",    "After each round ends, with where you stand."],
    ["mcAlert",     "Missed-cut alert",     "If a starter missed the cut, included in R2 wrap."],
    ["satReminder", "Saturday sub reminder","Final sub window before Sunday tees off."],
  ];
  return (
    <div className="space-y-1">
      {rows.map(([key, label, sub]) => (
        <ToggleRow key={key} label={label} sub={sub} value={prefs[key]}
          onChange={v => update(key, v)} disabled={busy} />
      ))}
      {toast && <div className={`text-[12px] pt-2 ${toast === "Saved" ? "text-green" : "text-red"}`}>{toast}</div>}
    </div>
  );
}

function ToggleRow({ label, sub, value, onChange, disabled }) {
  return (
    <label className={`flex items-center justify-between gap-3 py-2.5 cursor-pointer ${disabled ? "opacity-60" : ""}`}>
      <div className="min-w-0">
        <div className="text-sm font-semibold text-text">{label}</div>
        <div className="text-[12px] text-dim mt-0.5">{sub}</div>
      </div>
      <button type="button" onClick={() => !disabled && onChange(!value)}
        className="relative inline-flex h-6 w-11 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-green/40"
        style={{ background: value ? "var(--green)" : "#d4d0c1" }}>

/* =========================================================================
   PICKER MODAL
   ========================================================================= */
function PickerModal({ state, teamId, majorId, picks, dynamicField, onPick, onClose }) {
  const major = M[majorId];

  const lockedFromOthers = useMemo(() => {
    const s = new Set();
    for (const m of MAJORS) {
      if (m.id === majorId) continue;
      const p = picks[teamId][m.id];
      // Original starters are locked
      p.starters?.forEach(g => g && s.add(g));
      // Subbed-in bench players also played → locked
      (p.subs || []).forEach(sub => { if (sub.in) s.add(sub.in); });
    }
    return s;
  }, [picks, teamId, majorId]);

  const inLineup = useMemo(() => {
    const p = picks[teamId][majorId];
    return new Set([...p.starters, ...p.bench].filter(Boolean));
  }, [picks, teamId, majorId]);

  // Use the dynamic field if available, else fall back to curated FIELDS list.
  // Dynamic field comes from /api/field (DataGolf), includes the full ~156 players.
  const fieldPlayers = useMemo(() => {
    if (dynamicField?.players?.length) {
      return dynamicField.players.map(p => ({ id: p.gid, name: p.name, country: p.country }));
    }
    return (FIELDS[majorId] || []).map(gid => {
      const g = G[gid];
      return g ? { id: gid, name: g.name, country: g.country } : null;
    }).filter(Boolean);
  }, [dynamicField, majorId]);

  // Group alphabetically by last name
  const sorted = useMemo(() => {
    return [...fieldPlayers].sort((a, b) => {
      const lastA = (a.name || "").split(/\s+/).pop().toLowerCase();
      const lastB = (b.name || "").split(/\s+/).pop().toLowerCase();
      return lastA.localeCompare(lastB);
    });
  }, [fieldPlayers]);

  // Bucket into A-Z groups by first letter of last name
  const grouped = useMemo(() => {
    const buckets = {};
    for (const p of sorted) {
      const last = (p.name || "").split(/\s+/).pop();
      const letter = (last[0] || "?").toUpperCase();
      (buckets[letter] = buckets[letter] || []).push(p);
    }
    return Object.entries(buckets).sort(([a],[b]) => a.localeCompare(b));
  }, [sorted]);

  const renderRow = (g) => {
    const locked = lockedFromOthers.has(g.id);
    const lineup = inLineup.has(g.id);
    const disabled = locked || lineup;
    return (
      <button key={g.id} disabled={disabled} onClick={() => onPick(g.id)}
        className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left transition-colors ${disabled ? "opacity-40 cursor-not-allowed" : "hover:bg-green/10 active:bg-green/15"}`}>
        <CountryCode code={g.country} className="w-9" />
        <span className="flex-1 font-medium">{g.name}</span>
        {locked && <span className="text-[11px] px-1.5 py-0.5 rounded bg-black/[0.04] text-dim font-semibold whitespace-nowrap">Played earlier</span>}
        {lineup && !locked && <span className="text-[11px] px-1.5 py-0.5 rounded bg-gold/15 text-gold font-semibold border border-gold/30 whitespace-nowrap">In lineup</span>}
      </button>
    );
  };

  const fieldCount = sorted.length;
  const sourceLabel = dynamicField?.source === "in-play"     ? "DataGolf · live"
                    : dynamicField?.source === "field-updates" ? "DataGolf · field updates"
                    : dynamicField?.source === "snapshots"     ? "snapshot"
                    : "curated list";

  return (
    <Modal title={`Pick a ${state.slotType === "starter" ? "starter" : "bench player"} — ${major.short}`} onClose={onClose}>
      <div className="text-xs text-dim mb-3 flex items-center justify-between">
        <span>{fieldCount} golfers in the field · sorted A–Z</span>
        <span className="text-[11px] uppercase tracking-wider text-dim">{sourceLabel}</span>
      </div>
      <div className="max-h-[65vh] overflow-y-auto -mx-2 pb-2">
        {grouped.length === 0 && (
          <div className="text-sm text-dim px-3 py-6 text-center">
            <div className="font-semibold mb-1">Field hasn't been published yet</div>
            <div className="text-[12px]">It'll auto-load as soon as DataGolf has the {major.short} field.</div>
          </div>
        )}
        {grouped.map(([letter, players]) => (
          <div key={letter}>
            <div className="sticky top-0 bg-white/95 backdrop-blur-sm px-3 py-1 text-[11px] uppercase tracking-[0.18em] text-dim font-bold border-b border-line z-10">{letter}</div>
            {players.map(renderRow)}
          </div>
        ))}
      </div>
    </Modal>
  );
}

/* =========================================================================
   SUB-IN MODAL
   ========================================================================= */
function SubInModal({ benchIndex, teamId, majorId, picks, onConfirm, onClose }) {
  const [selectedIdx, setSelectedIdx] = useState(null);
  const slot = picks[teamId][majorId];
  const bench = G[slot.bench[benchIndex]];
  const benchEarn = EARN[majorId]?.[slot.bench[benchIndex]];
  const benchTotal = golferTotal(majorId, slot.bench[benchIndex]);
  const target = selectedIdx !== null ? G[slot.starters[selectedIdx]] : null;
  return (
    <Modal title={`Sub in ${bench?.name}`} onClose={onClose}>
      {/* Bench player being brought in */}
      <div className="mb-3 p-3 rounded-lg bg-green/8 border border-green/30 text-xs">
        <div className="text-[11px] uppercase tracking-wider text-green font-bold mb-1">Bringing in</div>
        <div className="flex items-center gap-2">
          <CountryCode code={bench.country} className="w-8"/>
          <span className="font-semibold text-sm flex-1 text-text">{bench.name}</span>
          {benchEarn && <ScorePill status={benchEarn.status} position={benchEarn.position}/>}
          {benchEarn && <ScoreNum score={benchEarn.score} status={benchEarn.status}/>}
          <span className="font-mono text-text">{fmt(benchTotal)}</span>
        </div>
      </div>

      <p className="text-sm text-muted mb-3">
        Tap a starter to choose who they replace. Both golfers will be <strong className="text-text">locked for the season</strong> once you confirm.
      </p>
      <div className="space-y-2">
        {slot.starters.map((gid, idx) => {
          const s = G[gid];
          const earn = EARN[majorId]?.[gid];
          const sel = selectedIdx === idx;
          return (
            <button key={gid} onClick={() => setSelectedIdx(idx)}
              className={`w-full flex items-center gap-3 p-3 rounded-lg border text-left transition-colors ${sel ? "bg-green/10 border-green/50" : "bg-white border-line hover:bg-black/[0.03] hover:border-line-2"}`}>
              <CountryCode code={s.country} className="w-8" />
              <div className="flex-1">
                <div className="font-semibold">{s.name}</div>
                {earn && <div className="text-xs text-dim mt-0.5 flex items-center gap-2">
                  <ScorePill status={earn.status} position={earn.position} />
                  <ScoreNum score={earn.score} status={earn.status} />
                  <span className="font-mono">{fmt(golferTotal(majorId, gid))}</span>
                </div>}
              </div>
              {sel
                ? <svg viewBox="0 0 16 16" className="w-5 h-5 text-green shrink-0" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8l3 3 7-7"/></svg>
                : <span className="text-xs text-dim">Select</span>}
            </button>
          );
        })}
      </div>

      {/* Summary + Lock it in */}
      <div className="mt-4 pt-4 border-t border-line">
        {target ? (
          <>
            <div className="mb-3 text-sm text-text">
              <span className="text-muted">Confirm: </span>
              <strong>{target.name}</strong> sits out — <strong className="text-green">{bench.name}</strong> takes the slot.
            </div>
            <button onClick={() => onConfirm(selectedIdx)}
              className="w-full font-semibold rounded-lg py-2.5 transition-colors text-sm disabled:opacity-50 om-pill">
              Lock it in
            </button>
          </>
        ) : (
          <button disabled className="w-full font-semibold bg-black/[0.06] text-dim rounded-lg py-2.5 cursor-not-allowed text-sm">
            Select a starter to replace
          </button>
        )}
        <button onClick={onClose} className="mt-2 w-full text-sm text-dim hover:text-muted">Cancel</button>
      </div>
    </Modal>
  );
}

/* =========================================================================
   SUB-OUT MODAL — pick a bench player to swap in for this starter
   ========================================================================= */
function SubOutModal({ starterIndex, teamId, majorId, picks, onConfirm, onClose }) {
  const [selectedIdx, setSelectedIdx] = useState(null);
  const slot = picks[teamId][majorId];
  const starter = G[slot.starters[starterIndex]];
  const starterEarn = EARN[majorId]?.[slot.starters[starterIndex]];
  const incoming = selectedIdx !== null ? G[slot.bench[selectedIdx]] : null;
  return (
    <Modal title={`Sub out ${starter?.name}`} onClose={onClose}>
      {/* Starter sitting out */}
      {starterEarn && (
        <div className="mb-3 p-3 rounded-lg bg-black/[0.03] border border-line text-xs">
          <div className="text-[11px] uppercase tracking-wider text-dim mb-1">Sitting out</div>
          <div className="flex items-center gap-2">
            <CountryCode code={starter.country} className="w-8" />
            <span className="font-semibold text-sm flex-1 text-text">{starter.name}</span>
            <ScorePill status={starterEarn.status} position={starterEarn.position} />
            <ScoreNum score={starterEarn.score} status={starterEarn.status} />
            <span className="font-mono text-text">{fmt(golferTotal(majorId, slot.starters[starterIndex]))}</span>
          </div>
        </div>
      )}
      <p className="text-sm text-muted mb-3">
        Tap a bench player to bring in. Both golfers will be <strong className="text-text">locked for the season</strong> once you confirm.
      </p>
      <div className="space-y-2">
        {slot.bench.map((gid, idx) => {
          if (!gid) return null;
          const b = G[gid];
          const earn = EARN[majorId]?.[gid];
          const sel = selectedIdx === idx;
          return (
            <button key={gid} onClick={() => setSelectedIdx(idx)}
              className={`w-full flex items-center gap-3 p-3 rounded-lg border text-left transition-colors ${sel ? "bg-green/10 border-green/50" : "bg-white border-line hover:bg-black/[0.03] hover:border-line-2"}`}>
              <CountryCode code={b.country} className="w-8" />
              <div className="flex-1">
                <div className="font-semibold">{b.name}</div>
                {earn && <div className="text-xs text-dim mt-0.5 flex items-center gap-2">
                  <ScorePill status={earn.status} position={earn.position} />
                  <ScoreNum score={earn.score} status={earn.status} />
                  <span className="font-mono">{fmt(golferTotal(majorId, gid))}</span>
                </div>}
              </div>
              {sel
                ? <svg viewBox="0 0 16 16" className="w-5 h-5 text-green shrink-0" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8l3 3 7-7"/></svg>
                : <span className="text-xs text-dim">Select</span>}
            </button>
          );
        })}
        {slot.bench.every(x => x == null) && (
          <div className="text-sm text-dim px-3 py-4 text-center">No bench players available to swap in.</div>
        )}
      </div>

      {/* Summary + Lock it in */}
      <div className="mt-4 pt-4 border-t border-line">
        {incoming ? (
          <>
            <div className="mb-3 text-sm text-text">
              <span className="text-muted">Confirm: </span>
              <strong>{starter.name}</strong> sits out — <strong className="text-green">{incoming.name}</strong> takes the slot.
            </div>
            <button onClick={() => onConfirm(selectedIdx)}
              className="w-full font-semibold rounded-lg py-2.5 transition-colors text-sm disabled:opacity-50 om-pill">
              Lock it in
            </button>
          </>
        ) : (
          <button disabled className="w-full font-semibold bg-black/[0.06] text-dim rounded-lg py-2.5 cursor-not-allowed text-sm">
            Select a bench player
          </button>
        )}
        <button onClick={onClose} className="mt-2 w-full text-sm text-dim hover:text-muted">Cancel</button>
      </div>
    </Modal>
  );
}

/* =========================================================================
   GENERIC MODAL
   ========================================================================= */
function Modal({ title, children, onClose }) {
  useEffect(() => {
    const k = e => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", k);
    return () => document.removeEventListener("keydown", k);
  }, [onClose]);
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/70 backdrop-blur-sm fade-in" onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        className="bg-bg2 w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl border border-line-2 max-h-[90vh] flex flex-col">
        <div className="px-5 py-4 border-b border-line flex items-center">
          <h3 className="font-bold text-base flex-1">{title}</h3>
          <button onClick={onClose} className="text-dim hover:text-text text-2xl leading-none">×</button>
        </div>
        <div className="p-4 sm:p-5 overflow-y-auto">{children}</div>
      </div>
    </div>
  );
}
