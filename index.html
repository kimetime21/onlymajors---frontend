        </div>
      )}
    </div>
  );
}


// League-wide averages panel — every team's career stats side by side. Same
// math as the user's personal Career Stats card, just iterated across all
// members of the league so people can compare averages, PRs, and trophies.
function LeagueAveragesPanel({ leagueId, members, picks, myTeamId, syncToken }) {
  const [archive, setArchive] = useState(null);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    setLoading(true); setError(null);
    apiLeagueArchive(leagueId)
      .then(r => { if (!cancelled) setArchive(r); })
      .catch(e => { if (!cancelled) setError(e.message); })
      .finally(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  }, [leagueId]);

  const rows = useMemo(() => {
    if (!members?.length) return [];
    const MIDS = ["masters","pga","usopen","open"];
    const list = members.map(member => {
      const teamId = member.teamId;
      let tournSum = 0, tournCount = 0, seasonSum = 0, seasonCount = 0;
      let tournWins = 0, overallWins = 0, tournPR = 0, overallPR = 0;

      // Archived years
      for (const yearEntry of (archive?.years || [])) {
        const data = yearEntry.data || {};
        const t = (data.teams || []).find(x => x.teamId === teamId);
        if (t) {
          for (const mid of MIDS) {
            if (t.byMajor?.[mid] != null) {
              const v = Number(t.byMajor[mid]) || 0;
              tournSum += v; tournCount++;
              if (v > tournPR) tournPR = v;
            }
          }
          const tot = Number(t.total) || 0;
          seasonSum += tot; seasonCount++;
          if (tot > overallPR) overallPR = tot;
        }
        for (const mid of MIDS) {
          if (data.majorWinners?.[mid]?.teamId === teamId) tournWins++;
        }
        if (data.champion?.teamId === teamId) overallWins++;
      }

      // Current season completed majors fold in
      for (const m of MAJORS) {
        if (m.status !== "complete") continue;
        const earnings = teamMajorTotal(teamId, m.id, picks);
        tournSum += earnings; tournCount++;
        if (earnings > tournPR) tournPR = earnings;
        const all = members.map(mem => ({
          teamId: mem.teamId,
          total:  teamMajorTotal(mem.teamId, m.id, picks),
        })).sort((a, b) => b.total - a.total);
        if (all[0]?.teamId === teamId && all[0].total > 0) tournWins++;
      }

      return {
        teamId, teamName: member.teamName, teamColor: member.teamColor,
        tournAvg:   tournCount  > 0 ? Math.round(tournSum  / tournCount)  : 0,
        tournPR,    tournWins,
        overallAvg: seasonCount > 0 ? Math.round(seasonSum / seasonCount) : 0,
        overallPR,  overallWins,
      };
    });
    return list;
  // syncToken bumps when EARN hydrates so current-season earnings flow in
  // each time a tournament finishes — same recompute pattern as the user's
  // personal Career Stats card.
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [members, picks, archive, syncToken]);

  // Click-to-sort: first click on a column header → descending (best at top,
  // chevron up). Second click → ascending (worst at top, chevron down).
  // Clicking another column resets the previous and starts the new one at
  // descending.
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState("desc");
  const onSort = (key) => {
    if (sortKey === key) {
      setSortDir(d => d === "desc" ? "asc" : "desc");
    } else {
      setSortKey(key);
      setSortDir("desc");
    }
  };
  const sortedRows = useMemo(() => {
    if (!sortKey) {
      return [...rows].sort((a, b) => (b.overallWins - a.overallWins) || (b.overallAvg - a.overallAvg));
    }
    const dir = sortDir === "desc" ? -1 : 1;
    return [...rows].sort((a, b) => dir * ((Number(a[sortKey]) || 0) - (Number(b[sortKey]) || 0)));
  }, [rows, sortKey, sortDir]);

  // Header-cell renderer with sort affordance — dash when inactive, chevron
  // up when sorted descending, chevron down when ascending.
  const SortableTH = ({ k, label }) => {
    const active = sortKey === k;
    const dirIcon = active ? (sortDir === "desc"
      ? <svg viewBox="0 0 24 24" className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 15 12 9 18 15"/></svg>
      : <svg viewBox="0 0 24 24" className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    ) : <span className="leading-none" style={{ fontSize: "11px", color: "var(--dim)" }}>—</span>;
    return (
      <th className="text-right px-2 whitespace-nowrap">
        <button onClick={() => onSort(k)}
          className={`inline-flex items-center gap-1 justify-end text-[11px] uppercase tracking-wider font-semibold hover:text-text transition-colors ${active ? "" : "text-dim"}`}
          style={active ? { color: "var(--green)" } : {}}>
          <span>{label}</span>
          <span className="inline-flex items-center">{dirIcon}</span>
        </button>
      </th>
    );
  };

  return (
    <div className="border-t border-line bg-bg2/40 px-4 sm:px-5 py-4 fade-in">
      {loading && <div className="text-xs text-dim">Loading league averages…</div>}
      {error   && <div className="text-xs text-red">Couldn't load averages: {error}</div>}
      {!loading && !error && rows.length > 0 && (
        <div className="overflow-x-auto -mx-1 px-1">
          <table className="w-full text-sm" style={{ borderCollapse: "separate", borderSpacing: 0 }}>
            <thead>
              <tr>
                <th className="text-left py-2 pr-3 whitespace-nowrap text-[11px] uppercase tracking-wider text-dim font-semibold">Team</th>
                <SortableTH k="tournAvg"   label="Tour avg" />
                <SortableTH k="tournPR"    label="Tour PR" />
                <SortableTH k="tournWins"  label="Tour W" />
                <SortableTH k="overallAvg" label="Season avg" />
                <SortableTH k="overallPR"  label="Season PR" />
                <SortableTH k="overallWins" label="Season W" />
              </tr>
            </thead>
            <tbody>
              {sortedRows.map(r => {
                const isMe = r.teamId === myTeamId;
                return (
                  <tr key={r.teamId} className="border-t border-line"
                    style={isMe ? { background: "rgba(15, 122, 62, 0.05)" } : {}}>
                    <td className="py-2 pr-3 whitespace-nowrap">
                      <div className="flex items-center gap-2">
                        <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ background: r.teamColor }}/>
                        <span className={`font-semibold ${isMe ? "" : "text-text"}`}>{r.teamName}</span>
                        {isMe && <span className="text-[10px] uppercase tracking-wider font-bold text-green ml-1">You</span>}
                      </div>
                    </td>
                    <td className="text-right px-2 font-mono whitespace-nowrap">{fmt(r.tournAvg)}</td>
                    <td className="text-right px-2 font-mono whitespace-nowrap">{fmt(r.tournPR)}</td>
                    <td className="text-right px-2 font-mono font-semibold whitespace-nowrap"
                      style={r.tournWins > 0 ? { color: "var(--gold)" } : {}}>{r.tournWins}</td>
                    <td className="text-right px-2 font-mono whitespace-nowrap">{fmt(r.overallAvg)}</td>
                    <td className="text-right px-2 font-mono whitespace-nowrap">{fmt(r.overallPR)}</td>
                    <td className="text-right pl-2 font-mono font-semibold whitespace-nowrap"
                      style={r.overallWins > 0 ? { color: "var(--gold)" } : {}}>{r.overallWins}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function Stat({ label, value, sub, tone }) {
  const toneColor = tone === "ok" ? "#2b4535" : tone === "warn" ? "#b08006" : tone === "muted" ? "var(--dim)" : "var(--text)";
  return (
    <div className="min-w-0">
      <div className="text-[11px] uppercase tracking-wider text-dim font-semibold">{label}</div>
      <div className="text-sm font-semibold truncate" style={{ color: toneColor }}>{value}</div>
      {sub && <div className="text-[12px] text-dim font-mono truncate">{sub}</div>}
    </div>
  );
}

// Inline modal used by the Hub for both join + create flows. Reuses the same
// backend endpoints the LoginScreen does. On success it bubbles up so the Hub
// can refresh its summary.
function LeagueHubActionModal({ kind, onClose, onJoined, onCreated }) {
  // Create flow state
  const [name, setName]         = useState("");
  const [code, setCode]         = useState("");
  const [visibility, setVisibility] = useState("public");
  // Disable full-season types once any of the four majors has already started
  // — a new "all four" league mid-season would have nothing to count for
  // tournaments already in the books.
  const fourMajorsAvailable = ["masters","pga","usopen","open"].every(mid => {
    const m = MAJORS.find(x => x.id === mid);
    return m && m.status === "upcoming";
  });
  const [leagueType, setLeagueType] = useState(fourMajorsAvailable ? "all_four" : "remaining_majors");
  const [singleMajor, setSingleMajor] = useState(null);
  const [createdLeague, setCreatedLeague] = useState(null);
  // Join flow state
  const [joinCode, setJoinCode] = useState("");
  const [lookup, setLookup]     = useState(null);   // { league, members }
  const [lookupBusy, setLookupBusy] = useState(false);
  const [teamId, setTeamId]     = useState("");
  const [busy, setBusy]         = useState(false);
  const [error, setError]       = useState("");

  // Live lookup when typing a join code
  useEffect(() => {
    if (kind !== "join") return;
    const c = joinCode.trim().toUpperCase();
    if (!c) { setLookup(null); return; }
    let cancelled = false;
    setLookupBusy(true);
    apiLeagueByCode(c)
      .then(r => { if (!cancelled) { setLookup(r); setError(""); } })
      .catch(e => { if (!cancelled) { setLookup(null); setError(e.message); } })
      .finally(() => { if (!cancelled) setLookupBusy(false); });
    return () => { cancelled = true; };
  }, [kind, joinCode]);

  const handleCreate = async (e) => {
    e.preventDefault();
    if (!name.trim()) { setError("Give your league a name."); return; }
    if (leagueType === "single_major") {
      if (!singleMajor) { setError("Pick which major this league is for."); return; }
      const picked = MAJORS.find(m => m.id === singleMajor);
      if (picked && picked.status === "complete") {
        setError(`${picked.short} has already been played — pick an upcoming major.`);
        return;
      }
    }
    setBusy(true); setError("");
    try {
      // Derive includedMajors from the chosen type. "remaining_majors" pulls
      // upcoming majors at creation time. "single_major" uses the picked one.
      let includedMajors;
      if (leagueType === "single_major")        includedMajors = singleMajor ? [singleMajor] : ["masters","pga","usopen","open"];
      else if (leagueType === "remaining_majors") includedMajors = MAJORS.filter(m => m.status === "upcoming").map(m => m.id);
      else if (leagueType === "four_plus_one")    includedMajors = ["masters","pga","usopen","open","players"];
      else                                         includedMajors = ["masters","pga","usopen","open"];
      const r = await apiCreateLeague({
        name: name.trim(),
        code: code.trim().toUpperCase() || undefined,
        visibility, leagueType, includedMajors,
      });
      setCreatedLeague(r);
      onCreated?.(r);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  };

  const handleJoin = async (e) => {
    e.preventDefault();
    if (!lookup) { setError("Enter a valid league code."); return; }
    const needsPicker = lookup.league.memberModel === "slots";
    if (needsPicker && !teamId) { setError("Pick a team to claim."); return; }
    setBusy(true); setError("");
    try {
      await apiClaimLeagueSlot({ leagueId: lookup.league.id, teamId: needsPicker ? teamId : undefined });
      onJoined?.(lookup.league.id);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  };

  return (
    <div className="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center px-4 py-6"
      onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-xl w-full max-w-md p-5 sm:p-6 fade-in"
        onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-bold text-lg">
            {kind === "create" ? "Start a new league" : "Join a league"}
          </h3>
          <button onClick={onClose} className="text-dim hover:text-text text-xl leading-none">×</button>
        </div>

        {kind === "create" && !createdLeague && (
          <form onSubmit={handleCreate} className="space-y-3">
            <AuthField label="League name" type="text" value={name} onChange={setName} placeholder="e.g. The Back Nine" />
            <div>
              <span className="block text-[12px] uppercase tracking-wider text-dim font-semibold mb-1">Invite code <span className="text-dim normal-case font-normal tracking-normal">(optional)</span></span>
              <input type="text" value={code}
                onChange={e => setCode(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ""))}
                placeholder="e.g. BACK9" maxLength={16}
                className="w-full bg-bg2 border border-line-2 rounded-lg px-3 py-2.5 text-sm font-mono tracking-wider focus:outline-none focus:ring-2 focus:ring-green/40 placeholder-dim text-text" />
            </div>
            <div>
              <span className="block text-[12px] uppercase tracking-wider text-dim font-semibold mb-1">League type</span>
              <div className="grid grid-cols-2 gap-2">
                <button type="button" onClick={() => setLeagueType("single_major")}
                  className={`rounded-lg border px-3 py-2 text-left transition-colors ${leagueType==="single_major" ? "" : "border-line text-dim hover:border-line-2"}`}
                  style={leagueType==="single_major" ? { borderColor: "var(--green)", background: "rgba(43,69,53,0.06)" } : {}}>
                  <div className="text-[13px] font-semibold">Single major</div>
                  <div className="text-[11px] text-dim mt-0.5">Pick one tournament.</div>
                </button>
                <button type="button" onClick={() => setLeagueType("remaining_majors")}
                  className={`rounded-lg border px-3 py-2 text-left transition-colors ${leagueType==="remaining_majors" ? "" : "border-line text-dim hover:border-line-2"}`}
                  style={leagueType==="remaining_majors" ? { borderColor: "var(--green)", background: "rgba(43,69,53,0.06)" } : {}}>
                  <div className="text-[13px] font-semibold">Remaining majors</div>
                  <div className="text-[11px] text-dim mt-0.5">Only the ones still ahead.</div>
                </button>
                <button type="button" onClick={() => fourMajorsAvailable && setLeagueType("all_four")}
                  disabled={!fourMajorsAvailable}
                  className={`rounded-lg border px-3 py-2 text-left transition-colors ${leagueType==="all_four" ? "" : "border-line text-dim hover:border-line-2"} ${!fourMajorsAvailable ? "opacity-50 cursor-not-allowed hover:border-line" : ""}`}
                  style={leagueType==="all_four" ? { borderColor: "var(--green)", background: "rgba(43,69,53,0.06)" } : {}}>
                  <div className="text-[13px] font-semibold">All four majors</div>
                  <div className="text-[11px] text-dim mt-0.5">{fourMajorsAvailable ? "Masters, PGA, U.S. Open, The Open." : "Available before the season starts."}</div>
                </button>
                <button type="button" onClick={() => fourMajorsAvailable && setLeagueType("four_plus_one")}
                  disabled={!fourMajorsAvailable}
                  className={`rounded-lg border px-3 py-2 text-left transition-colors ${leagueType==="four_plus_one" ? "" : "border-line text-dim hover:border-line-2"} ${!fourMajorsAvailable ? "opacity-50 cursor-not-allowed hover:border-line" : ""}`}
                  style={leagueType==="four_plus_one" ? { borderColor: "var(--green)", background: "rgba(43,69,53,0.06)" } : {}}>
                  <div className="text-[13px] font-semibold">Four + one</div>
                  <div className="text-[11px] text-dim mt-0.5">{fourMajorsAvailable ? "All four majors plus The Players." : "Available before the season starts."}</div>
                </button>
              </div>
              {leagueType === "single_major" && (
                <div className="mt-2 grid grid-cols-2 gap-2">
                  {MAJORS.map(m => {
                    const isPast = m.status === "complete";
                    const isSelected = singleMajor === m.id && !isPast;
                    return (
                      <button key={m.id} type="button"
                        onClick={() => !isPast && setSingleMajor(m.id)}
                        disabled={isPast}
                        className={`rounded-md border px-3 py-2 text-left transition-colors text-[13px] ${isSelected ? "" : "border-line text-dim hover:border-line-2"} ${isPast ? "opacity-50 cursor-not-allowed hover:border-line" : ""}`}
                        style={isSelected ? { borderColor: "var(--green)", background: "rgba(43,69,53,0.06)" } : {}}>
                        <div className="font-semibold">{m.short}</div>
                        <div className="text-[11px] text-dim mt-0.5">
                          {isPast ? "Already played" : `${m.start}–${m.end}`}
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}
              {leagueType === "remaining_majors" && (
                <div className="text-[11px] text-dim mt-2">
                  Will include: {MAJORS.filter(m => m.status === "upcoming").map(m => m.short).join(", ") || "no upcoming majors"}.
                </div>
              )}
              {leagueType === "four_plus_one" && (
                <div className="text-[11px] text-dim mt-2">
                  Includes The Players Tournament — scoring support is coming soon.
                </div>
              )}
            </div>

            <div>
              <span className="block text-[12px] uppercase tracking-wider text-dim font-semibold mb-1">Who can join?</span>
              <div className="grid grid-cols-2 gap-2">
                <button type="button" onClick={() => setVisibility("public")}
                  className={`rounded-lg border px-3 py-2 text-left transition-colors ${visibility==="public" ? "" : "border-line text-dim hover:border-line-2"}`}
                  style={visibility==="public" ? { borderColor: "var(--green)", background: "rgba(43,69,53,0.06)" } : {}}>
                  <div className="text-[13px] font-semibold">Public</div>
                  <div className="text-[11px] text-dim mt-0.5">Anyone with the code joins instantly.</div>
                </button>
                <button type="button" onClick={() => setVisibility("private")}
                  className={`rounded-lg border px-3 py-2 text-left transition-colors ${visibility==="private" ? "" : "border-line text-dim hover:border-line-2"}`}
                  style={visibility==="private" ? { borderColor: "var(--green)", background: "rgba(43,69,53,0.06)" } : {}}>
                  <div className="text-[13px] font-semibold">Private</div>
                  <div className="text-[11px] text-dim mt-0.5">Only you can add members.</div>
                </button>
              </div>
            </div>
            {error && <div className="text-[12px] text-red">{error}</div>}
            <button type="submit" disabled={busy}
              className="w-full font-semibold rounded-lg py-2.5 transition-colors text-sm disabled:opacity-50 om-pill">
              {busy ? "Creating…" : "Create league"}
            </button>
          </form>
        )}

        {kind === "create" && createdLeague && (
          <div className="space-y-3">
            <div className="rounded-lg border border-green/40 bg-green/8 px-3 py-3 text-[13px] leading-snug" style={{ color: "#2b4535" }}>
              <div className="font-semibold mb-1">{createdLeague.league.name} is live</div>
              <div className="text-[13px]">Share this invite code:</div>
              <div className="font-mono text-xl font-bold tracking-widest mt-1">{createdLeague.league.code}</div>
            </div>
            <button onClick={() => navigator.clipboard?.writeText(createdLeague.league.code)}
              className="w-full text-sm text-dim hover:text-text font-semibold py-2">Copy code</button>
            <button onClick={onClose}
              className="w-full font-semibold rounded-lg py-2.5 text-sm om-pill">
              Done
            </button>
          </div>
        )}

        {kind === "join" && (
          <form onSubmit={handleJoin} className="space-y-3">
            <div>
              <span className="block text-[12px] uppercase tracking-wider text-dim font-semibold mb-1">League code</span>
              <input type="text" value={joinCode}
                onChange={e => setJoinCode(e.target.value.toUpperCase())}
                placeholder="Ask your commissioner"
                className="w-full bg-bg2 border border-line-2 rounded-lg px-3 py-2.5 text-sm font-mono tracking-wider focus:outline-none focus:ring-2 focus:ring-green/40 placeholder-dim text-text" />
              <div className="text-[12px] text-dim mt-1 min-h-[14px]">
                {lookupBusy && "Looking up league…"}
                {!lookupBusy && lookup && <span>League: <span className="font-medium text-muted">{lookup.league.name}</span></span>}
              </div>
            </div>
            {lookup && lookup.league.memberModel === "slots" && (() => {
              const unclaimed = (lookup.members || []).filter(m => !m.claimed);
              const claimed   = (lookup.members || []).filter(m =>  m.claimed);
              return (
                <div>
                  <div className="text-[12px] uppercase tracking-wider text-dim font-semibold mb-1.5">Which team do you want?</div>
                  <div className="space-y-1">
                    {unclaimed.map(m => (
                      <button key={m.teamId} type="button" onClick={() => setTeamId(m.teamId)}
                        className={`w-full flex items-center gap-2 px-3 py-2 rounded-md border text-left text-sm transition-colors ${teamId===m.teamId ? "border-green bg-green/8" : "border-line hover:border-line-2"}`}>
                        <span className="w-3 h-3 rounded-full" style={{ background: m.teamColor }}/>
                        <span className="font-medium">{m.teamName}</span>
                        {teamId===m.teamId && <span className="ml-auto text-[10px] text-green font-bold uppercase">Selected</span>}
                      </button>
                    ))}
                    {claimed.length > 0 && (
                      <div className="text-[11px] text-dim pt-1.5">Already claimed: {claimed.map(m => m.teamName).join(", ")}</div>
                    )}
                    {unclaimed.length === 0 && (
                      <div className="text-[12px] text-dim italic">All teams in this league are claimed.</div>
                    )}
                  </div>
                </div>
              );
            })()}
            {lookup && lookup.league.memberModel !== "slots" && (
              <div className="text-[13px] text-muted leading-snug border border-line rounded-lg p-3 bg-bg2">
                You'll join <span className="font-semibold text-text">{lookup.league.name}</span> as a new member. Your team will be named after your display name and you can rename it anytime from profile settings.
              </div>
            )}
            {error && <div className="text-[12px] text-red">{error}</div>}
            <button type="submit"
              disabled={busy || !lookup || (lookup?.league?.memberModel === "slots" && !teamId)}
              className="w-full font-semibold rounded-lg py-2.5 text-sm disabled:opacity-50 om-pill">
              {busy ? "Joining…" : "Join league"}
            </button>
          </form>
        )}
      </div>
    </div>
  );
}

/* =========================================================================
   USER MENU (top right) — replaces TeamSelector
   ========================================================================= */
function UserMenu({ user, onSignOut, onSwitchUser, onResetPicks, onResetAll, onOpenProfile, onOpenLeague, onBackToHub, multiLeague, onOpenOnboarding, leagueId }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);

  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); document.removeEventListener("keydown", onKey); };
  }, [open]);

  const sortedTeams = useMemo(() => {
    return teamsForLeague(leagueId).map(t => ({ ...t, total: teamSeasonTotal(t.id) })).sort((a,b) => b.total - a.total);
  // eslint-disable-next-line
  }, [leagueId]);
  const rank = sortedTeams.findIndex(t => t.id === user.id) + 1;

  return (
    <div className="relative" ref={ref}>
      {/* Compact trigger — just badge, name, chevron */}
      <button onClick={() => setOpen(o => !o)}
        className={`flex items-center gap-2 pl-1.5 pr-2.5 py-1.5 rounded-lg border bg-white hover:bg-bg2 transition-all ${open ? "border-line-2" : "border-line-2 hover:border-line-2"}`}>
        <TeamBadge team={user} size="sm" />
        <span className="text-sm font-semibold hidden sm:inline">{user.name}</span>
        <svg viewBox="0 0 16 16" className={`w-3 h-3 text-dim shrink-0 transition-transform ${open ? "rotate-180" : ""}`} fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M4 6l4 4 4-4"/>
        </svg>
      </button>

      {open && (
        <div className="absolute right-0 mt-2 w-[260px] z-40 rounded-xl border border-line-2 shadow-2xl overflow-hidden fade-in" style={{ background: "#ffffff" }}>
          {/* Compact identity row */}
          <div className="px-3 py-3 border-b border-line">
            <div className="flex items-center gap-2.5">
              <TeamBadge team={user} size="md" />
              <div className="min-w-0 flex-1 leading-tight">
                <div className="font-semibold text-sm truncate">{user.name}</div>
                <div className="text-[12px] text-dim truncate">{user.email}</div>
              </div>
            </div>
            <div className="mt-2.5 flex items-center justify-between text-[12px]">
              <span className="text-dim">Rank <span className={`font-mono font-semibold ${rank===1 ? "text-gold" : "text-text"}`}>#{rank}</span></span>
              <span className="text-dim">Season <span className="font-mono font-semibold text-green">{fmt(teamSeasonTotal(user.id))}</span></span>
            </div>
          </div>

          {/* Clubhouse — landing page with career stats, league averages,
              profile card, and league switcher. Always shown; the Clubhouse
              earns its keep even for single-league users now. */}
          <button onClick={() => { onBackToHub && onBackToHub(); setOpen(false); }}
            className="w-full px-3 py-2.5 text-left text-sm font-medium text-text hover:bg-black/[0.03] transition-colors flex items-center gap-2 border-b border-line">
            <svg viewBox="0 0 16 16" className="w-3.5 h-3.5 text-dim" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M2 7l6-4 6 4v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7z"/>
              <path d="M6 14V9h4v5"/>
            </svg>
            Clubhouse
          </button>

          {/* League settings (per-league display name / team name / picture). */}
          <button onClick={() => { onOpenProfile && onOpenProfile(); setOpen(false); }}
            className="w-full px-3 py-2.5 text-left text-sm font-medium text-text hover:bg-black/[0.03] transition-colors flex items-center gap-2 border-b border-line">
            <svg viewBox="0 0 16 16" className="w-3.5 h-3.5 text-dim" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="8" cy="6" r="3"/>
              <path d="M2 14c0-3 3-5 6-5s6 2 6 5"/>
            </svg>
            League settings
          </button>

          {/* How OnlyMajors works (re-open the onboarding carousel) */}
          <button onClick={() => { onOpenOnboarding && onOpenOnboarding(); setOpen(false); }}
            className="w-full px-3 py-2.5 text-left text-sm font-medium text-text hover:bg-black/[0.03] transition-colors flex items-center gap-2 border-b border-line">
            <svg viewBox="0 0 16 16" className="w-3.5 h-3.5 text-dim" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="8" cy="8" r="6"/>
              <path d="M8 11.5v.01"/>
              <path d="M6 6a2 2 0 014 0c0 1-2 1.5-2 3"/>
            </svg>
            How it works
          </button>

          {/* League information */}
          <button onClick={() => { onOpenLeague && onOpenLeague(); setOpen(false); }}
            className="w-full px-3 py-2.5 text-left text-sm font-medium text-text hover:bg-black/[0.03] transition-colors flex items-center gap-2 border-b border-line">
            <svg viewBox="0 0 16 16" className="w-3.5 h-3.5 text-dim" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 13V3l5 2 5-2v10"/>
              <path d="M3 13l5-2 5 2"/>
            </svg>
            League information
          </button>

          {/* League standings (read-only — you can only edit your own team) */}
          <div className="py-1">
            <div className="px-3 pt-2 pb-1 text-[10px] uppercase tracking-[0.14em] text-dim font-semibold">
              League standings
            </div>
            {sortedTeams.map(t => {
              const sel = t.id === user.id;
              return (
                <div key={t.id}
                  className={`w-full flex items-center gap-2.5 px-3 py-2 ${sel ? "bg-green/8" : ""}`}>
                  <TeamBadge team={t} size="sm" />
                  <span className="flex-1 text-left text-sm font-medium truncate">{t.name}</span>
                  {sel
                    ? <span className="text-[11px] font-bold uppercase text-green tracking-wider">You</span>
                    : <span className="font-mono text-[12px] text-dim">{fmt(t.total)}</span>}
                </div>
              );
            })}
          </div>

          {/* Sign out */}
          <div className="border-t border-line">
            <button onClick={onSignOut}
              className="w-full px-3 py-2.5 text-left text-sm font-medium text-muted hover:text-text hover:bg-black/[0.03] transition-colors flex items-center gap-2">
              <svg viewBox="0 0 16 16" className="w-3.5 h-3.5 text-dim" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <path d="M10 11l3-3-3-3M13 8H6M9 13H4a1 1 0 01-1-1V4a1 1 0 011-1h5"/>
              </svg>
              Sign out
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function TeamSelector({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);
  const current = TEAMS.find(t => t.id === value);

  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => {
      document.removeEventListener("mousedown", onDoc);
      document.removeEventListener("keydown", onKey);
    };
  }, [open]);

  const sortedByTotal = useMemo(() => {
    return TEAMS.map(t => ({ ...t, total: teamSeasonTotal(t.id) })).sort((a, b) => b.total - a.total);
  }, []);

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2.5 pl-2 pr-3 py-2 rounded-xl border border-line-2 bg-white hover:bg-white hover:border-line-2 transition-all min-w-[180px]">
        <TeamBadge team={current} size="sm" />
        <div className="text-left flex-1 min-w-0 leading-tight">
          <div className="text-[11px] uppercase tracking-wider text-dim">Viewing as</div>
          <div className="text-sm font-semibold truncate">{current.name}</div>
        </div>
        <svg viewBox="0 0 16 16" className={`w-5 h-5 text-muted shrink-0 transition-transform ${open ? "rotate-180" : ""}`} fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 6l5 5 5-5"/>
        </svg>
      </button>

      {open && (
        <div className="absolute right-0 mt-2 w-[300px] z-40 rounded-xl border border-line-2 shadow-2xl overflow-hidden fade-in" style={{ background: "#ffffff" }}>
          <div className="px-3 py-2 text-[11px] uppercase tracking-wider text-dim border-b border-line bg-black/[0.04]">
            Select team — by season earnings
          </div>
          <div className="py-1 max-h-[60vh] overflow-y-auto">
            {sortedByTotal.map((t, idx) => {
              const sel = t.id === value;
              return (
                <button key={t.id}
                  onClick={() => { onChange(t.id); setOpen(false); }}
                  className={`w-full flex items-center gap-3 px-3 py-2.5 text-left hover:bg-white transition-colors ${sel ? "bg-green/8" : ""}`}>
                  <div className="text-[11px] font-mono font-semibold text-dim w-4 text-right">{idx+1}</div>
                  <TeamBadge team={t} size="md" />
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm truncate flex items-center gap-2">
                      {t.name}
                      {sel && <span className="text-[10px] px-1.5 py-0.5 rounded bg-green/20 text-green font-semibold">CURRENT</span>}
                    </div>
                    <div className="text-[12px] text-dim">{t.owner}</div>
                  </div>
                  <div className="text-right shrink-0">
                    <div className="display-num font-bold text-sm text-green">{fmt(t.total)}</div>
                    <div className="text-[10px] uppercase tracking-wider text-dim">season</div>
                  </div>
                </button>
              );
            })}
          </div>
          <div className="px-3 py-2 text-[11px] text-dim border-t border-line bg-black/20">
            Switching team changes whose picks you're managing.
          </div>
        </div>
      )}
    </div>
  );
}

function TabBar({ tab, setTab, leftSlot }) {
  const tabs = [
    { id: "picks",       label: "My Picks" },
    { id: "live",        label: "Live" },
    { id: "chat",        label: "Chat" },
    { id: "leaderboard", label: "Season Standings" },
  ];
  return (
    <nav className="border-b border-line bg-bg2/40 backdrop-blur-xl sticky top-[57px] sm:top-[65px] z-20">
      <div className="max-w-6xl mx-auto px-2 sm:px-6 flex items-center gap-3">
        {/* Far-left slot — currently used for the back-to-Clubhouse pill.
            Hidden on mobile (<sm) because it crowds the tab labels; mobile
            users navigate back to the Clubhouse from the user-menu dropdown. */}
        {leftSlot && <div className="shrink-0 py-2 hidden sm:flex items-center">{leftSlot}</div>}
        <div className="flex-1 flex overflow-x-auto scrollbar-hide justify-center">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`relative px-4 sm:px-5 py-3 text-sm font-semibold whitespace-nowrap transition-colors ${tab===t.id ? "text-text" : "text-dim hover:text-muted"}`}>
              {t.label}
              {tab===t.id && <span className="absolute left-3 right-3 -bottom-px h-0.5 bg-green rounded-full glow-green"/>}
            </button>
          ))}
        </div>
      </div>
    </nav>
  );
}

function OnboardingModal({ dismissible, onClose, authedUser, summary }) {
  const [idx, setIdx] = useState(0);
  const isLast = idx === ONBOARDING_SLIDES.length - 1;
  const slide  = ONBOARDING_SLIDES[idx];
  const touchStartX = React.useRef(null);

  // Personalize slide 0 as "Welcome to the Club" with the new member's name +
  // membership number. Falls back to the generic welcome copy only if user
  // data isn't available (shouldn't happen in normal signup flow).
  const firstName = summary?.me?.firstName ?? authedUser?.firstName ?? null;
  const lastName  = summary?.me?.lastName  ?? authedUser?.lastName  ?? null;
  const memberNumber =
    summary?.me?.memberNumber ?? authedUser?.memberNumber ?? null;
  const fullName = (firstName && lastName)
    ? `${firstName} ${lastName}`
    : (firstName || authedUser?.displayName || authedUser?.email?.split("@")[0] || null);
  const isWelcomeSlide = idx === 0 && !!fullName;

  const onTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const onTouchEnd   = (e) => {
    if (touchStartX.current == null) return;
    const delta = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(delta) > 40) {
      if (delta < 0 && idx < ONBOARDING_SLIDES.length - 1) setIdx(i => i + 1);
      if (delta > 0 && idx > 0)                            setIdx(i => i - 1);
    }
    touchStartX.current = null;
  };

  // Keyboard arrows
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight" && idx < ONBOARDING_SLIDES.length - 1) setIdx(i => i + 1);
      if (e.key === "ArrowLeft"  && idx > 0)                            setIdx(i => i - 1);
      if (e.key === "Escape" && dismissible) onClose();
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [idx, dismissible, onClose]);

  return (
    <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center px-4 py-6 fade-in">
      <div className="relative bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden flex flex-col"
        onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        {dismissible && (

                {fullName}

                <div className="mt-0.5 mb-3 flex items-baseline gap-2">

                    #{memberNumber}

              <p className="text-muted leading-relaxed text-sm mt-2">

          {/* Dots */}
          <div className="flex items-center justify-center gap-2 mt-6 mb-4">
            {ONBOARDING_SLIDES.map((_, i) => (
              <button key={i} onClick={() => setIdx(i)}
                className="rounded-full transition-all"
                style={{
                  width:  i === idx ? "24px" : "8px",
                  height: "8px",
                  background: i === idx ? "var(--text)" : "var(--line-2)",

          {/* Nav */}
          <div className="flex items-center gap-2">
            {idx > 0 ? (
              <button onClick={() => setIdx(i => i - 1)}
                className="px-4 py-2.5 text-sm font-semibold text-dim hover:text-text transition-colors">
                Back

            ) : <div className="w-12"/>}
            <div className="flex-1" />
            {!isLast ? (

                className="px-5 py-2.5 text-sm font-semibold rounded-lg transition-colors om-pill">

              <button onClick={onClose}

  );
}

/* =========================================================================
   SYNC UI — Last-updated indicator + Refresh button
   ========================================================================= */
function SyncBar({ status, message, lastUpdated, onRefresh }) {
  const ago = useRelativeTime(lastUpdated);
  const live = MAJORS.find(m => m.status === "live");
  const officialSource = live ? LIVE_SOURCES[live.id]?.name : null;
  const dotColor =
    status === "syncing" ? "bg-blue-400 live-dot" :
    status === "ok"      ? "bg-green" :
    status === "error"   ? "bg-gold" :
                            "bg-black/20";
  return (
    <div className="flex items-center gap-2 text-xs">
      <span className={`w-1.5 h-1.5 rounded-full ${dotColor}`}/>
      <span className="text-dim">
        {status === "syncing" && "Syncing live data…"}
        {status === "ok"      && officialSource && <>Source · <span className="font-semibold text-muted">{officialSource}</span> · updated {ago}</>}
        {status === "error"   && (
          <span className="text-gold">
            Backend not connected · waiting on <span className="font-semibold">{officialSource || "live source"}</span>
          </span>
        )}
        {status === "idle"    && "Not yet synced"}
      </span>
      <button onClick={onRefresh} disabled={status === "syncing"}
        className="ml-1 text-[12px] font-semibold text-green hover:text-green-2 disabled:opacity-40 disabled:cursor-wait">
        ↻ Refresh
      </button>
    </div>
  );
}

function SyncToast({ status, message }) {
  const [show, setShow] = useState(false);
  useEffect(() => {
    if (status === "ok" || status === "error") {
      setShow(true);
      const t = setTimeout(() => setShow(false), 3200);
      return () => clearTimeout(t);
    }
  }, [status, message]);
  if (!show || !message) return null;
  const tone = status === "ok" ? "bg-green/15 border-green/40 text-green" : "bg-red-500/15 border-red-500/40 text-red";
  return (
    <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-40 fade-in rounded-lg border px-3 py-2 text-xs ${tone} backdrop-blur-lg`}>
      {message}
    </div>
  );
}

function useRelativeTime(date) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 15_000);
    return () => clearInterval(id);
  }, []);
  if (!date) return "—";
  const sec = Math.max(1, Math.floor((Date.now() - date.getTime()) / 1000));
  if (sec < 60) return `${sec}s ago`;
  if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
  return `${Math.floor(sec/3600)}h ago`;
}

/* =========================================================================
   PICKS TAB
   ========================================================================= */
function MajorSelectorDropdown({ viewAs, selectedMajor, setSelectedMajor, includedMajors }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); document.removeEventListener("keydown", onKey); };
  }, [open]);

  // Per-league filtering: only show majors this league includes. Falls back
  // to all four when no filter is provided (legacy / mainline behavior).
  const includedSet = Array.isArray(includedMajors) && includedMajors.length
    ? new Set(includedMajors) : null;
  const allowedMajors = includedSet ? MAJORS.filter(m => includedSet.has(m.id)) : MAJORS;
  const major = M[selectedMajor];
  const others = allowedMajors.filter(m => m.id !== selectedMajor);
  const tot = teamMajorTotal(viewAs, selectedMajor);

  const Row = ({ m, sel, onClick }) => {
    const t = teamMajorTotal(viewAs, m.id);
    return (
      <button onClick={onClick}
        className={`w-full text-left flex items-center gap-3 px-4 py-3 transition-colors ${sel ? "bg-green/8" : "hover:bg-black/[0.03]"}`}>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2">
            <span className="font-semibold text-sm">{m.name}</span>
            <StatusBadge status={m.status} />
          </div>
          <div className="text-[12px] text-dim mt-0.5">{m.start}–{m.end} · {m.course}</div>
        </div>
        {t > 0 && <div className="text-xs font-mono text-green tabular-nums">{fmt(t)}</div>}
      </button>
    );
  };

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className={`w-full text-left rounded-xl px-4 py-3 transition-all border bg-white flex items-center gap-3 ${open ? "border-green/40 glow-green" : "border-line-2 hover:border-line-2"}`}>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-bold text-base sm:text-lg truncate">{major.name}</span>
            <StatusBadge status={major.status} />
          </div>
          <div className="text-xs text-dim mt-0.5">{major.start}–{major.end} · {major.course}</div>
        </div>
        {tot > 0 && (
          <div className="text-right shrink-0 leading-tight">
            <div className="text-[11px] uppercase tracking-wider text-dim">Total</div>
            <div className="display-num font-bold text-sm text-green">{fmt(tot)}</div>
          </div>
        )}
        <svg viewBox="0 0 24 24" className={`w-4 h-4 text-dim shrink-0 transition-transform ${open ? "rotate-180" : ""}`} fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      {open && (
        <div className="absolute z-40 left-0 right-0 mt-1.5 bg-white border border-line-2 rounded-xl shadow-lg overflow-hidden fade-in">
          {others.map(m => (
            <Row key={m.id} m={m} sel={false}
              onClick={() => { setSelectedMajor(m.id); setOpen(false); }} />
          ))}
        </div>
      )}
    </div>
  );
}

function PicksTab({ viewAs, selectedMajor, setSelectedMajor, picks, setPicks, openPicker, openSub, openSubOut, onRemove, syncStatus, lastUpdated, onRefresh, leagueType = "all_four", includedMajors }) {
  // All league formats now use the same 4-starter + 2-bench roster. Single-
  // major leagues stay on this shape (with the score prediction acting as
  // the tiebreaker) so career stats stay comparable across formats.
  const starterCount = 4;
  const benchCount   = 2;
  const sixStarter   = false;
  // If the currently selected major isn't in this league's includedMajors,
  // snap to the first one that is. Runs at mount + whenever the league
  // boundary changes.
  useEffect(() => {
    if (!Array.isArray(includedMajors) || includedMajors.length === 0) return;
    if (!includedMajors.includes(selectedMajor)) {
      setSelectedMajor(includedMajors[0]);
    }
  }, [includedMajors?.join(","), selectedMajor]);
  const team = TEAMS.find(t => t.id === viewAs);
  const major = M[selectedMajor];
  const slot = picks[viewAs][selectedMajor];
  // Tee-time data — only fetched + shown while major is live and the next
  // round hasn't begun yet. Picks-tab refresh re-pulls on every render of
  // the major change, with server-side 5 min cache absorbing the load.
  const nextRound = useMemo(() => {
    if (major?.status !== "live" || !major?.rounds) return null;
    const now = Date.now();
    // The "next round" is the earliest round whose start time is in the
    // future. If R1 hasn't teed off yet → 1; if R3 is in progress → null.
    for (const r of [1, 2, 3, 4]) {
      const start = new Date(major.rounds[`r${r}`]).getTime();
      if (start > now) return r;
    }
    return null;
  }, [major?.id, major?.status]);
  const [teeTimes, setTeeTimes] = useState({});
  useEffect(() => {
    if (!nextRound) { setTeeTimes({}); return; }
    let cancelled = false;
    apiTeeTimes(selectedMajor, nextRound)
      .then(r => { if (!cancelled) setTeeTimes(r?.times || {}); })
      .catch(() => { if (!cancelled) setTeeTimes({}); });
    return () => { cancelled = true; };
  }, [selectedMajor, nextRound]);
  const teeTimeFor = (gid) => teeTimes[gid] || null;
  const nextRoundLabel = nextRound ? `R${nextRound}` : null;

  return (
    <div className="space-y-6" style={{ "--green": "#0f7a3e", "--green-2": "#0c6535" }}>
      {/* Sync bar (only meaningful when a live major is selected) */}
      {major.status === "live" && (
        <div className="flex justify-end -mt-2">
          <SyncBar status={syncStatus} lastUpdated={lastUpdated} onRefresh={onRefresh} />
        </div>
      )}

      <MajorSelectorDropdown viewAs={viewAs} selectedMajor={selectedMajor} setSelectedMajor={setSelectedMajor} includedMajors={includedMajors} />

      {/* Hero card for the selected major */}
      <div className={`relative rounded-2xl overflow-hidden border border-line-2 ${major.scene}`}>
        <div className="absolute inset-0 dot-grid opacity-50"/>
        <div className="relative p-5 sm:p-6">
          <div className="flex items-start justify-between gap-3 flex-wrap">
            <div>
              <div className="flex items-center gap-2 text-[11px] uppercase tracking-[0.16em] text-dim">
                <StatusBadge status={major.status} />
                {major.status === "live" && <span>R{major.currentRound} · {major.roundStatus}</span>}
                {major.status === "upcoming" && <span>Tees off {major.start}</span>}
              </div>
              <h1 className="font-bold text-3xl sm:text-4xl mt-2 tracking-tight">{major.name}</h1>
              <div className="text-sm text-muted mt-1">{major.course} · {major.city}</div>
            </div>
            <div className="text-right">
              <div className="text-[11px] uppercase tracking-wider text-dim">Purse</div>
              <div className="display-num font-bold text-2xl">{fmt(major.purse)}</div>
            </div>
          </div>

          {/* Your standing for this major */}
          <div className="mt-5 grid grid-cols-3 gap-3">
            <HeroStat label="Your team total" value={fmt(teamMajorTotal(viewAs, selectedMajor))} sub={major.status === "live" ? "projected" : major.status === "complete" ? "final" : "—"} accent />
            <HeroStat label="Left on base" value={fmt(teamMajorLOB(viewAs, selectedMajor))} sub="bench earnings" />
            <HeroStat label="Field size" value={major.fieldSize} sub="players" />
          </div>
        </div>
      </div>

      {major.status === "upcoming" && !arePicksOpen(major) ? (
        <PicksClosedGate major={major} />
      ) : (
        <>
          {/* Subs locked banner — only shown when major is live AND a round
              is currently in progress. Single-major leagues have no subs,
              so the banner stays hidden for them. */}
          {!sixStarter && major.status === "live" && activeRoundInProgress(major) && (
            <SubsLockedBanner major={major} />
          )}

          {/* Starters — 6 for single-major leagues, 4 for everything else. */}
          <section>
            <SectionHeader
              title="Starters"
              sub={sixStarter
                ? `${starterCount} golfers · all earnings count`
                : `${starterCount} golfers · earnings count toward team total`}
              tag={major.status === "complete" ? "FINAL" : major.status === "live" ? "LIVE" : "ROSTER"} />
            {!sixStarter && (
              <div className="mb-3 rounded-md border border-line bg-tile/40 px-3 py-2 text-[11px] leading-snug text-dim">
                Naming a golfer as a starter counts as playing them — even if you sub them out later. Subbing them out stops their earnings, but their season slot is spent.
              </div>
            )}
            {sixStarter && (
              <div className="mb-3 rounded-md border border-line bg-tile/40 px-3 py-2 text-[11px] leading-snug text-dim">
                Single-major format: lock in six golfers, no bench, no subs. Every starter's earnings count toward your team total.
              </div>
            )}
            <div className="space-y-2">
              {Array.from({ length: starterCount }, (_, i) => (
                <PickRow key={i} role="starter" slotIndex={i+1} golferId={slot.starters[i]} majorId={selectedMajor} major={major}
                  isIn={isGolferIn(slot, slot.starters[i])}
                  canSubOut={!sixStarter && canSubInMajor(major) && slot.starters[i] != null && slot.bench.some(x => x != null) && isGolferIn(slot, slot.starters[i])}
                  onClick={() => major.status !== "complete" && openPicker({ slotType: "starter", slotIndex: i })}
                  onSubOut={() => openSubOut({ starterIndex: i })}
                  onRemove={() => onRemove(selectedMajor, "starter", i)}
                  nextTeeTime={teeTimeFor(slot.starters[i])}
                  nextRoundLabel={nextRoundLabel} />
              ))}
            </div>
          </section>

          {/* Bench — hidden entirely in single-major (6-starter) leagues. */}
          {benchCount > 0 && (
            <section>
              <SectionHeader title="Bench" sub={`${benchCount} golfers · earnings only count if subbed in`} tag="RESERVE" />
              <div className="space-y-2">
                {Array.from({ length: benchCount }, (_, i) => (
                  <PickRow key={i} role="bench" slotIndex={i+1} golferId={slot.bench[i]} majorId={selectedMajor} major={major}
                    isIn={isGolferIn(slot, slot.bench[i])}
                    canSub={canSubInMajor(major) && slot.bench[i] != null && !isGolferIn(slot, slot.bench[i])}
                    onClick={() => major.status !== "complete" && openPicker({ slotType: "bench", slotIndex: i })}
                    onSub={() => openSub({ benchIndex: i })}
                    onRemove={() => onRemove(selectedMajor, "bench", i)}
                    nextTeeTime={teeTimeFor(slot.bench[i])}
                    nextRoundLabel={nextRoundLabel} />
                ))}
              </div>
            </section>
          )}
        </>
      )}

      {/* Winning score prediction — locks when first tee time hits */}
      {major.status !== "upcoming" || arePicksOpen(major) ? (
        <ScorePredictor
          locked={major.status !== "upcoming"}
          value={slot?.scorePrediction ?? null}
          onChange={(v) => {
            const next = JSON.parse(JSON.stringify(picks));
            next[viewAs][selectedMajor].scorePrediction = v;
            setPicks(next);
          }}
        />
      ) : null}

      {/* Played this season */}
      <div className="glass rounded-2xl p-5">
        <div className="mb-3">
          <h3 className="font-semibold">Locked for the season — {team.name}</h3>
        </div>
        <PlayedList teamId={viewAs} picks={picks} />
      </div>

      {/* Course details: description + past winners + weather */}
      <CourseCard major={major} />
    </div>
  );
}

/* =========================================================================
   COURSE CARD — description, past winners, weather (when tournament week)

function WeatherIcon({ code }) {
  // WMO weather codes mapped to simple SVG glyphs
  const isSunny  = code === 0;
  const isClouds = code === 1 || code === 2;
  const isOvercast = code === 3 || (code >= 45 && code <= 48);
  const isRain   = (code >= 51 && code <= 67) || (code >= 80 && code <= 82);
  const isStorm  = code >= 95;
  return (
    <svg viewBox="0 0 24 24" className="w-6 h-6 text-gold" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      {isSunny && (<>
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4L7 17M17 7l1.4-1.4"/>
      </>)}
      {isClouds && (<>
        <circle cx="8" cy="9" r="2.5"/>
        <path d="M16 17H8a4 4 0 010-8h.5a5 5 0 019.5 1 3.5 3.5 0 01-2 7z"/>
      </>)}
      {isOvercast && (<>
        <path d="M16 17H8a4 4 0 010-8h.5a5 5 0 019.5 1 3.5 3.5 0 01-2 7z"/>
      </>)}
      {isRain && (<>
        <path d="M16 14H8a4 4 0 010-8h.5a5 5 0 019.5 1 3.5 3.5 0 01-2 7z"/>
        <path d="M9 18v2M13 18v2M17 18v2" stroke="currentColor"/>
      </>)}
      {isStorm && (<>
        <path d="M16 13H8a4 4 0 010-8h.5a5 5 0 019.5 1 3.5 3.5 0 01-2 7z"/>
        <path d="M11 14l-2 4h3l-2 4"/>
      </>)}
    </svg>
  );
}

function CourseCard({ major }) {
  const info = COURSE_INFO[major.id];
  if (!info) return null;
  const dOut = daysUntilLock(major);
  const inForecastWindow = dOut <= 7 && dOut >= -4; // tournament-week-ish

  // Live forecast state — fetched from Open-Meteo when we're in the window.
  const [forecast,      setForecast]      = useState(null);
  const [forecastErr,   setForecastErr]   = useState(null);
  const [forecastLoad,  setForecastLoad]  = useState(false);

  useEffect(() => {
    if (!inForecastWindow) { setForecast(null); return; }
    let cancelled = false;
    setForecastLoad(true);
    setForecastErr(null);
    fetchOpenMeteoForecast(major.id, info.coords.lat, info.coords.lng, major.rounds)
      .then(data => { if (!cancelled) setForecast(data); })
      .catch(err => { if (!cancelled) setForecastErr(err.message); })
      .finally(()  => { if (!cancelled) setForecastLoad(false); });
    return () => { cancelled = true; };
  }, [major.id, inForecastWindow, info.coords.lat, info.coords.lng]);

  return (
    <div className="glass rounded-2xl p-5 space-y-5">
      <div>
        <div className="text-[11px] uppercase tracking-[0.16em] text-dim">Course Notes</div>
        <h3 className="font-bold text-lg mt-1">{major.course}</h3>
        <p className="text-sm text-muted leading-relaxed mt-1">{info.description}</p>
      </div>

      {/* Past winners */}
      <div>
        <div className="flex items-baseline justify-between mb-2">
          <h4 className="font-semibold text-sm">Past winners at {major.course.split(" GC")[0].split(" Golf")[0]}</h4>
          <span className="text-[11px] uppercase tracking-wider text-dim">{info.eventName} unless noted</span>
        </div>
        <div className="overflow-hidden rounded-lg border border-line">
          <table className="w-full text-sm">
            <tbody>
              {info.pastWinners.map((w, i) => (
                <tr key={w.year} className={i % 2 === 0 ? "bg-white" : ""}>
                  <td className="px-3 py-2 font-mono text-dim w-16">{w.year}</td>
                  <td className="px-3 py-2 font-medium">{w.name}</td>
                  <td className="px-3 py-2 text-right font-mono text-muted">{w.score}</td>
                  {w.event && <td className="px-3 py-2 text-[11px] uppercase tracking-wider text-dim text-right">{w.event}</td>}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Weather */}
      <div>
        <div className="flex items-baseline justify-between mb-2 gap-2 flex-wrap">
          <h4 className="font-semibold text-sm">Tournament-week forecast</h4>
          {inForecastWindow
            ? <span className="text-[11px] uppercase tracking-wider text-dim">via Open-Meteo · {major.city}</span>
            : <span className="text-[11px] uppercase tracking-wider text-dim">{dOut > 0 ? `Tees off in ${dOut} days` : "Tournament complete"}</span>}
        </div>
        {inForecastWindow && forecast ? (
          <div className="grid grid-cols-1 sm:grid-cols-4 lg:grid-cols-7 gap-2">
            {forecast.map((d, i) => (
              <div key={i}
                className={`border rounded-lg p-2.5 flex items-center sm:flex-col sm:text-center gap-3 sm:gap-0 ${d.isCompetition ? "bg-white border-line-2" : "bg-black/[0.04] border-line"}`}>
                {/* Label + day (left side on mobile, top on desktop) */}

// SCORE_OPTIONS: -20 (best) up to +10 (worst), with 0 displayed as "E".
const SCORE_OPTIONS = (() => {
  const out = [];
  for (let s = -20; s <= 10; s++) out.push(s);
  return out;
})();
function fmtScoreToPar(s) {
  if (s === 0)  return "E";
  if (s > 0)    return `+${s}`;
  return `${s}`;
}

function ScorePredictor({ value, onChange, locked }) {
  // Local draft state — reel scroll only updates draftValue. Committing to the
  // server happens only when the user clicks "Lock in prediction".
  const [draftValue, setDraftValue] = useState(value ?? null);
  const [justLocked, setJustLocked] = useState(false);
  const scrollRef = useRef(null);
  const ITEM_H = 44;

  // Initialize scroll position to current value (or 0 by default)
  useEffect(() => {
    if (!scrollRef.current) return;
    const startVal = value ?? 0;
    const idx = SCORE_OPTIONS.indexOf(startVal);
    if (idx === -1) return;
    scrollRef.current.scrollTop = idx * ITEM_H;
    setDraftValue(value ?? 0);
  }, []); // eslint-disable-line

  // Resync when server value changes
  useEffect(() => {
    if (value != null) setDraftValue(value);
  }, [value]);

  // Debounced "snap to nearest" — updates draft only, no save
  const debounceRef = useRef(null);
  const handleScroll = () => {
    if (locked) return;
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      const el = scrollRef.current;
      if (!el) return;
      const idx = Math.round(el.scrollTop / ITEM_H);
      const clamped = Math.max(0, Math.min(SCORE_OPTIONS.length - 1, idx));
      const newVal = SCORE_OPTIONS[clamped];
      el.scrollTo({ top: clamped * ITEM_H, behavior: "smooth" });
      setDraftValue(newVal);
    }, 100);
  };

  const draftIsDirty = draftValue !== null && draftValue !== value;
  const lockIn = () => {
    if (locked || draftValue === null) return;
    onChange(draftValue);
    setJustLocked(true);
    setTimeout(() => setJustLocked(false), 1800);
  };

  return (
    <div className="glass rounded-2xl p-5">
      <div className="flex items-baseline justify-between mb-3 flex-wrap gap-2">
        <div>
          <h3 className="font-semibold">Winning score prediction</h3>
          <div className="text-xs text-dim mt-0.5">
            {locked
              ? <>Final pick · locked at first tee</>
              : draftIsDirty
                ? "Lock in your pick when you're ready"
                : value != null
                  ? "Saved — you can change it anytime before first tee"
                  : "Scroll to pick your number"}
          </div>
        </div>
        {value != null && (
          <div className="text-right leading-tight">
            <div className="text-[11px] uppercase tracking-wider text-dim">Locked in</div>
            <div className="display-num font-bold text-xl text-green">{fmtScoreToPar(value)}</div>
          </div>
        )}
      </div>

      {/* The reel */}
      <div className="relative mx-auto" style={{ width: "180px" }}>
        {/* Selected-row highlight — solid green top + bottom border around the center value (E by default) */}
        <div className="absolute inset-x-0 pointer-events-none" style={{ top: ITEM_H, height: ITEM_H }}>
          <div className="w-full h-full" style={{ borderTop: "2px solid #2b4535", borderBottom: "2px solid #2b4535" }} />
        </div>
        <div className="absolute inset-x-0 top-0 pointer-events-none" style={{ height: ITEM_H, background: "linear-gradient(to bottom, var(--bg2) 0%, transparent 100%)" }} />
        <div className="absolute inset-x-0 bottom-0 pointer-events-none" style={{ height: ITEM_H, background: "linear-gradient(to top, var(--bg2) 0%, transparent 100%)" }} />

        <div ref={scrollRef} onScroll={handleScroll}
          className={`overflow-y-auto scrollbar-hide ${locked ? "pointer-events-none" : ""}`}
          style={{
            height: `${ITEM_H * 3}px`,
            scrollSnapType: "y mandatory",
            paddingTop: `${ITEM_H}px`,
            paddingBottom: `${ITEM_H}px`,
          }}>
          {SCORE_OPTIONS.map((s, i) => (
            <div key={s} style={{ height: `${ITEM_H}px`, scrollSnapAlign: "center" }}
              className={`flex items-center justify-center display-num font-bold text-2xl ${draftValue === s ? "text-green" : "text-muted"}`}>
              {fmtScoreToPar(s)}
            </div>
          ))}
        </div>
      </div>

      {/* Lock-in button — outlined green; pulses ONLY when actively confirming.
          Settles into a soft green "Locked in" rest state (no gray jump). */}
      {!locked && (
        <div className="mt-4 flex justify-center">
          <button
            onClick={lockIn}
            disabled={!draftIsDirty && !justLocked}
            style={
              justLocked
                ? { color: "#2b4535", background: "rgba(43, 69, 53, 0.10)", border: "2px solid #2b4535", transition: "color 600ms ease-out, background 600ms ease-out, border-color 600ms ease-out" }
                : draftIsDirty
                  ? { color: "#2b4535", background: "transparent", border: "2px solid #2b4535", transition: "color 600ms ease-out, background 600ms ease-out, border-color 600ms ease-out" }
                  : value != null
                    ? { color: "rgba(43, 69, 53, 0.65)", background: "transparent", border: "2px solid rgba(43, 69, 53, 0.35)", transition: "color 600ms ease-out, background 600ms ease-out, border-color 600ms ease-out" }
                    : { color: "rgba(0,0,0,0.35)", background: "transparent", border: "2px solid rgba(0,0,0,0.15)", transition: "color 600ms ease-out, background 600ms ease-out, border-color 600ms ease-out" }
            }
            className={`relative px-5 py-2.5 rounded-lg text-sm font-semibold whitespace-nowrap
              ${justLocked ? "score-pulse" : ""}
              ${!draftIsDirty && !justLocked ? "cursor-not-allowed" : "hover:bg-green/10"}`}>
            {justLocked
              ? <>✓ Locked in at <span className="font-mono">{fmtScoreToPar(value)}</span></>
              : draftIsDirty
                ? <>Lock in <span className="font-mono">{fmtScoreToPar(draftValue)}</span></>
                : value != null
                  ? <>Locked in at <span className="font-mono">{fmtScoreToPar(value)}</span></>
                  : "Pick a number first"}
          </button>
        </div>
      )}
    </div>
  );
}

function PlayedList({ teamId, picks }) {
  const played = playedGolfers(teamId, picks);
  // Identify which played golfers came in as subs (not in the original PICKS starter slot for that major)
  const subbedIn = new Set();
  for (const m of MAJORS) {
    if (m.status === "upcoming") continue;
    const live = picks[teamId]?.[m.id]?.starters || [];
    const original = PICKS[teamId]?.[m.id]?.starters || [];
    live.forEach(gid => { if (gid && !original.includes(gid)) subbedIn.add(gid); });
  }
  if (played.size === 0) return <div className="text-dim text-sm">No golfers locked yet — season just starting.</div>;
  return (
    <div className="flex flex-wrap gap-1.5">
      {[...played].map(gid => {
        const isSub = subbedIn.has(gid);
        return (
          <span key={gid}
            className={`text-xs px-2 py-1 rounded-md inline-flex items-center gap-1.5 border ${isSub ? "bg-green/10 border-green/30 text-green" : "bg-white border-line text-muted"}`}>
            <CountryCode code={G[gid].country} />
            <span className={isSub ? "font-semibold text-text" : ""}>{G[gid].name}</span>
            {isSub && <span className="text-[10px] uppercase tracking-wider text-green font-bold">subbed in</span>}
          </span>
        );
      })}
    </div>
  );
}

      {/* Mobile: round-by-round strokes, tight inline row */}

function ChatPanel({ user, messages, onSend }) {
  const scrollRef = React.useRef(null);
  const sorted = useMemo(() => [...messages].sort((a, b) => a.ts - b.ts), [messages]);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [sorted.length]);

  return (
    <div className="glass rounded-2xl flex flex-col flex-1 overflow-hidden">
      <header className="px-4 py-3 border-b border-line flex items-center justify-between">
        <div>
          <h3 className="font-bold text-base">League Chat</h3>
          <div className="text-[12px] text-dim">{TEAMS.length} members · {sorted.length} messages</div>
        </div>
        <div className="text-[11px] uppercase tracking-wider text-dim">Live</div>
      </header>
      <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 py-4 space-y-3">
        {sorted.map((m, i) => {
          const prev = i > 0 ? sorted[i-1] : null;
          const groupWithPrev = prev && prev.teamId === m.teamId && (m.ts - prev.ts) < 5*60*1000;
          return <Message key={m.id} message={m} isMe={m.teamId === user.id} groupWithPrev={groupWithPrev} />;
        })}
      </div>
      <Composer onSend={onSend} user={user} />
    </div>
  );
}

function Message({ message, isMe, groupWithPrev }) {
  const team = TEAMS.find(t => t.id === message.teamId);
  // Coerce ts to a number — Postgres BIGINT is returned as a string by node-postgres,
  // and `new Date("1717xxxxx")` returns Invalid Date which makes the relative time NaN.
  const tsNum = typeof message.ts === "string" ? Number(message.ts) : message.ts;
  const time = useRelativeTime(Number.isFinite(tsNum) ? new Date(tsNum) : null);
  if (!team) return null;
  return (
    <div className={`flex gap-2 ${isMe ? "flex-row-reverse" : "flex-row"} ${groupWithPrev ? "mt-1" : "mt-3"}`}>
      <div className="w-7 shrink-0">{!groupWithPrev && <TeamBadge team={team} size="sm" />}</div>
      <div className={`min-w-0 max-w-[78%] ${isMe ? "items-end" : "items-start"} flex flex-col`}>
        {!groupWithPrev && (
          <div className={`text-[12px] text-dim mb-0.5 ${isMe ? "text-right" : ""}`}>
            <span className="font-semibold text-muted">{team.name}</span>
            <span className="ml-1.5">· {time}</span>
          </div>
        )}
        <div className={`rounded-2xl px-3 py-2 text-sm leading-snug text-text
          ${isMe
            ? "rounded-br-md border"
            : "bg-white border border-line rounded-bl-md"}`}
          style={isMe
            ? { background: team.color + "22", borderColor: team.color + "55", borderRight: `3px solid ${team.color}` }
            : { borderLeft: `3px solid ${team.color}` }}>
          {message.text}
        </div>
      </div>
    </div>
  );
}

function TourLeaderboardPanel({ picks, user, leagueId }) {
  // 'all' | 'league' | 'mine'
  const [filter, setFilter] = useState("all");
  // Prefer an upcoming-with-picks-open major if there's no live one — so the
  // chat-side leaderboard reflects what people are actually picking right now.
  const live = MAJORS.find(m => m.status === "live")
    || MAJORS.find(m => m.status === "upcoming" && arePicksOpen(m))
    || MAJORS.find(m => m.status === "upcoming" && daysUntilLock(m) <= 7)
    || MAJORS[1];

  // Ownership map: golferId -> [team objects who have them rostered]. Scoped
  // to the active league's teams only so other leagues' picks don't leak in.
  const ownership = useMemo(() => {
    const map = {};
    for (const t of teamsForLeague(leagueId)) {
      const slot = picks[t.id]?.[live.id];
      if (!slot) continue;
      [...slot.starters, ...slot.bench].forEach(gid => {
        if (gid) { (map[gid] = map[gid] || []); if (!map[gid].includes(t)) map[gid].push(t); }
      });
    }
    return map;
  }, [picks, live.id, leagueId]);

  const players = useMemo(() => {
    return Object.entries(EARN[live.id] || {})
      // No more G[gid] filter — we render everyone DataGolf returns, known or not
      .map(([gid, e]) => ({ gid, ...e }))
      .filter(p => {
        if (filter === "mine")   return (ownership[p.gid] || []).some(t => t.id === user.id);
        if (filter === "league") return (ownership[p.gid] || []).length > 0;
        return true;
      })
      .sort((a, b) => {
        const aOut = a.status === "mc" || a.status === "wd" || a.status === "dfl";
        const bOut = b.status === "mc" || b.status === "wd" || b.status === "dfl";
        if (aOut !== bOut) return aOut ? 1 : -1;
        return (a.score ?? 99) - (b.score ?? 99);
      });
  }, [live.id, ownership, filter, user.id]);

  const totalCount = Object.keys(EARN[live.id] || {}).length;

  const FilterButton = ({ value, label }) => (
    <button onClick={() => setFilter(value)}
      className={`px-2 py-1 rounded-md ${filter === value ? "bg-green/15 text-green border border-green/30 font-semibold" : "text-dim hover:text-text"}`}>
      {label}
    </button>
  );

  return (
    <div className="glass rounded-2xl flex flex-col flex-1 overflow-hidden">
      <header className="px-4 py-3 border-b border-line">
        <div className="flex items-center justify-between">
          <div>
            <h3 className="font-bold text-base">{live.name}</h3>
            <div className="text-[12px] text-dim">{live.course} · R{live.currentRound || 1} · {totalCount} in field</div>
          </div>
          <span className="text-[11px] uppercase tracking-wider font-bold px-2 py-0.5 rounded bg-red-500/10 text-red border border-red-500/30 inline-flex items-center gap-1">
            <span className="live-dot w-1.5 h-1.5 bg-red-500 rounded-full inline-block"/>Live
          </span>
        </div>
        <div className="mt-2 flex items-center gap-1.5 text-[12px]">
          <FilterButton value="all"    label="All players" />
          <FilterButton value="league" label="League picks" />
          <FilterButton value="mine"   label="My picks" />
        </div>
      </header>
      <div className="flex-1 overflow-y-auto">
        {players.length === 0 && totalCount === 0 && (
          <div className="p-6 text-center text-sm text-muted">
            <div className="font-semibold text-text mb-1">No live data yet</div>
            <div className="text-xs">Backend scraper of <span className="text-text">{LIVE_SOURCES[live.id]?.name}</span> hasn't populated this tournament's scores.</div>
          </div>
        )}
        {players.length === 0 && totalCount > 0 && (
          <div className="p-6 text-center text-sm text-dim">No players match this filter.</div>
        )}
        {players.map(p => <TourPlayerRow key={p.gid} player={p} owners={ownership[p.gid] || []} youId={user.id} majorId={live.id} />)}
      </div>
      <div className="px-4 py-2 border-t border-line text-[11px] text-dim flex items-center gap-2">
        <span className="flex -space-x-1">
          {TEAMS.slice(0,2).map(t => <span key={t.id} className="w-2.5 h-2.5 rounded-full border border-white" style={{ background: t.color }}/>)}
        </span>
        Colored dots = league members with that golfer rostered
      </div>
    </div>
  );
}

function TourPlayerRow({ player, owners, youId, majorId }) {
  // Prefer the curated GOLFERS entry; fall back to backend-supplied name/country
  // for players not in our pickable roster (still shown on the leaderboard).
  const known = G[player.gid];
  const name    = known?.name    || player.name    || "—";
  const country = known?.country || player.country || "";
  const isMine = owners.some(o => o.id === youId);
  const out = player.status === "mc" || player.status === "wd" || player.status === "dfl";
  const [open, setOpen] = useState(false);
  return (
    <div>
      <div role="button" tabIndex={0}
        onClick={() => setOpen(o => !o)}
        onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setOpen(o => !o); } }}
        className={`flex items-center gap-2 px-3 py-2 border-b border-line text-sm cursor-pointer hover:bg-black/[0.02] transition-colors ${out ? "opacity-50" : ""} ${isMine ? "bg-green/[0.04]" : ""}`}>
        <div className="w-9"><ScorePill status={player.status} position={player.position} /></div>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-1.5">
            <span className="font-medium truncate">{name}</span>
            {isMine && <span className="text-[10px] uppercase tracking-wider text-green font-bold">YOURS</span>}
            {!known && <span className="text-[10px] uppercase tracking-wider text-dim font-semibold" title="Not in your league's pickable roster">FIELD</span>}
          </div>
          <div className="text-[11px] text-dim flex items-center gap-1.5">
            <span>{country}</span>
            {player.thru && player.status === "made_cut" && <span>· thru {player.thru}</span>}
          </div>
        </div>
        <div className="flex -space-x-1 shrink-0">
          {owners.slice(0, 4).map(t =>
            <span key={t.id} title={t.name}

      </div>
      {open && <PlayerStatsPanel majorId={majorId} player={player} displayName={name} />}
