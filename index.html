/* =========================================================================
   TOP BAR + RUNNING SEASON TOTAL
   ========================================================================= */
function TopBar({ user, onSignOut, onSwitchUser, onResetPicks, onResetAll, onOpenProfile, onOpenLeague, onBackToHub, multiLeague, onOpenOnboarding, leagueId, leagueName, foundedYear }) {
  const viewAs = user.id;
  const liveMajor = MAJORS.find(m => m.status === "live");
  const settled  = MAJORS.filter(m => m.status === "complete").reduce((s, m) => s + teamMajorTotal(viewAs, m.id), 0);
  const liveContrib = liveMajor ? teamMajorTotal(viewAs, liveMajor.id) : 0;
  const total = settled + liveContrib;

  const sorted = teamsForLeague(leagueId).map(t => ({ id: t.id, total: teamSeasonTotal(t.id) })).sort((a,b) => b.total - a.total);
  const rank = sorted.findIndex(t => t.id === viewAs) + 1;
  const leader = sorted[0]?.total ?? 0;
  const behind = total - leader;

  return (
    <header className="border-b border-line bg-bg2/60 backdrop-blur-xl sticky top-0 z-30">
      <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3">
        {/* Row 1 — branded header row, user menu on the right. The
            back-to-Clubhouse pill lives in the TabBar below so it's even
            with the tab labels (My Picks / Live / etc). */}
        <BrandedHeaderRow
          title={leagueName || "League"}
          subtitle={foundedYear ? `EST ${foundedYear}` : null}
          onClick={onBackToHub}
          right={
            <UserMenu user={user} onSignOut={onSignOut} onSwitchUser={onSwitchUser}
              onResetPicks={onResetPicks} onResetAll={onResetAll}
              onOpenProfile={onOpenProfile} onOpenLeague={onOpenLeague}
              onBackToHub={onBackToHub} multiLeague={multiLeague}
              onOpenOnboarding={onOpenOnboarding} leagueId={leagueId} />
          }
        />

        {/* Row 2 — full-width stats strip, even spacing across all four metrics */}
        <div className="mt-3 glass rounded-xl px-4 py-2.5 grid grid-cols-2 sm:grid-cols-4 gap-3 items-center">
          <div className="leading-tight">
            <div className="text-[11px] uppercase tracking-wider text-dim">Season Total</div>
            <div className="display-num font-bold text-lg sm:text-xl">{fmtFull(total)}</div>
          </div>
          <div className="leading-tight sm:border-l sm:border-line sm:pl-3">
            <div className="text-[11px] uppercase tracking-wider text-dim flex items-center gap-1">
              {liveMajor && <span className="live-dot w-1.5 h-1.5 bg-red-400 rounded-full inline-block"/>}
              {liveMajor ? "Live add" : "Live"}
            </div>
            <div className={`display-num font-semibold text-base ${liveContrib > 0 ? "text-green" : "text-dim"}`}>
              {liveMajor ? `+${fmt(liveContrib)}` : "—"}
            </div>
          </div>
          <div className="leading-tight border-l border-line pl-3">
            <div className="text-[11px] uppercase tracking-wider text-dim">Rank</div>
            <div className={`display-num font-bold text-base ${rank === 1 ? "text-gold" : "text-text"}`}>#{rank}</div>
          </div>
          <div className="leading-tight border-l border-line pl-3">
            <div className="text-[11px] uppercase tracking-wider text-dim">{rank === 1 ? "Lead" : "Behind"}</div>
            <div className={`display-num font-semibold text-base ${rank===1 ? "text-gold" : "text-muted"}`}>
              {rank === 1 ? "+" + fmt(total - (sorted[1]?.total ?? 0)) : fmt(behind)}
            </div>
          </div>
        </div>
      </div>
    </header>
  );
}

/* =========================================================================
   LOGIN SCREEN
   ========================================================================= */
function LoginScreen({ onAuthed }) {
  const [mode, setMode] = useState("login");          // 'login' | 'signup' | 'create'
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [displayName, setDisplayName] = useState("");
  const [firstName, setFirstName] = useState("");
  const [lastName, setLastName]   = useState("");
  const [teamId, setTeamId] = useState("");
  const [leagueCode, setLeagueCode] = useState("");
  const [leagueName, setLeagueName] = useState("");    // for "join existing" preview
  const [leagueMemberModel, setLeagueMemberModel] = useState(null);
  const [members, setMembers] = useState([]);
  const [lookupErr, setLookupErr] = useState("");
  const [lookupBusy, setLookupBusy] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState("");
  // Create-league form state
  const [newLeagueName, setNewLeagueName] = useState("");
  const [newLeagueCode, setNewLeagueCode] = useState("");
  const [newTeamCount, setNewTeamCount] = useState(5);
  const [createdLeague, setCreatedLeague] = useState(null);  // { league, members } after successful create
  // Forgot-password modal
  const [forgotOpen, setForgotOpen] = useState(false);

  // Whenever the user lands on signup, or changes the code, look up that league.
  useEffect(() => {
    if (mode !== "signup") return;
    const code = leagueCode.trim().toUpperCase();
    if (!code) { setMembers([]); setLeagueName(""); setLookupErr(""); return; }
    let cancelled = false;
    setLookupBusy(true); setLookupErr("");
    apiLeagueByCode(code)
      .then(r => {
        if (cancelled) return;
        setMembers(r.members || []);
        setLeagueName(r.league?.name || "");
        setLeagueMemberModel(r.league?.memberModel || "open");
        // If the currently picked team isn't in this league, clear it.
        if (teamId && !(r.members || []).some(m => m.teamId === teamId)) setTeamId("");
      })
      .catch(e => {
        if (cancelled) return;
        setMembers([]); setLeagueName(""); setTeamId("");
        setLookupErr(e.message);
      })
      .finally(() => { if (!cancelled) setLookupBusy(false); });
    return () => { cancelled = true; };
  }, [mode, leagueCode]);

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true); setError("");
    try {
      const r = await apiLogin({ email, password });
      setToken(r.token);
      onAuthed(r);
    } catch (err) {
      setError(err.message);
    } finally { setLoading(false); }
  };
  const handleSignup = async (e) => {
    e.preventDefault();
    if (!firstName.trim()) { setError("First name is required."); return; }
    if (!lastName.trim())  { setError("Last name is required.");  return; }
    setLoading(true); setError("");
    try {
      // Account-only signup — backend derives displayName ("First L.") if we
      // don't send one. Members land in the Clubhouse and can Join or Start
      // a league from there.
      const r = await apiSignup({
        email, password,
        firstName: firstName.trim(),
        lastName:  lastName.trim(),
      });
      setToken(r.token);
      onAuthed(r);
    } catch (err) {
      setError(err.message);
    } finally { setLoading(false); }
  };
  const handleCreate = async (e) => {
    e.preventDefault();
    if (!newLeagueName.trim()) { setError("Give your league a name."); return; }
    setLoading(true); setError("");
    try {
      const r = await apiCreateLeague({
        name: newLeagueName.trim(),
        code: newLeagueCode.trim().toUpperCase() || undefined,
        
      });
      setCreatedLeague(r);
      // Pre-fill the signup form with the new league's code so the commissioner
      // can claim team 1 in the same flow.
      setLeagueCode(r.league.code);
    } catch (err) {
      setError(err.message);
    } finally { setLoading(false); }
  };

  const unclaimedTeams = members.filter(m => !m.claimed);
  const claimedTeams   = members.filter(m =>  m.claimed);

  return (
    <div className="min-h-screen flex items-center justify-center px-4 py-10">
      <div className="w-full max-w-md">
        {/* Logo + brand — bigger logo, wordmark in the logo's green so the
            two read as one mark; slogan lives in the footer beneath the card. */}
        <div className="flex flex-col items-center mb-6">
          <OnlyMajorsLogo size={162} full={true} className="mb-3" />
          <div className="font-bold tracking-tight text-3xl" style={{ color: "var(--green)" }}>OnlyMajors</div>
        </div>

        <div className="glass rounded-2xl p-6 space-y-4 fade-in">
          {/* Tab switcher — two paths: existing member sign-in, or join the
              club (account-only signup; leagues are joined/created later). */}
          <div className="flex gap-1 p-1 bg-black/[0.04] rounded-lg">
            <button onClick={() => { setMode("login"); setError(""); }}
              className={`flex-1 text-sm font-semibold py-1.5 rounded-md transition-colors ${mode==="login" ? "bg-white shadow-sm" : "text-dim hover:text-text"}`}>
              Member Log In
            </button>
            <button onClick={() => { setMode("signup"); setError(""); setCreatedLeague(null); }}
              className={`flex-1 text-sm font-semibold py-1.5 rounded-md transition-colors ${mode==="signup" ? "bg-white shadow-sm" : "text-dim hover:text-text"}`}>
              Join the Club
            </button>
          </div>

          {mode === "login" && (
            <form onSubmit={handleLogin} className="space-y-3">
              <AuthField label="Email or Membership #" type="text" value={email} onChange={setEmail} placeholder="Email or number" />
              <AuthField label="Password" type="password" value={password} onChange={setPassword} placeholder="••••••••" />
              {error && <div className="text-[12px] text-red">{error}</div>}
              <button type="submit" disabled={loading}
                className="w-full font-semibold rounded-lg py-2.5 transition-colors text-sm disabled:opacity-50 om-pill">
                {loading ? "Signing in…" : "Log in"}
              </button>
              <div className="text-center pt-1">
                <button type="button" onClick={() => setForgotOpen(true)}
                  className="text-[12px] text-dim hover:text-text underline underline-offset-2">
                  Forgot password?
                </button>
              </div>
            </form>
          )}

          {mode === "signup" && (
            <form onSubmit={handleSignup} className="space-y-3">
              <div className="text-[13px] text-muted leading-snug">
                Welcome to OnlyMajors. Create your membership — you'll be able to join a friend's league or start your own from the Clubhouse.
              </div>
              <div className="grid grid-cols-2 gap-3">
                <AuthField label="First name" type="text" value={firstName} onChange={setFirstName} placeholder="Austin" />
                <AuthField label="Last name"  type="text" value={lastName}  onChange={setLastName}  placeholder="Keim" />
              </div>
              <div className="text-[11px] text-dim leading-snug -mt-1">
                {firstName.trim() && lastName.trim()
                  ? <>Your handle will be <span className="text-text font-semibold">{firstName.trim()} {lastName.trim()[0].toUpperCase()}.</span> — you can change it later in Profile.</>
                  : "Your display handle defaults to First L. (you can change it later)."}
              </div>
              <AuthField label="Email"        type="email"    value={email}       onChange={setEmail}       placeholder="you@example.com" />
              <AuthField label="Password"     type="password" value={password}    onChange={setPassword}    placeholder="At least 6 characters" />
              {error && <div className="text-[12px] text-red">{error}</div>}
              <button type="submit"
                disabled={loading}
                className="w-full font-semibold rounded-lg py-2.5 transition-colors text-sm disabled:opacity-50 om-pill">
                {loading ? "Creating membership…" : "Join the Club"}
              </button>
            </form>
          )}

        </div>

        <div className="text-center text-[12px] text-dim mt-6">
          Fantasy golf when it counts
        </div>
      </div>
      {forgotOpen && <ForgotPasswordModal initialEmail={email} onClose={() => setForgotOpen(false)} />}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// ForgotPasswordModal — sends a reset link. Always shows the same success
// state so attackers can't enumerate which emails are registered.
// ─────────────────────────────────────────────────────────────────────────
function ForgotPasswordModal({ initialEmail = "", onClose }) {
  const [email, setEmail] = useState(initialEmail);
  const [busy, setBusy]   = useState(false);
  const [sent, setSent]   = useState(false);
  const [error, setError] = useState("");

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (!/^\S+@\S+\.\S+$/.test(email)) { setError("That email doesn't look right."); return; }
    setBusy(true);
    try {
      await apiRequestPasswordReset({ email: email.trim().toLowerCase() });
      setSent(true);
    } catch (err) {
      setError(err.message || "Couldn't request a reset. Try again.");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-md flex items-end sm:items-center justify-center px-4 py-6"
      onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()}
        style={{ background: "#ffffff" }}
        className="border border-line rounded-2xl w-full max-w-md p-6 space-y-4 shadow-2xl">
        <div className="flex items-start justify-between gap-2">
          <h2 className="font-bold text-lg">{sent ? "Check your inbox" : "Reset password"}</h2>
          <button onClick={onClose} className="text-dim hover:text-text p-1 -m-1">
            <svg viewBox="0 0 16 16" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
          </button>
        </div>
        {sent ? (
          <>
            <p className="text-sm text-muted leading-relaxed">
              If <span className="font-mono text-text">{email}</span> is registered with OnlyMajors, we just sent a reset link. It expires in 1 hour.
            </p>
            <p className="text-[12px] text-dim leading-relaxed">
              Don't see it? Check your spam folder, or come back and request another one in 60 seconds.
            </p>
            <button type="button" onClick={onClose}
              className="w-full font-semibold rounded-lg py-2.5 text-sm om-pill">
              Back to login
            </button>
          </>
        ) : (
          <form onSubmit={submit} className="space-y-3">
            <p className="text-[13px] text-muted leading-relaxed">
              Enter the email you signed up with. If we find it, we'll send you a link to set a new password.
            </p>
            <AuthField label="Email" type="email" value={email} onChange={setEmail} placeholder="you@example.com" />
            {error && <div className="text-[12px] text-red">{error}</div>}
            <button type="submit" disabled={busy}
              className="w-full font-semibold rounded-lg py-2.5 text-sm disabled:opacity-50 om-pill">
              {busy ? "Sending…" : "Send reset link"}
            </button>
          </form>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// ResetPasswordScreen — landing page for the email link. Reads token from
// the URL query string, posts the new password, then funnels back to login.
// ─────────────────────────────────────────────────────────────────────────
function ResetPasswordScreen({ token, onDone }) {
  const [newPw, setNewPw]         = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [busy, setBusy]           = useState(false);
  const [error, setError]         = useState("");
  const [done, setDone]           = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (newPw.length < 8) { setError("Password must be at least 8 characters."); return; }
    if (newPw !== confirmPw) { setError("Passwords don't match."); return; }
    setBusy(true);
    try {
      await apiResetPassword({ token, newPassword: newPw });
      setDone(true);
    } catch (err) {
      setError(err.message || "Couldn't reset password. The link may have expired.");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4 py-10">
      <div className="w-full max-w-md">
        <div className="flex flex-col items-center mb-8">
          <OnlyMajorsLogo size={130} full={true} className="mb-2" />
          <div className="font-bold tracking-tight text-2xl">OnlyMajors</div>
          <div className="text-[11px] uppercase tracking-[0.2em] text-dim mt-1">onlymajors.com</div>
        </div>
        <div className="glass rounded-2xl p-6 space-y-4 fade-in">
          {done ? (
            <>
              <h2 className="font-bold text-lg">Password reset</h2>
              <p className="text-sm text-muted leading-relaxed">
                Your password has been updated. Any other devices you were signed in on have been signed out — sign in again with the new password.
              </p>
              <button type="button" onClick={onDone}
                className="w-full font-semibold rounded-lg py-2.5 text-sm om-pill">
                Continue to login
              </button>
            </>
          ) : (
            <form onSubmit={submit} className="space-y-3">
              <h2 className="font-bold text-lg">Set a new password</h2>
              <p className="text-[13px] text-muted leading-relaxed">
                Choose a new password for your OnlyMajors account.
              </p>
              <AuthField label="New password"     type="password" value={newPw}     onChange={setNewPw}     placeholder="At least 8 characters" />
              <AuthField label="Confirm password" type="password" value={confirmPw} onChange={setConfirmPw} placeholder="Re-enter the new password" />
              {error && <div className="text-[12px] text-red">{error}</div>}
              <button type="submit" disabled={busy}
                className="w-full font-semibold rounded-lg py-2.5 text-sm disabled:opacity-50 om-pill">
                {busy ? "Updating…" : "Reset password"}
              </button>
              <div className="text-center pt-1">
                <button type="button" onClick={onDone}
                  className="text-[12px] text-dim hover:text-text underline underline-offset-2">
                  Back to login
                </button>
              </div>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

function AuthField({ label, type, value, onChange, placeholder }) {
  return (
    <label className="block">
      <span className="block text-[12px] uppercase tracking-wider text-dim font-semibold mb-1">{label}</span>
      <input type={type} required value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        className="w-full bg-bg2 border border-line-2 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green/40 placeholder-dim text-text" />
    </label>
  );
}

/* =========================================================================
   LEAGUE HUB — landing page for multi-league users. Shows a card per league
   with picks status, season standing, and live position. CTAs to join + start
   another league.
   ========================================================================= */
function LeagueHub({ authedUser, leagues, picks, syncToken, onEnterLeague, onOpenProfile, onLeaguesChanged, onSignOut, onOpenOnboarding, onSummaryLoaded }) {
  const [summary, setSummary] = useState(null);
  const [archivesByLeague, setArchivesByLeague] = useState({});   // { [leagueId]: { years: [...] } }
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState("");
  const [action, setAction]   = useState(null);   // null | 'join' | 'create'

  // Sync summary → App's leagues state so navigation knows about new leagues
  // that were just created/joined from inside the Hub.
  const syncUp = (r) => {
    if (!onLeaguesChanged) return;
    const transformed = (r?.leagues || []).map(e => ({
      id:             Number(e.league.id),
      name:           e.league.name,
      inviteCode:     e.league.code,
      format:         e.league.format,
      scope:          e.league.scope,
      majorId:        e.league.majorId,
      memberModel:    e.league.memberModel,
      visibility:     e.league.visibility,
      commissionerId: e.league.commissionerId,
      teamId:         e.myTeam?.teamId,
      teamName:       e.myTeam?.teamName,
      teamColor:      e.myTeam?.teamColor,
    }));
    onLeaguesChanged(transformed);
  };

  useEffect(() => {
    let cancelled = false;
    setLoading(true); setError("");
    apiLeaguesSummary()
      .then(r => { if (!cancelled) { setSummary(r); syncUp(r); onSummaryLoaded?.(r); } })
      .catch(e => { if (!cancelled) setError(e.message); })
      .finally(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Once we have the summary, fetch each league's archive in parallel so we
  // can compute career stats. Failed fetches just leave that league's archive
  // empty — they don't block the rest of the page.
  useEffect(() => {
    if (!summary?.leagues?.length) return;
    let cancelled = false;
    Promise.allSettled(
      summary.leagues.map(entry =>
        apiLeagueArchive(entry.league.id).then(r => [entry.league.id, r])
      )
    ).then(results => {
      if (cancelled) return;
      const next = {};
      for (const r of results) {
        if (r.status === "fulfilled" && r.value) next[r.value[0]] = r.value[1];
      }
      setArchivesByLeague(next);
    });
    return () => { cancelled = true; };
  }, [summary]);

  const refreshSummary = () => {
    setLoading(true);
    apiLeaguesSummary()
      .then(r => { setSummary(r); syncUp(r); })
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  };

  // Aggregate career stats across every league the user is in:
  //   - tournament avg/wins use archived years AND the current season's
  //     completed majors (so the avg shifts after each finished tournament)
  //   - overall avg/wins only count fully archived seasons
  const careerStats = useMemo(() => {
    if (!summary) return null;
    let tournSum = 0, tournCount = 0, seasonSum = 0, seasonCount = 0;
    let tournWins = 0, overallWins = 0;
    let tournPR  = 0;   // highest single-tournament earnings
    let overallPR = 0;  // highest season-long earnings (closed seasons only)
    const MIDS = ["masters","pga","usopen","open"];
    for (const entry of summary.leagues) {
      // All league formats share the 4-starter roster shape, so every
      // league's numbers count toward Handicap Stats. Per-league
      // `includedMajors` filtering below keeps single-major contributions
      // scoped to just the major they cover.
      const myTeamId = entry.myTeam.teamId;
      // Archived years
      const archive = archivesByLeague[entry.league.id];
      for (const yearEntry of (archive?.years || [])) {
        const data = yearEntry.data || {};
        const myTeam = (data.teams || []).find(t => t.teamId === myTeamId);
        if (myTeam) {
          for (const mid of MIDS) {
            if (myTeam.byMajor?.[mid] != null) {
              const v = Number(myTeam.byMajor[mid]) || 0;
              tournSum += v;
              tournCount++;
              if (v > tournPR) tournPR = v;
            }
          }
          const seasonTotal = Number(myTeam.total) || 0;
          seasonSum += seasonTotal;
          seasonCount++;
          if (seasonTotal > overallPR) overallPR = seasonTotal;
        }
        for (const mid of MIDS) {
          if (data.majorWinners?.[mid]?.teamId === myTeamId) tournWins++;
        }
        if (data.champion?.teamId === myTeamId) overallWins++;
      }
      // Server picks merged over the PICKS seed so 2026 fallbacks behave the
      // same on the Hub as inside the league.
      const mergedPicks = JSON.parse(JSON.stringify(PICKS));
      for (const teamId of Object.keys(entry.picks || {})) {
        mergedPicks[teamId] = { ...(mergedPicks[teamId] || {}), ...entry.picks[teamId] };
      }
      // Current season's completed majors — fold them in so the avg updates
      // each time a tournament finishes, even before the season closes.
      // Only count majors that are part of THIS league (so a "remaining
      // majors" test league doesn't drag your Masters/PGA averages down).
      const includedSet = Array.isArray(entry.league?.includedMajors) && entry.league.includedMajors.length
        ? new Set(entry.league.includedMajors)
        : new Set(["masters","pga","usopen","open"]);
      for (const m of MAJORS) {
        if (m.status !== "complete") continue;
        if (!includedSet.has(m.id)) continue;
        const mine = teamMajorTotal(myTeamId, m.id, mergedPicks);
        tournSum  += mine;
        tournCount++;
        if (mine > tournPR) tournPR = mine;
        // Did I win this major within my league?
        const teams = (entry.members || []).map(mem => ({
          teamId: mem.teamId,
          total:  teamMajorTotal(mem.teamId, m.id, mergedPicks),
        })).sort((a, b) => b.total - a.total);
        if (teams[0]?.teamId === myTeamId && teams[0].total > 0) tournWins++;
      }
    }
    return {
      tournAvg:    tournCount  > 0 ? Math.round(tournSum  / tournCount)  : 0,
      tournCount,
      overallAvg:  seasonCount > 0 ? Math.round(seasonSum / seasonCount) : 0,
      seasonCount,
      tournWins,
      overallWins,
      tournPR,
      overallPR,
    };
  // syncToken bumps whenever EARN hydration finishes so the current-season
  // major totals flow into the stats once the leaderboard data lands.
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [summary, archivesByLeague, syncToken]);

  // Determine which major to surface picks status for on the cards.
  const activeMajor = useMemo(() => {
    const live = MAJORS.find(m => m.status === "live");
    if (live) return live;
    const upcomingOpen = MAJORS.find(m => m.status === "upcoming" && arePicksOpen(m));
    if (upcomingOpen) return upcomingOpen;
    const nextUpcoming = MAJORS.find(m => m.status === "upcoming");
    if (nextUpcoming) return nextUpcoming;
    return MAJORS[MAJORS.length - 1];
  }, []);
  const liveMajor = MAJORS.find(m => m.status === "live") || null;

  const firstName = (authedUser.displayName || authedUser.email || "").split(/[\s@]/)[0];

  return (
    <div className="min-h-screen flex flex-col" style={{ background: "var(--bg)" }}>
      {/* Branded header — same shape used on League + Pro Shop pages so the
          three top-level views feel like one product. Clicking the title
          on the Clubhouse just scrolls to top (since we're already here). */}
      <header className="border-b border-line sticky top-0 z-30"
        style={{ background: "var(--bg-1, #f5f1e8)" }}>
        <div className="max-w-4xl mx-auto px-4 sm:px-6 py-3">
          <BrandedHeaderRow
            title="The Clubhouse"
            onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
            right={
              <HubUserMenu authedUser={authedUser} firstName={firstName}
                onOpenProfile={() => onOpenProfile && onOpenProfile(summary?.leagues?.[0]?.league?.id)}
                onOpenOnboarding={onOpenOnboarding} onSignOut={onSignOut} />
            }
          />
        </div>
      </header>

      <main className="flex-1 max-w-4xl w-full mx-auto px-4 sm:px-6 py-8 fade-in">
        {/* Welcome line — sets the country-club tone. Smaller letter-spacing
            on phones so it doesn't visually crowd the membership card below. */}
        <div className="text-[11px] sm:text-[12px] uppercase tracking-[0.16em] sm:tracking-[0.22em] text-dim font-semibold mb-2">
          Welcome to the Clubhouse{firstName ? `, ${firstName}` : ""}
        </div>

        {/* Membership card — avatar + member name + membership number. */}
        <MembershipCard authedUser={authedUser} summary={summary}
          onOpenProfile={() => onOpenProfile && onOpenProfile(summary?.leagues?.[0]?.league?.id)} />

        {/* Explore the Clubhouse — jump-nav to each section below. */}
        <ExploreClubhouseNav />

        {/* Handicap Stats — separate section, header matches Leagues.
            Strictly league play (4-starter format). Club Championship has
            its own scoreboard in its own section, since the 6-starter total
            isn't comparable to a 4-starter total. */}
        <div className="mt-8 mb-4">
          <h2 className="font-bold text-2xl tracking-tight">Handicap Stats</h2>
          <p className="text-sm text-muted mt-0.5">League play across every major and season. Club Championship results tracked separately below.</p>
        </div>
        <HandicapStatsCard stats={careerStats} />

        <div id="ch-leagues" className="mt-8 mb-4 scroll-mt-20">
          <h2 className="font-bold text-2xl tracking-tight">Leagues</h2>
          <p className="text-sm text-muted mt-0.5">Pick a league to manage your picks.</p>
        </div>

        {loading && <div className="text-sm text-dim">Loading your leagues…</div>}
        {error   && <div className="text-sm text-red">Couldn't load leagues: {error}</div>}

        {!loading && summary && (
          <div className="space-y-3">
            {summary.leagues.map(entry => (
              <LeagueHubCard key={entry.league.id} entry={entry}
                activeMajor={activeMajor} liveMajor={liveMajor} syncToken={syncToken}
                authedUserId={authedUser?.id}
                onEnter={() => onEnterLeague(entry.league.id)}
                onLeagueChanged={() => refreshSummary()} />
            ))}
            {summary.leagues.length === 0 && (
              <div className="text-sm text-dim italic py-6 text-center border border-dashed border-line rounded-2xl">
                You're not in any leagues yet. Start one below.
              </div>
            )}
          </div>
        )}

        {/* CTAs */}
        <div className="mt-8 grid sm:grid-cols-2 gap-3">
          <button onClick={() => setAction("join")}
            className="rounded-xl border-2 border-line bg-white px-4 py-3 text-left om-darken-hover">
            <div className="text-[11px] uppercase tracking-wider text-dim font-semibold">Already invited?</div>
            <div className="font-semibold text-sm mt-0.5">Join another league</div>
          </button>
          <button onClick={() => setAction("create")}
            className="rounded-xl border-2 px-4 py-3 text-left transition-colors om-pill">
            <div className="text-[11px] uppercase tracking-wider font-semibold opacity-80">Run your own</div>
            <div className="font-semibold text-sm mt-0.5">Start a new league</div>
          </button>
        </div>

        {/* Club Championship — platform-wide single-major contest, separate
            from your leagues. 6-starter format with its own scoreboard. */}
        <div id="ch-championship" className="mt-10 mb-4 scroll-mt-20">
          <h2 className="font-bold text-2xl tracking-tight">Club Championship</h2>
          <p className="text-sm text-muted mt-0.5">Six starters, every member of the Club, one tournament. Tracked on its own scoreboard — doesn't roll into Handicap Stats.</p>
        </div>
        <ClubChampionshipCard authedUser={authedUser} memberNumber={summary?.me?.memberNumber} />

        {/* Pro Shop section */}
        <div id="ch-proshop" className="mt-10 mb-4 scroll-mt-20">
          <h2 className="font-bold text-2xl tracking-tight">The Pro Shop</h2>
          <p className="text-sm text-muted mt-0.5">Members-only merch. Coming soon.</p>
        </div>
        <button onClick={() => setAction("proshop")}
          className="w-full rounded-2xl border-2 border-line bg-white p-5 sm:p-6 text-left om-darken-hover">
          <div className="flex items-center gap-4">
            <div className="w-14 h-14 rounded-xl shrink-0 flex items-center justify-center"
              style={{ background: "var(--green)", color: "var(--bg-1)" }}>
              <svg viewBox="0 0 24 24" className="w-7 h-7" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 7h12l-1 12H7L6 7z"/>
                <path d="M9 7V5a3 3 0 0 1 6 0v2"/>
              </svg>
            </div>
            <div className="min-w-0 flex-1">
              <div className="flex items-baseline gap-2 flex-wrap">
                <span className="font-bold text-lg">Browse the Pro Shop</span>
                <span className="text-[10px] uppercase tracking-[0.18em] font-semibold px-1.5 py-0.5 rounded"
                  style={{ background: "rgba(43,69,53,0.08)", color: "var(--green)" }}>Preview</span>
              </div>
              <div className="text-sm text-muted mt-0.5">Bag tags · hats · hoodie</div>
            </div>
            <svg viewBox="0 0 16 16" className="w-4 h-4 text-dim shrink-0" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M6 4l4 4-4 4"/>
            </svg>
          </div>
        </button>
      </main>

      {action === "join" || action === "create" ? (
        <LeagueHubActionModal kind={action} onClose={() => setAction(null)}
          onJoined={() => { setAction(null); refreshSummary(); }}
          onCreated={() => { setAction(null); refreshSummary(); }} />
      ) : action === "proshop" ? (
        <ProShopPage onClose={() => setAction(null)} memberNumber={summary?.me?.memberNumber} />
      ) : null}
    </div>
  );
}

function ProductDetailModal({ product, onClose, onNotify }) {
  // Body scroll lock so the Pro Shop page underneath doesn't drift.
  useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = prev; };
  }, []);
  const [variantKey, setVariantKey] = useState(product.variants[0].key);
  // Optional per-product customization (e.g. putter logo placement). Defaults
  // to the first option. Only renders if the product defines `customizable`.
  const [customKey, setCustomKey] = useState(product.customizable?.options?.[0]?.key || null);
  const variant = product.variants.find(v => v.key === variantKey) || product.variants[0];
  // Gallery for this variant — single image becomes a one-frame "gallery".
  const gallery = variant.gallery || [variant.img];
  const [galleryIdx, setGalleryIdx] = useState(0);
  React.useEffect(() => { setGalleryIdx(0); }, [variantKey]);
  const imgKey = gallery[galleryIdx] || gallery[0];
  const next  = () => setGalleryIdx(i => (i + 1) % gallery.length);
  const prev  = () => setGalleryIdx(i => (i - 1 + gallery.length) % gallery.length);
  const fitClass = product.fit === "contain" ? "object-contain p-6" : "object-cover";

  return (
    <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-md flex items-center justify-center px-4 py-6"

            style={{ background: "#f5f1e8" }}>
            <img src={PROSHOP_IMG[imgKey]} alt={product.name}
              className={`w-full h-full ${fitClass}`} />
            {gallery.length > 1 && (
              <>
                <button onClick={prev}
                  className="absolute left-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-white/90 text-text hover:bg-white shadow-sm flex items-center justify-center">
                  <svg viewBox="0 0 16 16" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 4L6 8l4 4"/></svg>
                </button>
                <button onClick={next}
                  className="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-white/90 text-text hover:bg-white shadow-sm flex items-center justify-center">
                  <svg viewBox="0 0 16 16" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 4l4 4-4 4"/></svg>
                </button>
                <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex items-center gap-1.5">
                  {gallery.map((_, i) => (
                    <button key={i} onClick={() => setGalleryIdx(i)}

                      style={{ background: i === galleryIdx ? "var(--green)" : "rgba(0,0,0,0.18)" }}/>
                  ))}
                </div>
              </>
            )}
            <span className="absolute top-3 left-3 text-[10px] uppercase tracking-[0.18em] font-semibold px-1.5 py-0.5 rounded"
              style={{ background: "rgba(43,69,53,0.08)", color: "var(--green)" }}>Preview</span>

                  {product.variants.map(v => (
                    <button key={v.key} type="button"

  );

// Career profile card on top of the Hub — shows greeting + 4 career stats:

// Hub top-right user menu — mirrors the in-league UserMenu but skinned for the
// green Hub header. Trigger shows initials + first name + chevron; dropdown

function HubUserMenu({ authedUser, firstName, onOpenProfile, onOpenOnboarding, onSignOut }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); document.removeEventListener("keydown", onKey); };
  }, [open]);

  const initials = (authedUser.displayName || authedUser.email || "?")
    .split(/[\s@]/).filter(Boolean).map(s => s[0]?.toUpperCase()).slice(0, 2).join("");
  const label = firstName || (authedUser.displayName || "").split(/\s+/)[0] || authedUser.email;

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2 pl-1 pr-2 py-1 rounded-full transition-colors hover:bg-black/[0.04]"
        style={{ color: "var(--text)" }}>
        <span className="w-7 h-7 rounded-full flex items-center justify-center text-[12px] font-bold"
          style={{ background: "var(--green)", color: "var(--bg-1)" }}>

          <polyline points="6 9 12 15 18 9"/>

      </button>
      {open && (
        <div className="absolute right-0 mt-1.5 w-56 z-40 bg-white rounded-xl shadow-lg border border-line-2 overflow-hidden fade-in"
          style={{ color: "var(--text)" }}>
          <div className="px-3 py-2.5 border-b border-line">
            <div className="text-sm font-semibold truncate">{authedUser.displayName || label}</div>
            <div className="text-[12px] text-dim truncate">{authedUser.email}</div>
          </div>
          <button onClick={() => { onOpenProfile && onOpenProfile(); setOpen(false); }}

            Account settings

          <button onClick={() => { onOpenOnboarding && onOpenOnboarding(); setOpen(false); }}
            className="w-full px-3 py-2.5 text-left text-sm font-medium text-text hover:bg-black/[0.03] transition-colors flex items-center gap-2 border-b border-line">
            <svg viewBox="0 0 16 16" className="w-3.5 h-3.5 text-dim" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="8" cy="8" r="6"/>
              <path d="M8 11.5v.01"/>
              <path d="M6 6a2 2 0 014 0c0 1-2 1.5-2 3"/>
            </svg>
            How it works
          </button>
          <button onClick={() => { onSignOut && onSignOut(); setOpen(false); }}

// Membership card — country-club energy. Avatar on the left, member name
// and ascending membership number on the right. The number persists across
// sessions and identifies the user for future merch / payments. Founder is #1.
function MembershipCard({ authedUser, summary, onOpenProfile }) {
  // Prefer fresh summary data (refetched on every Clubhouse load) over the
  // auth-time snapshot in authedUser, which can be stale after a profile edit.
  const firstName = summary?.me?.firstName ?? authedUser.firstName ?? null;
  const lastName  = summary?.me?.lastName  ?? authedUser.lastName  ?? null;
  const hasFullName = !!(firstName && lastName);
  // Full name renders First + Last when both are set. Otherwise we show
  // whatever we have plus a small "Add your last name" prompt below.
  const fullName = hasFullName
    ? `${firstName} ${lastName}`
    : (firstName || authedUser.displayName || authedUser.email?.split("@")[0] || "Member");
  // Initials are stable across display-name edits.
  const seed = (firstName || authedUser.displayName || authedUser.email || "?")
    + " " + (lastName || "");
  const initials = seed.split(/[\s@]/).filter(Boolean)
    .map(s => s[0]?.toUpperCase()).slice(0, 2).join("");
  const memberNumber =
    summary?.me?.memberNumber ??
    authedUser?.memberNumber ??
    null;
  return (
    <div className="rounded-2xl border border-line-2 bg-white p-5 sm:p-6">
      <div className="flex items-center gap-4">
        <button onClick={onOpenProfile} title="Account settings"
          className="w-14 h-14 rounded-full flex items-center justify-center font-bold text-lg shrink-0 hover:opacity-85 transition-opacity focus:outline-none focus:ring-2 focus:ring-green/40"
          style={{ background: "var(--green)", color: "var(--bg-1)" }}>
          {initials || "OM"}
        </button>
        <div className="min-w-0 flex-1">
          <div className="flex items-baseline gap-2 flex-wrap">
            <span className="text-[11px] uppercase tracking-[0.18em] font-semibold text-dim">Member name</span>
          </div>
          <div className="font-bold text-xl tracking-tight truncate">{fullName}</div>
          {!hasFullName && (
            <button onClick={onOpenProfile}
              className="text-[11px] text-dim hover:text-text underline underline-offset-2 mt-0.5">
              Add your {firstName ? "last name" : "name"} →
            </button>
          )}
          <div className="mt-2 flex items-baseline gap-2 flex-wrap">
            <span className="text-[10px] uppercase tracking-[0.18em] font-semibold text-dim">Membership number</span>
            <span className="font-mono font-semibold text-[13px]" style={{ color: "var(--green)" }}>
              {memberNumber != null ? `#${memberNumber}` : "—"}
            </span>
          </div>
        </div>
      </div>
    </div>
  );
}

// Handicap Stats — separate card that holds just the career numbers.

      {hasStats ? (
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">

  const [livePreview, setLivePreview] = useState(false);
  const [entryOpen,   setEntryOpen]   = useState(false);
  const [hofOpen,     setHofOpen]     = useState(false);
  const [avgOpen,     setAvgOpen]     = useState(false);
  const [livePageOpen, setLivePageOpen] = useState(false);
  // Dropdowns stay user-controlled — never auto-open with preview toggle.
  return (

// Reusable "Recent updates" feed. Renders a styled event log card; takes
// an array of { when, message, delta } rows. Used by the Club Championship
// live page and the in-league Live tab.
function LiveUpdatesFeed({ updates, title = "Recent updates", note }) {
  if (!updates || updates.length === 0) return null;
  return (
    <section>
      <div className="flex items-baseline justify-between mb-2">
        <div className="text-[11px] uppercase tracking-[0.18em] text-dim font-semibold">{title}</div>
        {note && <div className="text-[11px] text-dim">{note}</div>}
      </div>
      <div className="rounded-2xl border border-line bg-white divide-y divide-line">
        {updates.map((u, i) => (
          <div key={i} className="px-4 py-2.5 flex items-start gap-3 text-[13px]">
            <div className="w-16 text-[11px] text-dim font-mono shrink-0">{u.when}</div>
            <div className="flex-1 leading-snug">{u.message}</div>
            {u.delta && (
              <div className={`text-[12px] font-semibold ${u.delta.startsWith("+") ? "text-green" : "text-red"}`}>
                {u.delta}
              </div>
            )}
          </div>
        ))}
      </div>
    </section>
  );
}

      </div>
      </div>
    </div>,
    document.body
  );
}

// Compact scrollable score reel for the Club Championship entry preview.
// Mirrors the full ScorePredictor's behavior at a smaller scale. Starts
// centered on E (0), scroll to land on a value, snaps to nearest on settle.
function MiniScoreReel() {
  const ITEM_H  = 34;
  const PADDING = ITEM_H; // half a slot of pad on either end so the center row fits
  const scrollRef = useRef(null);
  const [value, setValue] = useState(0);
  useEffect(() => {
    // Wait until after layout settles — when the modal animates in, scrollTop
    // can otherwise be clamped to 0 because the container hasn't measured yet.
    const id = requestAnimationFrame(() => {
      if (!scrollRef.current) return;
      const startIdx = SCORE_OPTIONS.indexOf(0);
      scrollRef.current.scrollTop = startIdx * ITEM_H;
    });
    return () => cancelAnimationFrame(id);
  }, []);
  const debounceRef = useRef(null);
  const handleScroll = () => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      const el = scrollRef.current;
      if (!el) return;
      const idx = Math.round(el.scrollTop / ITEM_H);
      const clamped = Math.max(0, Math.min(SCORE_OPTIONS.length - 1, idx));
      el.scrollTo({ top: clamped * ITEM_H, behavior: "smooth" });
      setValue(SCORE_OPTIONS[clamped]);
    }, 90);
  };
  return (
    <div className="relative w-20 h-[102px] rounded-lg overflow-hidden border border-line shrink-0"
      style={{ background: "var(--bg-2, #faf7ef)" }}>
      {/* Center highlight band */}
      <div className="absolute left-0 right-0 top-1/2 -translate-y-1/2 h-[34px] pointer-events-none"
        style={{ background: "rgba(43,69,53,0.06)", borderTop: "1px solid rgba(43,69,53,0.18)", borderBottom: "1px solid rgba(43,69,53,0.18)" }}/>
      <div ref={scrollRef} onScroll={handleScroll}
        className="absolute inset-0 overflow-y-scroll text-center"
        style={{ scrollSnapType: "y mandatory", paddingTop: PADDING + "px", paddingBottom: PADDING + "px", scrollbarWidth: "none" }}>
        {SCORE_OPTIONS.map((s) => (
          <div key={s} className="h-[34px] flex items-center justify-center text-base font-bold display-num"
            style={{ scrollSnapAlign: "center", color: s === value ? "var(--green)" : "var(--text)" }}>
            {fmtScoreToPar(s)}
          </div>
        ))}
      </div>
    </div>
  );
}

function LeagueHubCard({ entry, activeMajor, liveMajor, syncToken, authedUserId, onEnter, onLeagueChanged }) {
  const { league, myTeam, members, picks: rawPicks } = entry;
  // Server picks merged over the PICKS seed so missing 2026 rows fall back to
  // the realistic defaults — keeps Hub standings in sync with the in-league
  // Standings tab, which already has this fallback via picksDraft.
  const picks = React.useMemo(() => {
    const merged = JSON.parse(JSON.stringify(PICKS));
    for (const teamId of Object.keys(rawPicks || {})) {
      merged[teamId] = { ...(merged[teamId] || {}), ...rawPicks[teamId] };
    }
    return merged;
  }, [rawPicks]);

  // Season standing for this league.
  const standing = useMemo(() => {
    const rows = members.map(m => {
      const total = MAJORS.reduce((s, mm) => s + teamMajorTotal(m.teamId, mm.id, picks), 0);
      return { teamId: m.teamId, total };
    }).sort((a, b) => b.total - a.total);
    const myIdx = rows.findIndex(r => r.teamId === myTeam.teamId);
    const me    = rows[myIdx] || { total: 0 };
    return {
      myRank: myIdx >= 0 ? myIdx + 1 : null,
      myTotal: me.total,
      leaderTotal: rows[0]?.total ?? 0,
      totalTeams: members.filter(m => m.claimed).length,
      capacity: members.length,
    };
  // syncToken bumps when EARN hydration finishes so the ranking reflects the
  // current 2026 Masters/PGA earnings, not the stale pre-hydration zeros.
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [members, picks, myTeam.teamId, syncToken]);

  // Picks status for the active major.
  const myPicks = picks?.[myTeam.teamId]?.[activeMajor?.id];
  const startersFilled = (myPicks?.starters || []).filter(Boolean).length;
  const benchFilled    = (myPicks?.bench    || []).filter(Boolean).length;
  const picksSubmitted = !!myPicks?.submitted;
  const picksOpen      = activeMajor && arePicksOpen(activeMajor);
  const picksLocked    = activeMajor && activeMajor.status !== "upcoming";

  let picksLabel, picksTone;
  if (picksLocked) {
    picksLabel = startersFilled === 0 ? "Did not submit" : (picksSubmitted ? "Submitted · locked" : "In flight · locked");
    picksTone  = startersFilled === 0 ? "muted" : "ok";
  } else if (picksOpen) {
    if (picksSubmitted) { picksLabel = "Submitted"; picksTone = "ok"; }
    else if (startersFilled > 0) { picksLabel = `Draft · ${startersFilled}/4 picked`; picksTone = "warn"; }
    else { picksLabel = "Open · not started"; picksTone = "warn"; }
  } else {
    picksLabel = `Opens in ${daysUntilPicksOpen(activeMajor)}d`;
    picksTone  = "muted";
  }

  // Live position (current rank if there's a live major).
  const liveStanding = useMemo(() => {
    if (!liveMajor) return null;
    const rows = members.map(m => ({
      teamId: m.teamId,
      total:  teamMajorTotal(m.teamId, liveMajor.id, picks),
    })).sort((a, b) => b.total - a.total);
    const myIdx = rows.findIndex(r => r.teamId === myTeam.teamId);
    return myIdx >= 0 ? { rank: myIdx + 1, total: rows[myIdx].total } : null;
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [members, picks, myTeam.teamId, liveMajor?.id, syncToken]);

  const ordinal = (n) => {
    if (n == null) return "—";
    const s = ["th","st","nd","rd"], v = n % 100;
    return n + (s[(v-20)%10] || s[v] || s[0]);
  };

  const [archiveOpen, setArchiveOpen] = useState(false);
  const [averagesOpen, setAveragesOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);

  return (
    <div className="relative rounded-2xl border border-line bg-white overflow-hidden">
      {/* Commissioner gear floats top-right of the card */}
      {authedUserId && entry.league.commissionerId === authedUserId && (
        <button onClick={() => setSettingsOpen(true)}
          title="League settings"
          className="absolute top-2 right-2 z-10 w-8 h-8 rounded-full flex items-center justify-center text-dim hover:text-text hover:bg-black/[0.05] transition-colors">
          <svg viewBox="0 0 24 24" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      )}
      {/* Top: clickable to enter the league */}
      <button onClick={onEnter}
        className="w-full text-left p-4 sm:p-5 flex flex-col sm:flex-row sm:items-center gap-4 hover:bg-black/[0.015] transition-colors group">
        {/* Left: league identity + team */}
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-bold text-lg tracking-tight truncate">{league.name}</span>
            <span className="text-[11px] uppercase tracking-wider text-dim font-mono">{league.code}</span>
          </div>
          <div className="flex items-center gap-2 mt-1.5">
            <span className="w-3 h-3 rounded-full shrink-0" style={{ background: myTeam.teamColor }}/>
            <span className="text-sm text-muted">{myTeam.teamName}</span>
            <span className="text-[12px] text-dim">· Since {league.foundedYear || new Date().getFullYear()}</span>
          </div>
        </div>

        {/* Middle: stat blurbs */}
        <div className="grid grid-cols-3 gap-3 sm:gap-4 sm:w-auto w-full">
          <Stat label={activeMajor?.short || "Picks"} value={picksLabel} tone={picksTone} />
          <Stat label="Season"
            value={standing.myRank ? `${ordinal(standing.myRank)} of ${members.length}` : "—"}
            sub={fmt(standing.myTotal)} />
          <Stat label={liveMajor ? `${liveMajor.short} live` : "Live"}
            value={liveStanding ? `${ordinal(liveStanding.rank)}` : "—"}
            sub={liveStanding ? fmt(liveStanding.total) : (liveMajor ? "" : "No major live")} />
        </div>

        {/* Right: chevron */}
        <div className="hidden sm:flex items-center justify-end shrink-0 text-dim group-hover:text-text">
          <svg viewBox="0 0 24 24" className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="9 6 15 12 9 18"/>
          </svg>
        </div>
      </button>

      {/* Hall of Fame toggle */}
      <button onClick={() => setArchiveOpen(o => !o)}
        className="w-full border-t border-line bg-black/[0.02] px-4 sm:px-5 py-2.5 flex items-center justify-between text-left hover:bg-black/[0.04] transition-colors">
        <div className="flex items-center gap-2">
          <svg viewBox="0 0 16 16" className="w-3.5 h-3.5 text-gold" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            <path d="M4 2v3a4 4 0 008 0V2"/>
            <path d="M2 2h12"/>
            <path d="M6 14h4M8 11v3"/>
            <path d="M4 5a2 2 0 01-2-2"/>
            <path d="M12 5a2 2 0 002-2"/>
          </svg>
          <span className="text-[12px] uppercase tracking-wider text-dim font-semibold">Hall of Fame</span>
        </div>
        <svg viewBox="0 0 24 24" className={`w-3.5 h-3.5 text-dim transition-transform ${archiveOpen ? "rotate-180" : ""}`} fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      {/* Archive panel */}
      {archiveOpen && <LeagueArchivePanel leagueId={league.id} />}

      {/* League-wide averages toggle */}
      <button onClick={() => setAveragesOpen(o => !o)}
        className="w-full border-t border-line bg-black/[0.02] px-4 sm:px-5 py-2.5 flex items-center justify-between text-left hover:bg-black/[0.04] transition-colors">
        <div className="flex items-center gap-2">
          <svg viewBox="0 0 16 16" className="w-3.5 h-3.5 text-green" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            <path d="M2 14h12"/>
            <rect x="3" y="8" width="2.5" height="5"/>
            <rect x="6.75" y="5" width="2.5" height="8"/>
            <rect x="10.5" y="2" width="2.5" height="11"/>
          </svg>
          <span className="text-[12px] uppercase tracking-wider text-dim font-semibold">League-wide averages</span>
        </div>
        <svg viewBox="0 0 24 24" className={`w-3.5 h-3.5 text-dim transition-transform ${averagesOpen ? "rotate-180" : ""}`} fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      {averagesOpen && <LeagueAveragesPanel leagueId={league.id} members={members} picks={picks} myTeamId={myTeam.teamId} syncToken={syncToken} />}

      {settingsOpen && (
        <LeagueSettingsModal league={league} members={members} myTeamId={myTeam.teamId}
          onClose={() => setSettingsOpen(false)}
          onChanged={() => { onLeagueChanged && onLeagueChanged(); }} />
      )}
    </div>
  );
}

// LeagueSettingsModal — commissioner-only controls. Rename, public/private,
// regenerate code, member list with inline rename + kick. The modal mutates
// the backend directly and calls onChanged so the Hub re-fetches the summary.
function LeagueSettingsModal({ league, members, myTeamId, onClose, onChanged }) {
  const [name,        setName]       = useState(league.name || "");
  const [visibility,  setVisibility] = useState(league.visibility || "public");
  const [code,        setCode]       = useState(league.code);
  const [memberRows,  setMemberRows] = useState(members);
  const [busy,        setBusy]       = useState(false);
  const [error,       setError]      = useState("");
  const [info,        setInfo]       = useState("");

  const saveLeague = async () => {
    setBusy(true); setError(""); setInfo("");
    try {
      await apiUpdateLeague(league.id, { name: name.trim(), visibility });
      setInfo("Saved");
      onChanged?.();
    } catch (e) { setError(e.message); }
    finally { setBusy(false); }
  };
  const regen = async () => {
    if (!confirm("Generate a fresh invite code? The old one stops working.")) return;
    setBusy(true); setError(""); setInfo("");
    try {
      const r = await apiRegenerateCode(league.id);
      setCode(r.code);
      setInfo("New code generated.");
      onChanged?.();
    } catch (e) { setError(e.message); }
    finally { setBusy(false); }
  };
  const renameMember = async (teamId, nextName) => {
    setBusy(true); setError("");
    try {
      await apiUpdateMember(league.id, teamId, { teamName: nextName });
      setMemberRows(rs => rs.map(m => m.teamId === teamId ? { ...m, teamName: nextName } : m));
      onChanged?.();
    } catch (e) { setError(e.message); }
    finally { setBusy(false); }
  };
  const kick = async (teamId, teamName) => {
    if (!confirm(`Remove ${teamName} from the league?`)) return;
    setBusy(true); setError("");
    try {
      await apiKickMember(league.id, teamId);
      setMemberRows(rs => rs.filter(m => m.teamId !== teamId));
      onChanged?.();
    } catch (e) { setError(e.message); }
    finally { setBusy(false); }
  };

  return (
    <div className="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center px-4 py-6"
      onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-xl w-full max-w-md p-5 sm:p-6 fade-in max-h-[90vh] overflow-y-auto"
        onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-bold text-lg">League settings</h3>
          <button onClick={onClose} className="text-dim hover:text-text text-xl leading-none">×</button>
        </div>

        <div className="space-y-4">
          <div>
            <span className="block text-[11px] uppercase tracking-wider text-dim font-semibold mb-1">League name</span>
            <input type="text" value={name} onChange={e => setName(e.target.value)} maxLength={80}
              className="w-full bg-bg2 border border-line-2 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green/40 text-text" />
          </div>

          <div>
            <span className="block text-[11px] uppercase tracking-wider text-dim font-semibold mb-1">Who can join?</span>
            <div className="grid grid-cols-2 gap-2">
              <button type="button" onClick={() => setVisibility("public")}
                className={`rounded-lg border px-3 py-2 text-left transition-colors ${visibility==="public" ? "" : "border-line text-dim hover:border-line-2"}`}
                style={visibility==="public" ? { borderColor: "var(--green)", background: "rgba(43,69,53,0.06)" } : {}}>
                <div className="text-[13px] font-semibold">Public</div>
                <div className="text-[11px] text-dim mt-0.5">Anyone with the code joins.</div>
              </button>
              <button type="button" onClick={() => setVisibility("private")}
                className={`rounded-lg border px-3 py-2 text-left transition-colors ${visibility==="private" ? "" : "border-line text-dim hover:border-line-2"}`}
                style={visibility==="private" ? { borderColor: "var(--green)", background: "rgba(43,69,53,0.06)" } : {}}>
                <div className="text-[13px] font-semibold">Private</div>
                <div className="text-[11px] text-dim mt-0.5">Only you can add members.</div>
              </button>
            </div>
          </div>

          <div>
            <span className="block text-[11px] uppercase tracking-wider text-dim font-semibold mb-1">Invite code</span>
            <div className="flex items-center gap-2">
              <div className="flex-1 bg-bg2 border border-line-2 rounded-lg px-3 py-2.5 text-sm font-mono tracking-widest font-bold text-text">{code}</div>
              <button type="button" onClick={() => navigator.clipboard?.writeText(code)}
                className="px-3 py-2 text-[12px] font-semibold rounded-md border border-line hover:bg-black/[0.04] transition-colors">Copy</button>
              <button type="button" onClick={regen} disabled={busy}
                className="px-3 py-2 text-[12px] font-semibold rounded-md border disabled:opacity-50 hover:bg-black/[0.04] transition-colors"
                style={{ borderColor: "var(--green)", color: "var(--green)" }}>Regenerate</button>
            </div>
          </div>

          <button type="button" onClick={saveLeague} disabled={busy}
            className="w-full font-semibold rounded-lg py-2.5 text-sm disabled:opacity-50 om-pill">
            {busy ? "Saving…" : "Save league settings"}
          </button>

          <div>
            <div className="text-[11px] uppercase tracking-wider text-dim font-semibold mb-2">Members</div>
            <div className="space-y-1">
              {memberRows.map(m => (
                <MemberRow key={m.teamId} m={m} isMe={m.teamId === myTeamId} busy={busy}
                  onRename={(name) => renameMember(m.teamId, name)}
                  onKick={() => kick(m.teamId, m.teamName)} />
              ))}
            </div>
          </div>

          {error && <div className="text-[12px] text-red">{error}</div>}
          {info  && <div className="text-[12px] text-green">{info}</div>}

          {/* Danger zone — delete the league */}
          <div className="border-t border-line pt-4 mt-2">
            <div className="text-[11px] uppercase tracking-wider text-red font-semibold mb-1">Danger zone</div>
            <p className="text-[12px] text-muted leading-snug mb-2">
              Permanently delete this league, its members, picks, chat and history. This can't be undone.
            </p>
            <button type="button" disabled={busy}
              onClick={async () => {
                if (!confirm(`Delete "${league.name}" forever? This wipes every pick and message in it.`)) return;
                setBusy(true); setError("");
                try {
                  await apiDeleteLeague(league.id);
                  onChanged?.();
                  onClose?.();
                } catch (e) { setError(e.message); }
                finally { setBusy(false); }
              }}
              className="w-full font-semibold rounded-lg py-2 text-[13px] disabled:opacity-50 border-2 transition-colors hover:bg-red/10"
              style={{ color: "var(--red)", borderColor: "var(--red)" }}>
              Delete league
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function MemberRow({ m, isMe, busy, onRename, onKick }) {
  const [editing, setEditing] = useState(false);
  const [draft,   setDraft]   = useState(m.teamName);
  React.useEffect(() => { setDraft(m.teamName); }, [m.teamName]);
  return (
    <div className="flex items-center gap-2 px-2 py-2 rounded-md border border-line bg-bg2/40">
      <span className="w-3 h-3 rounded-full shrink-0" style={{ background: m.teamColor }}/>
      {editing ? (
        <input autoFocus value={draft} maxLength={80}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") { onRename(draft.trim()); setEditing(false); } if (e.key === "Escape") setEditing(false); }}
          className="flex-1 bg-white border border-line-2 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-green/40" />
      ) : (
        <span className="flex-1 text-sm font-medium truncate">{m.teamName}</span>
      )}
      {isMe && <span className="text-[10px] uppercase tracking-wider font-bold text-green">You</span>}
      {!m.claimed && <span className="text-[10px] uppercase tracking-wider text-dim">Open</span>}
      {editing ? (
        <button onClick={() => { onRename(draft.trim()); setEditing(false); }} disabled={busy || !draft.trim()}
          className="text-[12px] font-semibold text-green disabled:opacity-50">Save</button>
      ) : (
        <button onClick={() => setEditing(true)} disabled={busy}
          className="text-[12px] text-dim hover:text-text disabled:opacity-50">Rename</button>
      )}
      {!isMe && m.claimed && (
        <button onClick={onKick} disabled={busy}
          className="text-[12px] text-red hover:underline disabled:opacity-50">Kick</button>
      )}
    </div>
  );
}

  const [error,   setError]   = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    setLoading(true); setError(null);

      .then(r => { if (!cancelled) setYears(r.years || []); })
      .catch(e => { if (!cancelled) setError(e.message); })

  return (
    <div className="rounded-xl border border-line bg-white p-3 sm:p-4">
      <div className="flex items-baseline justify-between gap-2 flex-wrap">

            <span className="text-xs text-dim">
              Champion: <span className="font-semibold text-text">{champ.teamName}</span>
              {champ.total != null && <span className="font-mono text-muted"> · {fmt(champ.total)}</span>}
            </span>

        </div>
        {totalsLine && <span className="text-[11px] uppercase tracking-wider text-dim">{totalsLine}</span>}

      {/* Major-winners row */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mt-3">
        {majorOrder.map(m => {

          return (
            <div key={m.id} className="rounded-md border border-line bg-bg2/60 px-2.5 py-2">
              <div className="text-[11px] uppercase tracking-wider text-dim font-semibold">{m.short}</div>
